meta:
  type_id: procurement
  type_name: 조달(물품·용역·시스템·임대차)
  # C3 재편: service-purchase + it-outsourcing 잔여 병합. 검수·하자·대금·해지 체크셋이 동일한
  # "돈이 나가는 조달" 통합 유형. IT 특수 규제는 X-EFIN·X-CLOUD·X-IP 횡단모듈이 커버.
  # detect는 실계약명 6,631건 빈도 어휘(구매353·물품267·용역693·유지보수122·구축115·렌탈64·임대차62).
  detect_keywords: [납품, 구매, 물품, 발주, 검수, 용역, 도급, 공급, 하도급, 렌탈, 리스, 임대차, 설치, 제작, 공사, 설계, 감리, 인쇄, 컨설팅, 이용계약, 유지보수, 시스템 구축, 구축, 고도화, 솔루션, 소프트웨어, 라이선스, 단가계약, 광고, 렌트, 차량, 숙박]
  modules:
    - id: M-UNFAIR
      name: 부당특약·불공정약관
      always_on: false
      screening_question: 계약조건이 일방(발주자)이 작성한 정형화된 약관이거나 우월적 지위에서 설정되는가?
      suggest_keywords: [약관, 일반조건, 부당특약, 우월적 지위]
    - id: M-DELIVERY
      name: 납품·검수·하자·위험부담
      always_on: false
      screening_question: 물품 납품 또는 용역·시스템 완성물의 인도·검수가 예정되어 있는가?
      suggest_keywords: [납품, 검수, 검사, 인수, 하자, 지체상금, 산출물, SLA]
checks:
  # ── M-PAY: 하도급거래 공정화에 관한 법률 제13조·제13조의2·제14조·제16조·제4조 ──
  - id: SP-UNF-01
    module: M-UNFAIR
    check: 수급사업자의 이익을 부당하게 침해·제한하는 부당한 특약을 설정하지 않았는가
    label: "부당특약 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제3조의4"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [부당한 특약, 특약, 비용 부담, 부당 특약]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제3조의4
        clause: 제1항
        quote: '원사업자는 수급사업자의 이익을 부당하게 침해하거나 제한하는 계약조건'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-UNF-02
    module: M-UNFAIR
    check: 서면에 기재되지 않은 사항을 요구하며 그 비용을 수급사업자에게 부담시키는 약정이 없는가
    label: "서면 외 비용전가"
    severity: 권장
    severity_override: true
    severity_basis: "간주규정임(제3조의4 제2항 각 호는 부당특약 간주·해당부분 무효) — 하도급거래 공정화에 관한 법률 제3조의4. 회사(원사업자)가 수범자로서 제재·담보실효 노출."
    norm_type: 간주
    basis: statute
    triggers:
      keywords: [서면에 기재되지, 비용을 부담, 추가 비용]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제3조의4
        clause: 제2항 제1호
        quote: '원사업자가 제3조제1항의 서면에 기재되지 아니한 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정'
        verified: true
    note: 하도급법 적용대상 해당 시. 제3조의4 제2항 각 호는 부당한 특약으로 간주되며 해당 부분에 한하여 무효(제3항)
  - id: SP-UNF-03
    module: M-UNFAIR
    check: 원사업자가 부담하여야 할 민원처리·산업재해 등 비용을 수급사업자에게 부담시키는 약정이 없는가
    label: "원사업자 비용 전가"
    severity: 권장
    severity_override: true
    severity_basis: "간주규정임(부당특약 간주·해당부분 무효) — 하도급거래 공정화에 관한 법률 제3조의4. 회사(원사업자)가 수범자로서 제재·비용전가 무효 리스크."
    norm_type: 간주
    basis: statute
    triggers:
      keywords: [민원처리, 산업재해, 비용을 부담]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제3조의4
        clause: 제2항 제2호
        quote: '원사업자가 부담하여야 할 민원처리, 산업재해 등과 관련된 비용을 수급사업자에게 부담시키는 약정'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-UNF-04
    module: M-UNFAIR
    check: 입찰내역에 없는 사항을 요구하며 그 비용을 수급사업자에게 부담시키는 약정이 없는가
    label: "입찰내역 외 비용전가"
    severity: 권장
    severity_override: true
    severity_basis: "간주규정임(부당특약 간주·해당부분 무효) — 하도급거래 공정화에 관한 법률 제3조의4. 회사(원사업자) 수범자로서 제재·비용전가 무효 리스크."
    norm_type: 간주
    basis: statute
    triggers:
      keywords: [입찰내역, 비용을 부담, 입찰]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제3조의4
        clause: 제2항 제3호
        quote: '원사업자가 입찰내역에 없는 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-UNF-05
    module: M-UNFAIR
    check: 신의성실 원칙을 위반하여 공정성을 잃은 약관 조항(무효 사유)이 계약에 포함되어 있지 않은가
    label: "신의칙 위반 약관"
    severity: 필수
    severity_basis: "공정성 상실 약관 조항은 무효(효력강행규정) — 약관의 규제에 관한 법률 제6조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [신의성실, 공정성, 약관, 무효]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제6조
        clause: 제1항
        quote: '신의성실의 원칙을 위반하여 공정성을 잃은 약관 조항은 무효이다'
        verified: true
    note: 약관(정형화된 계약조건)에 해당하는 경우 적용 — 개별 교섭 조항에는 부적용
  - id: SP-UNF-06
    module: M-UNFAIR
    check: 고객에게 부당하게 불리하거나 예상하기 어렵거나 본질적 권리를 제한하는 조항이 없는가(공정성 상실 추정 사유)
    label: "부당불리·불의타 조항"
    severity: 참고
    severity_basis: "추정규정임 — 약관의 규제에 관한 법률 제6조"
    norm_type: 추정
    basis: statute
    triggers:
      keywords: [부당하게 불리한, 예상하기 어려운, 본질적 권리]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제6조
        clause: 제2항
        quote: '약관의 내용 중 다음 각 호의 어느 하나에 해당하는 내용을 정하고 있는 조항은 공정성을 잃은 것으로 추정된다'
        verified: true
    note: 약관에 해당하는 경우 적용. 추정규정이므로 사업자가 공정성을 반증하면 유효
  - id: SP-UNF-07
    module: M-UNFAIR
    check: 사업자·이행보조자의 고의·중과실 책임을 배제하는 등 무효인 면책조항이 없는가
    label: "무효 면책조항"
    severity: 필수
    severity_basis: "면책조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제7조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [면책, 책임을 배제, 고의 또는 중대한 과실, 담보책임 배제]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제7조
        clause: 제1호
        quote: '사업자, 이행 보조자 또는 피고용자의 고의 또는 중대한 과실로 인한 법률상의 책임을 배제하는 조항'
        verified: true
    note: 약관에 해당하는 경우 적용
  - id: SP-UNF-08
    module: M-UNFAIR
    check: 고객에게 부당하게 과중한 지연손해금 등 손해배상 의무를 부담시키는 약관 조항이 없는가
    label: "과중한 손해배상 예정"
    severity: 필수
    severity_basis: "손해배상액 예정 조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제8조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [지연손해금, 손해배상 의무, 위약금, 과중한]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제8조
        quote: '고객에게 부당하게 과중한 지연 손해금 등의 손해배상 의무를 부담시키는 약관 조항은 무효로 한다'
        verified: true
    note: 약관에 해당하는 경우 적용
  - id: SP-UNF-09
    module: M-UNFAIR
    check: 고객의 법정 해제·해지권을 배제·제한하거나 사업자에게 부당한 해지권을 부여하는 무효 조항이 없는가
    label: "해제·해지권 제한"
    severity: 필수
    severity_basis: "해제·해지 관련 부당 약관 조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제9조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [해제권, 해지권, 원상회복, 해지]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제9조
        quote: '계약의 해제ㆍ해지에 관하여 정하고 있는 약관의 내용 중 다음 각 호의 어느 하나에 해당되는 내용을 정하고 있는 조항은 무효로 한다'
        verified: true
    note: 약관에 해당하는 경우 적용
  - id: SP-UNF-10
    module: M-UNFAIR
    check: 상당한 이유 없이 급부의 내용을 사업자가 일방적으로 결정·변경하거나 급부를 중지할 수 있게 하는 무효 조항이 없는가
    label: "급부 일방결정·중지"
    severity: 필수
    severity_basis: "채무이행 관련 부당 약관 조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제10조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [일방적으로 결정, 급부, 일방적으로 변경, 중지]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제10조
        clause: 제1호
        quote: '상당한 이유 없이 급부(給付)의 내용을 사업자가 일방적으로 결정하거나 변경할 수 있도록 권한을 부여하는 조항'
        verified: true
    note: 약관에 해당하는 경우 적용
  - id: SP-UNF-11
    module: M-UNFAIR
    check: 고객의 항변권·상계권 등 권리를 상당한 이유 없이 배제·제한하거나 기한의 이익을 박탈하는 무효 조항이 없는가
    label: "항변·상계권 배제"
    severity: 필수
    severity_basis: "고객 권익 관련 부당 약관 조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제11조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [항변권, 상계권, 기한의 이익, 권익]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제11조
        clause: 제1호
        quote: '법률에 따른 고객의 항변권(抗辯權), 상계권(相計權) 등의 권리를 상당한 이유 없이 배제하거나 제한하는 조항'
        verified: true
    note: 약관에 해당하는 경우 적용
  - id: SP-UNF-12
    module: M-UNFAIR
    check: 고객의 작위·부작위를 의사표시로 의제하거나 의사표시 형식에 부당한 제한을 두는 무효 조항이 없는가
    label: "의사표시 의제·제한"
    severity: 필수
    severity_basis: "의사표시 의제 관련 부당 약관 조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제12조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [의사표시, 의제, 도달된 것으로 본다, 표명]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제12조
        quote: '의사표시에 관하여 정하고 있는 약관의 내용 중 다음 각 호의 어느 하나에 해당하는 내용을 정하고 있는 조항은 무효로 한다'
        verified: true
    note: 약관에 해당하는 경우 적용
  - id: SP-UNF-13
    module: M-UNFAIR
    check: 고객에게 부당하게 불리한 재판관할 합의 또는 입증책임을 전가하는 무효 조항이 없는가
    label: "관할·입증책임 전가"
    severity: 필수
    severity_basis: "소 제기·관할 관련 부당 약관 조항 무효(효력강행규정) — 약관의 규제에 관한 법률 제14조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재판관할, 소송 제기, 입증책임, 관할의 합의]
    absence_check: false
    sources:
      - law: 약관의 규제에 관한 법률
        article: 제14조
        clause: 제1호
        quote: '고객에게 부당하게 불리한 소송 제기 금지 조항 또는 재판관할의 합의 조항'
        verified: true
    note: 약관에 해당하는 경우 적용. 공통 CMN-19(관할 지정)와 달리 부당 관할합의의 무효 여부를 점검
  # ── M-DELIVERY: 검수 + 민법 제398조·제537조·제538조·제667조~제670조·제580조~제582조 ──
  - id: SP-DEL-01
    module: M-DELIVERY
    check: 검사·검수의 기준·방법·기한과 합격/불합격 시 처리(보완·재납품) 절차가 규정되어 있는가
    label: "검사·검수 절차"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [검사, 검수, 인수, 합격, 불합격]
    absence_check: true
    sources: []
  - id: SP-DEL-02
    module: M-DELIVERY
    check: 납품·용역 이행지체에 대한 지체상금(손해배상액의 예정) 약정이 있는가
    label: "지체상금 예정"
    severity: 권장
