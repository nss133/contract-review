meta:
  type_id: settlement
  type_name: 화해·합의계약
  # 화해계약을 강하게 지시하는 어휘(강신호). '합의서'는 중립어라 단독으로 넣지 않고
  # 화해 고유어와 결합해서만 확정되도록 구성(shareholders.yaml에서 '합의서'는 제거됨).
  detect_keywords:
    - 화해
    - 화해계약
    - 화해합의
    - 부제소
    - 부제소특약
    - 상호 양보
    - 상호양보
    - 분쟁의 종결
    - 분쟁을 종지
    - 청구권 포기
    - 권리 포기
    - 소를 제기하지
    - 이의를 제기하지 않
    - 민형사상 제소권
    - 화해금
    - 합의금
  # 성격 배타 게이트(A3): 화해 강신호가 지배적이면 상법 조직행위 유형을 억제.
  # 런타임 detectType이 이 목록을 어휘매칭으로 실행(LLM 불사용).
  nature_signals: [화해, 화해계약, 화해합의, 부제소, 상호 양보, 상호양보, 분쟁의 종결, 분쟁을 종지, 청구권 포기, 민형사상 제소권]
  suppresses: [shareholders]
  modules:
    - id: M-SETTLE
      name: 화해 기본
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-SETTLE-PAY
      name: 화해금 지급
      always_on: false
      screening_question: 화해금·합의금 등 금전 지급 의무가 포함되는가?
      # 범용어 제거: '지급'은 어느 계약에나 등장 → M-SETTLE-PAY 오활성. 화해금 고유어(화해금·합의금·정산금)로 활성 유지.
      suggest_keywords: [화해금, 합의금, 정산금, 분할 지급, 지급기한]
    - id: M-SETTLE-CAP
      name: 당사자·처분권한
      always_on: false
      screening_question: 대리인 체결·법인 대표·미성년자 등 당사자 자격이나 처분권한이 문제되는가?
      suggest_keywords: [대리, 대리인, 위임, 법정대리, 대표이사, 처분권한, 후견]
checks:
  # ── M-SETTLE: 화해 성립·효력 기본 ──
  - id: SETTLE-01
    module: M-SETTLE
    check: 화해의 대상인 분쟁(무엇에 관한 화해인지)이 구체적으로 특정되어 있는가
    label: "분쟁대상 특정"
    severity: 필수
    severity_override: true
    severity_basis: "화해 성립요건(§731) — 분쟁이 특정되지 않으면 창설적 효력 범위·착오취소 제한 범위가 불확정. 성립요건 지표라 필수(도출규칙상 실무=참고이나 성립요건이므로 override)"
    norm_type: 실무
    basis: statute
    triggers:
      keywords: [분쟁, 다툼, 사건, 관하여, 관련하여, 이 사건, 손해배상, 분쟁의 대상]
    absence_check: true
    sources:
      - law: 민법
        article: 제731조
        quote: '화해는 당사자가 상호양보하여 당사자간의 분쟁을 종지할 것을 약정함으로써 그 효력이 생긴다'
        verified: true
        source_type: law
    note: "화해의 창설적 효력·부제소 효과는 '분쟁이 된 법률관계'의 범위에 미침. 대상 분쟁이 불특정이면 효력 범위 다툼이 발생. 묵시적 화해는 엄격해석됨 — 대법원 2021. 9. 9. 선고 2016다203933 판결(원문확인): '화해계약이 성립하기 위해서는 분쟁이 된 법률관계에 관하여 당사자 쌍방이 서로 양보함으로써 분쟁을 끝내기로 하는 의사의 합치가 있어야 하는데, 화해계약이 성립한 이후에는 그 목적이 된 사항에 관하여 나중에 다시 이행을 구하는 등으로 다툴 수 없는 것이 원칙'. 대상·범위의 명시가 중요."
  - id: SETTLE-02
    module: M-SETTLE
    check: 당사자 상호의 양보 내용(각자 무엇을 포기·인정하는지)이 기재되어 있는가
    label: "상호양보 명시"
    severity: 필수
    severity_override: true
    severity_basis: "화해 성립요건(§731 '상호양보') — 일방 양보만 있으면 화해가 아니라 단순 포기·면제로 성질이 달라짐. 성립요건 지표라 필수(실무=참고 도출규칙 override)"
    norm_type: 실무
    basis: statute
    triggers:
      keywords: [상호 양보, 상호양보, 양보, 포기, 감액, 인정, 서로]
    absence_check: true
    sources:
      - law: 민법
        article: 제731조
        quote: '화해는 당사자가 상호양보하여 당사자간의 분쟁을 종지할 것을 약정함으로써 그 효력이 생긴다'
        verified: true
        source_type: law
    note: "'상호양보'가 없으면 §731의 화해가 아니라 편면적 채무면제(§506)·권리포기로 성질결정될 수 있어 창설적 효력·착오취소 제한 법리가 적용되지 않을 수 있음."
  - id: SETTLE-03
    module: M-SETTLE
    check: 화해로 종전 권리관계가 소멸하고 새 법률관계가 창설된다는 취지(창설적 효력)가 반영되어 정산 범위가 특정되어 있는가
    label: "창설적 효력·정산범위"
    severity: 필수
    severity_override: true
    severity_basis: "창설적 효력(§732) — 화해 성립 시 종전 권리의무 소멸·재구성. 범위 불명확 시 소멸되는 권리 범위 다툼(실무=참고 도출규칙 override)"
    norm_type: 실무
    basis: statute
    triggers:
      keywords: [창설적 효력, 권리 소멸, 종전, 소멸, 정산, 새로운, 대체]
    absence_check: false
    sources:
      - law: 민법
        article: 제732조
        quote: '화해계약은 당사자 일방이 양보한 권리가 소멸되고 상대방이 화해로 인하여 그 권리를 취득하는 효력이 있다'
        verified: true
        source_type: law
    note: "화해 성립 후에는 종전 법률관계를 다시 다툴 수 없음(창설적 효력) — 대법원 2020. 10. 15. 선고 2020다227523,227530 판결(원문확인): '화해계약이 성립되면 특별한 사정이 없는 한 그 창설적 효력에 따라 종전의 법률관계를 바탕으로 한 권리의무관계는 소멸하고, 계약 당사자 사이에 종전의 법률관계가 어떠하였는지를 묻지 않고 화해계약에 따라 새로운 법률관계가 생긴다'. 정산 범위를 명확히 특정하지 않으면 어느 권리가 소멸했는지 분쟁 재발."
  - id: SETTLE-04
    module: M-SETTLE
    check: 착오취소 제한(§733)을 고려하여, 화해의 전제·기초가 된 사실(분쟁 외 사항)을 명확히 기재하였는가
    label: "착오취소 제한 대응"
    severity: 권장
    severity_basis: "§733은 화해의 착오취소를 원칙 배제(단서 예외). 전제사실 명시로 분쟁 외 사항 착오 리스크를 관리하는 권장 항목"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [착오, 취소, 전제, 기초, 사실관계, 다툼이 없는]
    absence_check: false
    sources:
      - law: 민법
        article: 제733조
        quote: '화해계약은 착오를 이유로 하여 취소하지 못한다. 그러나 화해당사자의 자격 또는 화해의 목적인 분쟁 이외의 사항에 착오가 있는 때에는 그러하지 아니하다'
        verified: true
        source_type: law
    note: "분쟁 자체(화해 목적)에 관한 착오는 취소 불가(§733 본문). 다만 '분쟁의 전제·기초로서 다툼 없이 양해된 사항'의 착오는 취소 가능(단서) — 대법원 2020. 10. 15. 선고 2020다227523,227530 판결(원문확인): '화해의 목적인 분쟁 이외의 사항이라 함은 분쟁의 대상이 아니라 분쟁의 전제 또는 기초가 된 사항으로서, 쌍방 당사자가 예정한 것이어서 상호 양보의 내용으로 되지 않고 다툼이 없는 사실로 양해된 사항을 말한다'. 전제사실을 명시하면 분쟁 외 사항 착오 다툼을 줄임."
  # ── M-SETTLE: 부제소·청구권 처리 ──
  - id: SETTLE-05
    module: M-SETTLE
    check: 부제소특약(합의 후 소 제기 금지)의 대상 범위·기준시점이 특정되어 있는가(포괄적·전면적 부제소는 효력이 제한될 수 있음)
    label: "부제소 범위특정"
    severity: 필수
    severity_override: true
    severity_basis: "부제소합의는 재판청구권 포기와 같은 중대한 소송법상 효과(2024다256932). 범위 불명확 시 계속 중 소송 포함 여부 등 다툼 발생 — 특정성이 핵심(practice=참고 도출규칙 override, 판례법리)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [부제소, 부제소특약, 소를 제기하지, 제소하지 아니, 이의를 제기하지 않, 민형사상, 청구권 포기]
    absence_check: true
    # 조건부 부재체크: 부제소 고유어가 본문에 있을 때만 부재알람(부제소특약 없이 화해금·양보만 정하는 화해에서 오탐 방지 — 부제소는 화해의 필수요소가 아님).
    absence_precondition: [부제소, 부제소특약, 소를 제기하지, 제소하지 아니, 이의를 제기하지 않, 민형사상, 청구권 포기]
    sources: []
    note: |
      부제소특약의 문언이 불명확하면 그 범위(합의 이전 사유·계속 중 소송 포함 여부 등)를 엄격히 해석함 — 대법원 2025. 5. 29. 선고 2024다256932 판결(원문확인): "부제소합의는 소송당사자에게 헌법상 보장된 재판청구권의 포기와 같은 중대한 소송법상의 효과를 발생시키는 것이다"(합의 당시 계속 중이던 소송에까지 효력이 미친다고 보기 어렵다고 판시). 대상 청구·기준시점·계속 중 소송 포함 여부를 명확히 특정할 것. 부제소 의무가 회사에만(또는 회사에 광범위하게) 부과되는 편면 구조인지도 확인(회사 리스크 관점).
      ※ '부제소합의는 특정한 법률관계에 한정되고 당사자가 예상할 수 있는 상황이어야 유효하다'는 확립된 법리가 있으나, 본 지식화 시점에 원문 대조를 완료하지 못하여 판례 source로 등재하지 않음(미확인).
  - id: SETTLE-06
    module: M-SETTLE
    check: 청구권 포기(권리 포기)의 대상과 범위가 특정되어 있는가(포괄적 포기는 해석상 제한될 수 있음)
    label: "청구권 포기 특정"
    severity: 권장
    severity_override: true
    severity_basis: "채권 포기·채무면제는 채권자 의사표시 해석을 엄격히 하여 인정(2020다227523). 포괄·묵시적 포기는 함부로 인정되지 않아 범위 특정 필요(practice=참고 도출규칙 override, 판례법리)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [청구권 포기, 권리 포기, 일체의 청구, 채권 포기, 면제, 더 이상, 이의 없]
    absence_check: false
    sources: []
    note: "포괄적·전면적 청구권 포기는 그 범위를 두고 다툼이 생기며, 채권 포기 인정은 엄격 해석됨 — 대법원 2020. 10. 15. 선고 2020다227523,227530 판결(원문확인): '채무의 면제는 반드시 명시적인 의사표시만에 의하여야 하는 것이 아니고 채권자의 어떠한 행위 내지 의사표시의 해석에 의하여 그것이 채권의 포기라고 볼 수 있는 경우에도 이를 인정하여야 하나, 그와 같이 인정하기 위해서는 당해 권리관계의 내용에 따라 이에 대한 채권자의 행위 내지 의사표시의 해석을 엄격히 하여 적용 여부를 결정하여야 한다'. 포기 대상 채권·범위를 열거·특정할 것."
  # ── M-SETTLE-PAY: 화해금 지급 ──
  - id: SETTLE-07
    module: M-SETTLE-PAY
    check: 화해금(합의금)의 금액·지급기한·지급방법이 특정되어 있는가
    label: "화해금 지급조건"
    severity: 권장
    severity_override: true
    severity_basis: "실무 관행 항목(법령 강제 아님). 지급조건 불명확 시 이행 분쟁 발생(practice=참고 도출규칙 override — 지급이 화해 이행조건이면 권장)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [화해금, 합의금, 지급, 지급기한, 지급방법, 계좌, 원, 정산금]
    absence_check: true
    sources: []
    note: 화해가 금전지급을 수반하면 금액·기한·방법·분할여부를 특정. 지급이 화해의 이행조건이면 미이행 시 효과(SETTLE-08)와 연계.
  - id: SETTLE-08
    module: M-SETTLE-PAY
    check: 화해금 불이행 시 효과(기한이익 상실·지연손해금·해제·부제소 효력 유지 여부 등)가 규정되어 있는가
    label: "불이행 시 효과"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님). 미이행 시 화해 존속 여부·강제 방법을 사전 정리하는 관리 항목"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [불이행, 기한이익 상실, 지연손해금, 지연이자, 해제, 미지급 시, 강제집행]
    absence_check: false
    sources: []
    note: 화해금 미지급이 화해 자체의 해제사유인지, 아니면 화해는 유지되고 지급의무만 강제되는지를 명확히 할 것. 공정증서(집행권원) 작성 여부도 실무상 고려.
  # ── M-SETTLE-CAP: 당사자·처분권한 ──
  - id: SETTLE-09
    module: M-SETTLE-CAP
    check: 당사자의 자격·대리권·처분권한(법인 대표권, 대리인 위임범위 등)이 확인·특정되어 있는가
    label: "당사자·대리권"
    severity: 권장
    severity_basis: "§733 단서상 '화해당사자의 자격' 착오는 취소 가능. 자격·처분권한 흠결은 화해 효력에 직결 — 리스크 관리 권장"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [대리, 대리인, 위임, 대표이사, 법정대리, 처분권한, 자격, 후견, 권한]
    absence_check: false
    sources:
      - law: 민법
        article: 제733조
        quote: '그러나 화해당사자의 자격 또는 화해의 목적인 분쟁 이외의 사항에 착오가 있는 때에는 그러하지 아니하다'
        verified: true
        source_type: law
    note: 화해당사자의 자격에 관한 착오는 §733 단서상 취소 가능 사유. 대리인 체결 시 위임범위(화해·청구권 포기 권한 포함 여부), 법인은 대표권·내부수권을 확인. 처분권한 없는 자의 권리 포기는 효력 문제 발생.
  # ── 회사 리스크(⑤ C4 신설) ──
  - id: RISK-SET-01
    module: M-SETTLE
    check: 회사가 포기하는 청구권·권리의 범위가 화해 대상 분쟁으로 한정되지 않고 "일체의 청구권" 등 포괄적으로 규정되어, 회사가 장래 행사할 다른 권리(별개 채권·구상권·미확정 손해)까지 상실하는 구조는 아닌가
    label: "회사 청구권 포기범위 과다"
    severity: 권장
    severity_override: true
    severity_basis: "회사 권리상실 직결 리스크 — practice이나 포괄적 청구권 포기는 회사가 회수할 권리를 잃게 함(화해 최대 리스크). 권장 승격(의도적 예외)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [일체의 청구, 일체의 권리, 모든 청구권, 향후 어떠한, 이의를 제기하지 않, 민형사상, 청구권 포기, 더 이상, 어떠한 이의도]
    absence_check: false
    sources: []
    note: "회사가 포기측이면 '일체의 청구권 포기'는 화해대상 외 별개 채권·구상권·미확정 손해까지 상실시킬 수 있음(창설적 효력·부제소 효과가 포괄범위에 미침). 포기대상을 화해 분쟁으로 한정·열거하고, 회사가 보유·유보할 권리(별건 구상권 등)를 명시적으로 제외할 것. SETTLE-06과 방향 반대(SETTLE-06은 상대방 포기의 특정성, 본항은 회사 포기의 과다 방지)."
