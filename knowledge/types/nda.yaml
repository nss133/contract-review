        quote: '영업비밀 보유자의 청구에 의하여 제11조에 따른 손해배상을 갈음하거나 손해배상과 함께 영업상의 신용을 회복하는 데에 필요한 조치를 명할 수 있다'
        verified: true
        source_type: law
