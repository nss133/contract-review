meta:
  type_id: nda
  type_name: NDA(비밀유지계약)
  detect_keywords: [비밀유지, 비밀정보, 영업비밀, 기밀, NDA, 비공개, 비밀보장]
  modules:
    - id: M-NDA
      name: 비밀유지 기본
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-PII
      name: 개인정보 포함 비밀정보
      always_on: false
      screening_question: 비밀정보에 개인정보·개인신용정보가 포함되는가?
      suggest_keywords: [개인정보, 개인신용정보, 고객정보, 정보주체]
checks:
  # ── M-NDA: 영업비밀 요건 (부정경쟁방지 및 영업비밀보호에 관한 법률 제2조 제2호) ──
  - id: NDA-01
    module: M-NDA
    check: 비밀정보의 정의가 "공공연히 알려져 있지 아니한"(비공지성) 정보에 한정되도록 범위가 특정되어 있는가
    label: "비공지성 범위 특정"
    severity: 참고
    severity_basis: "선언규정임(영업비밀 정의) — 부정경쟁방지 및 영업비밀보호에 관한 법률 제2조"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [비밀정보, 비밀정보의 정의, 공지, 공지된, 공연히 알려진]
    absence_check: true
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제2조
        clause: 제2호(비공지성)
        quote: '공공연히 알려져 있지 아니하고'
        verified: true
        source_type: law
    note: 이미 공지된 정보는 영업비밀보호법상 보호대상이 아님 — 정의가 지나치게 포괄적이면 예외사유(공지정보)와 충돌
  - id: NDA-02
    module: M-NDA
    check: 비밀정보가 "독립된 경제적 가치"를 가지는 기술상·경영상 정보를 포섭하는가
    label: "독립된 경제적 가치"
    severity: 참고
    severity_basis: "선언규정임(영업비밀 정의) — 부정경쟁방지 및 영업비밀보호에 관한 법률 제2조"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [경제적 가치, 기술상, 경영상, 노하우, 영업비밀]
    absence_check: false
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제2조
        clause: 제2호(경제적 가치성)
        quote: '독립된 경제적 가치를 가지는 것으로서'
        verified: true
        source_type: law
  - id: NDA-03
    module: M-NDA
    check: 수령자가 비밀정보를 "비밀로 관리"하도록 비밀 표시·접근통제 등 비밀관리 조치 의무가 규정되어 있는가
    label: "비밀관리 조치 의무"
    severity: 참고
    severity_basis: "선언규정임(영업비밀 정의) — 부정경쟁방지 및 영업비밀보호에 관한 법률 제2조"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [비밀로 관리, 비밀 표시, 마킹, 관리조치, 접근통제]
    absence_check: true
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제2조
        clause: 제2호(비밀관리성)
        quote: '비밀로 관리된 생산방법, 판매방법, 그 밖에 영업활동에 유용한 기술상 또는 경영상의 정보를 말한다'
        verified: true
        source_type: law
    note: 비밀관리성(비밀로서 관리한 사실)이 결여되면 영업비밀보호법상 영업비밀로 보호받지 못함 — 계약상 비밀표시·관리조치 규정이 비밀관리성 입증의 기초
  # ── M-NDA: 비밀유지의무·목적외 사용 (계약 약정 + 침해행위 정의 제2조 제3호) ──
  - id: NDA-04
    module: M-NDA
    check: 수령자에게 비밀정보의 무단 사용·공개(누설) 금지 의무가 규정되어 있는가
    label: "무단 사용·누설 금지"
    severity: 참고
    severity_basis: "선언규정임(침해행위 정의) — 부정경쟁방지 및 영업비밀보호에 관한 법률 제2조"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [비밀유지, 누설 금지, 공개 금지, 유지하여야, 제3자에게 누설]
    absence_check: true
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제2조
        clause: 제3호 라목
        quote: '계약관계 등에 따라 영업비밀을 비밀로서 유지하여야 할 의무가 있는 자가 부정한 이익을 얻거나 그 영업비밀의 보유자에게 손해를 입힐 목적으로 그 영업비밀을 사용하거나 공개하는 행위'
        verified: true
        source_type: law
    note: 계약상 비밀유지의무자의 부정목적 사용·공개는 영업비밀 침해행위에 해당 — 비밀유지의무 조항 자체는 당사자 약정이나 위반 시 법정 구제로 연결됨
  - id: NDA-05
    module: M-NDA
    check: 비밀정보를 계약 목적(제공 목적) 외의 용도로 사용하지 못하도록 하는 목적외 사용금지 조항이 있는가
    label: "목적외 사용금지"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [목적 외, 목적외, 사용 제한, 목적으로만, 이용 목적]
    absence_check: true
    sources: []
  - id: NDA-06
    module: M-NDA
    check: 비밀정보를 제3자에게 제공·개시할 때 보유자의 사전 서면 동의를 받도록 제한하는 조항이 있는가
    label: "제3자 제공 사전동의"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [제3자 제공, 제3자에게 제공, 사전 동의, 사전 서면 동의, 제3자 개시]
    absence_check: true
    sources: []
  - id: NDA-07
    module: M-NDA
    check: 비밀정보 취급자를 업무상 필요한 임직원으로 한정하고 동일 수준의 비밀유지의무를 부담시키는 조항이 있는가
    label: "취급자 한정·동일의무"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [취급자, 알 필요, need to know, 임직원, 접근 제한]
    absence_check: true
    sources: []
  # ── M-NDA: 예외사유 ──
  - id: NDA-08
    module: M-NDA
    check: 비밀유지의무의 예외로 이미 공지되었거나 수령 후 수령자 귀책 없이 공지된 정보를 제외하는 조항이 있는가
    label: "공지정보 예외"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [공지, 공개된 정보, 공지의 정보, 예외, 적용되지 아니]
    absence_check: false
    sources: []
  - id: NDA-09
    module: M-NDA
    check: 예외로 수령자가 독자적으로 개발했거나 제3자로부터 정당하게 취득한 정보를 제외하는 조항이 있는가
    label: "독자개발·정당취득 예외"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [독자 개발, 독자적으로 개발, 정당하게 취득, 기보유, 이미 보유]
    absence_check: false
    sources: []
  - id: NDA-10
    module: M-NDA
    check: 법령·법원·정부기관의 요구에 따른 개시 시 사전 통지 및 최소 범위 개시 의무를 규정하는 조항이 있는가
    label: "법령상 개시 통지"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [법령에 따라, 법원의 명령, 정부기관, 수사기관, 개시 요구]
    absence_check: false
    sources: []
  # ── M-NDA: 존속기간·반환·파기 ──
  - id: NDA-11
    module: M-NDA
    check: 비밀유지의무의 존속기간이 무제한·영구가 아니라 영업비밀의 비공지성 유지기간에 정합하는 합리적 기간으로 설정되어 있는가
    label: "비밀유지 존속기간"
    severity: 참고
    severity_basis: "선언규정임(영업비밀 정의·비공지성) — 부정경쟁방지 및 영업비밀보호에 관한 법률 제2조"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [영구히, 무기한, 무제한, 존속기간, 기간의 정함이 없]
    absence_check: false
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제2조
        clause: 제2호(비공지성)
        quote: '공공연히 알려져 있지 아니하고'
        verified: false
        source_type: law
    note: 단순 존속기간 명시 여부는 공통(CMN-16)에서 확인 — 본 항목은 NDA 고유 쟁점. 영업비밀은 비공지성이 상실되면 보호가 종료되므로 존속기간이 정보의 성질·보호기간과 정합해야 함. 존속기간을 무제한·영구로 정한 경우 상대방에 부당하게 불리한 약정으로 유효성이 다투어질 수 있음
  - id: NDA-12
    module: M-NDA
    check: 계약 종료 또는 보유자 요청 시 비밀정보(사본 포함)의 반환·파기 의무 조항이 있는가
    label: "반환·파기 의무"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [반환, 파기, 폐기, 사본, 반납]
    absence_check: true
    sources: []
  - id: NDA-13
    module: M-NDA
    check: 파기·반환 이행을 확인하는 파기확인서 제출 등 증빙 조항이 있는가
    label: "파기확인서 증빙"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [파기확인서, 확인서, 증빙, 파기 사실 확인]
    absence_check: false
    sources: []
  # ── M-NDA: 침해 시 구제 (영업비밀보호법 제10조~제14조의4) ──
  - id: NDA-14
    module: M-NDA
    check: 비밀정보 침해·누설 시 침해행위의 금지·예방 청구(가처분 포함)가 가능함이 확인되거나 배제되지 않는가
    label: "침해금지·예방청구"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제10조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [금지청구, 침해금지, 예방, 가처분, 침해행위의 금지]
    absence_check: false
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제10조
        clause: 제1항
        quote: '영업비밀의 보유자는 영업비밀 침해행위를 하거나 하려는 자에 대하여 그 행위에 의하여 영업상의 이익이 침해되거나 침해될 우려가 있는 경우에는 법원에 그 행위의 금지 또는 예방을 청구할 수 있다'
        verified: true
        source_type: law
    note: 법정 구제권 — 계약이 이를 배제·제한하는 문언이 없는지 확인
  - id: NDA-15
    module: M-NDA
    check: 비밀정보(영업비밀) 침해로 인한 손해배상책임 조항이 있는가
    label: "영업비밀 손해배상"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제11조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [손해배상, 배상 책임, 손해를 배상, 배상하여야]
    absence_check: true
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제11조
        quote: '고의 또는 과실에 의한 영업비밀 침해행위로 영업비밀 보유자의 영업상 이익을 침해하여 손해를 입힌 자는 그 손해를 배상할 책임을 진다'
        verified: true
        source_type: law
  - id: NDA-16
    module: M-NDA
    check: 침해자가 얻은 이익을 손해액으로 추정하는 등 손해액 입증경감 규정을 원용할 수 있는 구조인가
    label: "손해액 추정 원용"
    severity: 참고
    severity_basis: "추정규정임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제14조의2"
    norm_type: 추정
    basis: statute
    triggers:
      keywords: [손해액 추정, 이익액, 손해액, 입증]
    absence_check: false
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제14조의2
        clause: 제2항
        quote: '영업상의 이익을 침해한 자가 그 침해행위에 의하여 이익을 받은 것이 있으면 그 이익액을 영업상의 이익을 침해당한 자의 손해액으로 추정한다'
        verified: true
        source_type: law
  - id: NDA-17
    module: M-NDA
    check: 고의적 영업비밀 침해 시 손해액의 5배 범위 징벌적 손해배상이 가능함이 확인되거나 배제되지 않는가
    label: "징벌적 손해배상"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제14조의2"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [징벌적, 5배, 3배, 배액, 고의적]
    absence_check: false
    sources:
      - law: 부정경쟁방지 및 영업비밀보호에 관한 법률
        article: 제14조의2
        clause: 제6항
        quote: '영업비밀 침해행위가 고의적인 것으로 인정되는 경우에는 제5조 또는 제11조에도 불구하고 제1항부터 제5항까지의 규정에 따라 손해로 인정된 금액의 5배를 넘지 아니하는 범위에서 배상액을 정할 수 있다'
        verified: true
        source_type: law
  - id: NDA-18
    module: M-NDA
