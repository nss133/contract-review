  - id: OUT-16
    module: M-SOLICIT
    title: 모집위탁 상대방 자격(모집종사자 등록)
    severity: 필수
    triggers:
      keywords: [모집, 보험설계사, 보험대리점, 보험중개사, 모집종사자]
    absence_check: true
    guidance: >
      보험업법 제83조 제1항은 모집을 할 수 있는 자를 보험설계사·보험대리점·
      보험중개사·보험회사의 임직원(대표이사·사외이사·감사·감사위원 제외)으로
      한정함(강행 — 제한적 열거). 위탁 상대방이 이 자격을 갖추고 유효하게
      등록되어 있는지, 계약서에 등록 유지 의무와 등록 취소·말소 시 통지·해지
      조항이 있는지 확인해야 함. 위탁 업무의 실질이 모집(계약 체결의 중개·대리)에
      해당하는데 단순 사무위탁으로 포장되어 있으면 무자격 모집 리스크가 있으므로
      업무 범위 문언을 실질 기준으로 재검토함.
    legal_basis:
