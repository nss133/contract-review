meta:
  type_id: outsourcing
  type_name: 업무위탁
  detect_keywords: [위탁, 수탁, 위수탁, 업무위탁, 대행, 위탁운영, 사무처리, 콜센터, 접수심사, 위임계약, 위탁계약서, 파견]
  modules:
    - id: M-CORE
      name: 업무위탁 기본(금융권)
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-DISPATCH
      name: 도급·파견 경계
      always_on: false
      screening_question: 수탁자 인력이 위탁자 사업장에 상주하며 지휘를 받는가?
      suggest_keywords: [상주, 파견, 근무 장소, 지휘, 감독]
checks:
  # ── M-CORE: 금융기관의 업무위탁 등에 관한 규정 ──
  - id: CORE-01
    module: M-CORE
    check: 위수탁 당사자 간 합의한 업무범위 등 계약조건이 위탁계약서에 반드시 반영·교부되도록 되어 있는가
    label: "합의 업무범위 계약서 반영"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [위탁업무, 업무의 범위, 위탁의 범위, 위탁 대상]
    absence_check: true
    sources:
      - law: 손해사정 업무위탁 및 손해사정사 선임 등에 관한 모범규준
        article: 제5조
        clause: 제5항 제1호
        quote: '보험회사는 손해사정 위수탁 당사자 간 합의한 업무범위 등 계약조건을 반드시 반영하여 손해사정업무 위탁계약서를 작성하고 교부하여야 한다'
        verified: true
        source_type: self_regulation
    note: 자율규제(손해사정 업무위탁 모범규준)는 손해사정 위탁에 한해 업무범위 계약서 반영 의무를 부과 — 일반 위탁의 참고 근거
  - id: CORE-02
    module: M-CORE
    check: 위탁 업무가 인가받은 금융업 또는 다른 금융업의 본질적 요소를 포함하지 않는가
    label: "본질적 요소 불포함"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [본질적 요소, 위탁업무의 범위, 인가]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제1항 제1호
        quote: '인가 등을 받은 금융업 또는 다른 금융업의 본질적 요소를 포함하는 업무를 위탁하는 경우'
        verified: true
    note: 본질적 요소의 범위는 제3조 제2항 별표 2 — 별표는 DB 미수록(원문 미확인)
  - id: CORE-03
    module: M-CORE
    check: 본질적 요소를 포함하는 업무라면 제3조 제1항 제1호 가목·나목의 예외에 해당하는 근거가 확인되는가
    label: "본질적 요소 예외 근거"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [본질적 요소, 금융위원회가 인정, 예외]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제1항 제1호 단서
        quote: '다만, 다음 각 목의 어느 하나에 해당하는 업무의 경우에는 위탁할 수 있다'
        verified: true
  - id: CORE-04
    module: M-CORE
    check: 위탁 업무가 관련 법령에서 금융기관이 직접 수행하도록 의무를 부여한 업무에 해당하지 않는가
    label: "직접수행 의무 업무 배제"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [법령상 의무, 직접 수행, 의무를 부여]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제1항 제2호
        quote: '관련 법령에서 금융기관이 수행하도록 의무를 부여하고 있는 경우'
        verified: true
  - id: CORE-05
    module: M-CORE
    check: 보험회사가 손해사정 업무 위탁을 위한 평가기준을 마련·준수하여 수탁자(손해사정사·손해사정업자)를 선정하는 절차가 있는가
    label: "손해사정 평가기준 선정"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [자격, 인허가, 등록, 법규 준수]
    absence_check: true
    # 조건부 부재체크: 손해사정 위탁 어휘가 본문에 있을 때만 부재알람(콜센터·IT·일반사무 위탁에서 손해사정 평가기준 누락 오탐 방지).
    absence_precondition: [손해사정, 사정업무, 손해사정사, 손해사정업자, 보험금 산정]
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제3항 제3호
        quote: '제3자가 관련 법규(다만, 제3자가 외국인인 경우에는 국제사법 제3조)에 따라 업무수탁이 가능한지의 여부'
        verified: true
        source_type: law
      - law: 손해사정 업무위탁 및 손해사정사 선임 등에 관한 모범규준
        article: 제4조
        clause: 제1항
        quote: '보험회사는 손해사정 업무 위탁을 위한 평가기준을 마련하고, 이를 준수하여 업무를 위탁할 손해사정사 또는 손해사정업자를 선정하여야 한다'
        verified: true
        source_type: self_regulation
  - id: CORE-06
    module: M-CORE
    check: 위탁업무 처리가 금융실명법 등 관련 법령에 저촉되지 않도록 하는 법령 준수 조항이 있는가
    label: "금융실명법 등 법령준수"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [금융실명, 관련 법령, 법령 준수, 컴플라이언스]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제3항 제5호
        quote: '「금융실명거래 및 비밀보장에 관한 법률」 등 관련 법령에의 저촉 여부'
        verified: true
  - id: CORE-07
    module: M-CORE
    check: 수탁자가 위탁자의 사전 동의 없이 재위탁하지 못하도록 하는 조항이 있는가
    label: "재위탁 사전동의"
    severity: 필수
    severity_override: true
    severity_basis: "임의 서술이나 위탁자 동의는 강행적 전제임 — 금융기관의 업무위탁 등에 관한 규정 제3조 (PRIV-15·IT-09와 정합)"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [재위탁, 재수탁, 사전 동의, 제3자에게 위탁]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제4항
        quote: '제1항에 따라 금융기관의 업무를 위탁받은 자는 위탁자의 동의를 얻어 위탁받은 업무를 제3자에게 재위탁할 수 있다'
        verified: true
    note: 임의 서술이나 위탁자 동의는 강행적 전제이며 제2조·제3조·제4항 내지 제6항 준용 — 무단 재위탁은 감독규정 위반. PRIV-15·IT-09와 정합 위해 필수
  - id: CORE-08
    module: M-CORE
    check: 재위탁 시 감독원장(감독당국)에 대한 보고의 주체가 원위탁 금융회사로 정해져 있는가
    label: "재위탁 보고주체 지정"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재위탁, 보고, 감독원, 금융감독원]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제4항 후문
        quote: '재위탁시 보고의 주체는 원위탁 금융회사로 한다'
        verified: true
  - id: CORE-09
    module: M-CORE
    check: 수탁자의 금융관련법령·업무위수탁기준 위반으로 발생한 손해에 대한 배상·구상 조항이 있는가
    label: "법규위반 손해 배상·구상"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [연대, 배상책임, 구상, 손해배상]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제5항
        quote: '위탁회사는 수탁회사가 이 규정 등 금융관련법령 및 제3조의2에 따른 업무위수탁기준상의 의무를 위반하여 발생하는 손해에 대해서 수탁회사와 연대하여 배상책임을 진다'
        verified: true
        source_type: law
      - law: 의료자문 표준내부통제기준
        article: 제4조
        clause: 제4항
        quote: '수탁자가 제2항에 따른 업무위수탁기준에서 정하는 의무를 위반하여 발생하는 손해에 대해서 업무위탁 규정 제3조 제5항에 따라 배상책임을 진다'
        verified: true
        source_type: self_regulation
  - id: CORE-10
    module: M-CORE
    check: 위탁자의 업무 처리 현황 점검·자료 요구·감사권 등 수탁자 관리·감독 조항이 있는가
    label: "수탁자 관리·감독권"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조의2"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [점검, 감사, 자료 요구, 관리감독]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조의2
        quote: '<별표 3>에서 정하는 업무위수탁기준에 따라 금융권역 및 위탁대상자의 특성 등을 감안하여 자체 업무위수탁 운영기준을 마련하고 이를 준수하여야 한다'
        verified: true
        source_type: law
      - law: 의료자문 표준내부통제기준
        article: 제4조
        clause: 제2항
        quote: '보험회사는 제1항에 따른 수탁자를 관리하기 위하여 업무위탁 규정 제3조의2에 따른 업무위수탁운영기준을 마련하고 이를 준수하여야 한다'
        verified: true
        source_type: self_regulation
    note: 별표 3 업무위수탁기준 세부 문언은 DB 미수록 — 원문 미확인. 자율규제(의료자문 표준내부통제기준 제4조)는 수탁자 준수 점검·관리·보고·조치를 업무위수탁운영기준에 포함하도록 요구
  - id: CORE-11
    module: M-CORE
    check: 감독원장 사전보고(수탁자의 업무 개시 7영업일 이전) 일정·자료 협조가 계약 발효와 연동되어 있는가
    label: "업무개시 사전보고 연동"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제4조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [보고, 금융감독원, 감독원장, 7영업일]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제4조(보고)
        clause: 제1항
        quote: '그 사실을 업무를 위탁받은 자가 그 위탁받은 업무를 실제로 수행하려는 날의 7영업일 이전에 <별지 제1호 서식>에 따라 다음 각호의 서류를 첨부하여 감독원장에게 보고하여야 한다'
        verified: true
  - id: CORE-12
    module: M-CORE
    check: 본 위탁이 사전보고 생략(반기별 사후보고) 사유에 해당하는지 확인되는가
    label: "사전보고 생략 사유"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제4조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [사후보고, 반기, 업무보고서]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제4조(보고)
        clause: 제2항
        quote: '제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다'
        verified: true
  - id: CORE-13
    module: M-CORE
    check: 감독당국의 변경권고 등 조치가 있는 경우 계약 변경·시정에 협조하는 조항이 있는가
    label: "변경권고 시정 협조"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제5조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [변경권고, 시정, 감독당국, 금융위원회]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제5조
