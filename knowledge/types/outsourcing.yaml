  - id: OUT-13
    module: M-IT
    title: 전산 외주 보안 요건·외주인력 통제
    severity: 필수
    triggers:
      keywords: [외부주문, 전산 개발, 보안, 외주인력, 신원조회, 개발 장소]
    absence_check: true
    guidance: >
      전자금융감독규정 제60조 제1항은 전자금융거래를 위한 외부주문 시 각 호의
      사항을 준수하도록 함(강행). 계약서 검토 시 특히 개발 업무장소·전산설비의
      내부 업무용과의 분리(제1호), 이용자 금융정보의 무단보관·유출 금지(제3호),
      해킹·정보유출 대비 보안대책(제4호), 업무수행인력 사전 신원조회 또는
      신원보증서 징구와 인력변경 시 인수인계 관리(제13호), 보안성 검토·정기
      보안점검(제14호)이 계약상 의무로 반영되어 있는지 확인해야 함.
      전자금융보조업자에 대한 재무건전성·서비스 품질의 연 1회 이상 평가
      (제10호·제11호)와 그 결과의 감독원장 보고(제2항)도 위탁자 의무이므로
      평가 협조·자료 제공 조항을 확보함.
    legal_basis:
      - law: 전자금융감독규정
        article: 제60조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-14
    module: M-IT
    title: 장애·사고 시 책임 분담과 보고 체계
    severity: 권장
    triggers:
      keywords: [장애, 사고, 서비스 중단, 백업, 복구, 통지 의무]
    absence_check: true
    guidance: >
      정보처리시스템 장애 등 서비스 중단에 대비한 비상대책 수립(전자금융감독규정
      제60조 제1항 제6호)과 중요 전산자료의 백업대책(제8호)이 계약상 수탁자
      의무로 구체화되어 있는지 확인해야 함(강행 — 위탁자의 준수 의무를 계약으로
      전달하는 구조). 장애·보안사고 발생 시 수탁자의 즉시 통지 의무, 복구 목표
      시간(RTO), 원인 조사 협조, 책임 분담(귀책 구분)과 손해배상 연동이
      규정되어야 함. 감독규정 제60조 제4항의 재위탁 요건(원위탁자 지시에 따른
      정보 변경, 금융거래정보의 위탁회사 전산실 내 보관 원칙)도 재위탁 구조가
      있으면 함께 점검함.
    legal_basis:
      - law: 전자금융감독규정
        article: 제60조
        verified: false
