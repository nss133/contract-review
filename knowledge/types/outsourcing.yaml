    news_refs: []
  - id: OUT-15
    module: M-CLOUD
    title: 클라우드 이용 요건(중요도 평가·보고)
    severity: 필수
    triggers:
      keywords: [클라우드, 클라우드컴퓨팅서비스, 중요도 평가, 국외 이전, 국내에 설치]
    absence_check: true
    guidance: >
      전자금융감독규정 제14조의2 제1항은 클라우드컴퓨팅서비스 이용 시 이용업무의
      중요도 평가, 제공자의 건전성·안전성 평가, 업무연속성 계획·안전성 확보조치의
      수립·시행을 수행하도록 하고(강행), 제2항은 그 결과에 대한 정보보호위원회
      심의·의결을 요구함(강행). 제4항은 신규 이용계약 체결, 제공자의 합병·재위탁
      등 중대한 변경 등의 사유 발생일부터 3개월 이내 금융감독원장 보고를
      요구함(강행). 고유식별정보 또는 개인신용정보를 클라우드로 처리하는 경우
      제7항 단서에 따라 해당 정보처리시스템을 국내에 설치하여야 하므로(강행),
      국외 리전 사용 여부를 반드시 확인함. 계약서에 평가·보고에 필요한 자료
      제공 의무와 중대 변경 시 사전 통지 의무가 있는지 점검함.
    legal_basis:
      - law: 전자금융감독규정
        article: 제14조의2
        verified: false
