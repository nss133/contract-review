meta:
  type_id: outsourcing
  type_name: 업무위탁
  detect_keywords: [위탁, 수탁, 업무위탁, 위탁업무, 수탁자]
  modules:
    - id: M-CORE
      name: 업무위탁 기본(금융권)
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-PRIV
      name: 개인(신용)정보 처리위탁
      always_on: false
      screening_question: 위탁 업무에 개인(신용)정보 처리가 포함되는가?
      suggest_keywords: [개인정보, 신용정보, 정보주체, 고객정보]
    - id: M-IT
      name: IT·전산 외주
      always_on: false
      screening_question: 전산시스템·프로그램의 개발·운영·유지보수가 포함되는가?
      suggest_keywords: [전산, 시스템 개발, 유지보수, 소프트웨어, 서버]
    - id: M-CLOUD
      name: 클라우드·국외 위탁
      always_on: false
      screening_question: 클라우드 이용 또는 국외 처리 요소가 있는가?
      suggest_keywords: [클라우드, 국외, 해외 이전, AWS, Azure]
    - id: M-SOLICIT
      name: 보험모집 관련 위탁
      always_on: false
      screening_question: 보험모집·판매 관련 업무인가?
      suggest_keywords: [모집, 판매대리, 보험계약 체결, 중개]
    - id: M-DISPATCH
      name: 도급·파견 경계
      always_on: false
      screening_question: 수탁자 인력이 위탁자 사업장에 상주하며 지휘를 받는가?
      suggest_keywords: [상주, 파견, 근무 장소, 지휘, 감독]
checks:
  # ── M-CORE: 금융기관의 업무위탁 등에 관한 규정 ──
  - id: CORE-01
    module: M-CORE
    check: 위탁 대상 업무의 범위가 열거 방식으로 구체적으로 특정되어 있는가("기타 갑이 지정하는 업무" 등 포괄 기재 아님)
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [위탁업무, 업무의 범위, 위탁의 범위, 위탁 대상]
    absence_check: true
    sources: []
  - id: CORE-02
    module: M-CORE
    check: 위탁 업무가 인가받은 금융업 또는 다른 금융업의 본질적 요소를 포함하지 않는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [본질적 요소, 위탁업무의 범위, 인가]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제1항 제1호
        quote: '인가 등을 받은 금융업 또는 다른 금융업의 본질적 요소를 포함하는 업무를 위탁하는 경우'
        verified: false
    note: 본질적 요소의 범위는 제3조 제2항 별표 2 — 별표는 DB 미수록(원문 미확인)
  - id: CORE-03
    module: M-CORE
    check: 본질적 요소를 포함하는 업무라면 제3조 제1항 제1호 가목·나목의 예외에 해당하는 근거가 확인되는가
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [본질적 요소, 금융위원회가 인정, 예외]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제1항 제1호 단서
        quote: '다만, 다음 각 목의 어느 하나에 해당하는 업무의 경우에는 위탁할 수 있다'
        verified: false
  - id: CORE-04
    module: M-CORE
    check: 위탁 업무가 관련 법령에서 금융기관이 직접 수행하도록 의무를 부여한 업무에 해당하지 않는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [법령상 의무, 직접 수행, 의무를 부여]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제1항 제2호
        quote: '관련 법령에서 금융기관이 수행하도록 의무를 부여하고 있는 경우'
        verified: false
  - id: CORE-05
    module: M-CORE
    check: 수탁자가 관련 법규상 업무수탁이 가능한 자임을 확인·확약하는 조항이 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [자격, 인허가, 등록, 법규 준수]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제3항 제3호
        quote: '제3자가 관련 법규(다만, 제3자가 외국인인 경우에는 국제사법 제3조)에 따라 업무수탁이 가능한지의 여부'
        verified: false
  - id: CORE-06
    module: M-CORE
    check: 위탁업무 처리가 금융실명법 등 관련 법령에 저촉되지 않도록 하는 법령 준수 조항이 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [금융실명, 관련 법령, 법령 준수, 컴플라이언스]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제3항 제5호
        quote: '「금융실명거래 및 비밀보장에 관한 법률」 등 관련 법령에의 저촉 여부'
        verified: false
  - id: CORE-07
    module: M-CORE
    check: 수탁자가 위탁자의 사전 동의 없이 재위탁하지 못하도록 하는 조항이 있는가
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [재위탁, 재수탁, 사전 동의, 제3자에게 위탁]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제4항
        quote: '제1항에 따라 금융기관의 업무를 위탁받은 자는 위탁자의 동의를 얻어 위탁받은 업무를 제3자에게 재위탁할 수 있다'
        verified: false
    note: 재위탁 자체는 임의이나 위탁자 동의가 필수 전제임
  - id: CORE-08
    module: M-CORE
    check: 재위탁 시 원위탁 금융회사의 감독원장 보고에 협조하도록 하는 조항이 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재위탁, 보고, 감독원, 금융감독원]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제4항 후문
        quote: '재위탁시 보고의 주체는 원위탁 금융회사로 한다'
        verified: false
  - id: CORE-09
    module: M-CORE
    check: 수탁자의 금융관련법령·업무위수탁기준 위반으로 발생한 손해에 대한 배상·구상 조항이 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [연대, 배상책임, 구상, 손해배상]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조(업무위탁 등)
        clause: 제5항
        quote: '위탁회사는 수탁회사가 이 규정 등 금융관련법령 및 제3조의2에 따른 업무위수탁기준상의 의무를 위반하여 발생하는 손해에 대해서 수탁회사와 연대하여 배상책임을 진다'
        verified: false
  - id: CORE-10
    module: M-CORE
    check: 위탁자의 업무 처리 현황 점검·자료 요구·감사권 등 수탁자 관리·감독 조항이 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조의2"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [점검, 감사, 자료 요구, 관리감독]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조의2
        quote: '<별표 3>에서 정하는 업무위수탁기준에 따라 금융권역 및 위탁대상자의 특성 등을 감안하여 자체 업무위수탁 운영기준을 마련하고 이를 준수하여야 한다'
        verified: false
    note: 별표 3 업무위수탁기준 세부 문언은 DB 미수록 — 원문 미확인
  - id: CORE-11
    module: M-CORE
    check: 감독원장 사전보고(수탁자의 업무 개시 7영업일 이전) 일정·자료 협조가 계약 발효와 연동되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제4조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [보고, 금융감독원, 감독원장, 7영업일]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제4조(보고)
        clause: 제1항
        quote: '그 사실을 업무를 위탁받은 자가 그 위탁받은 업무를 실제로 수행하려는 날의 7영업일 이전에 <별지 제1호 서식>에 따라 다음 각호의 서류를 첨부하여 감독원장에게 보고하여야 한다'
        verified: false
  - id: CORE-12
    module: M-CORE
    check: 본 위탁이 사전보고 생략(반기별 사후보고) 사유에 해당하는지 확인되는가
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제4조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [사후보고, 반기, 업무보고서]
    absence_check: false
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제4조(보고)
        clause: 제2항
        quote: '제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다'
        verified: false
  - id: CORE-13
    module: M-CORE
    check: 감독당국의 변경권고 등 조치가 있는 경우 계약 변경·시정에 협조하는 조항이 있는가
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제5조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [변경권고, 시정, 감독당국, 금융위원회]
    absence_check: true
    sources:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제5조
        quote: '감독원장은 업무위탁 또는 수탁이 제3조의 규정에 적합하지 아니하다고 판단하는 경우에는 당해 금융기관에 대하여 그 내용의 변경권고 등 필요한 조치를 할 수 있다'
        verified: false
  - id: CORE-14
    module: M-CORE
    check: 수탁자가 위탁업무와 관련한 금융감독원장의 검사·자료제출 요구에 응하도록 하는 조항이 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [검사, 자료제출, 감독원, 검사에 응]
    absence_check: true
    sources: []
    note: (업무위탁규정 제3조의2 별표 3 근거 — DB 미수록, 원문 미확인)
  - id: CORE-15
    module: M-CORE
    check: 계약 종료·해지 시 업무·자료의 이관(인수인계, 데이터 반환·파기, 전환 지원) 조항이 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [이관, 인수인계, 반환, 파기]
    absence_check: true
    sources: []
  - id: CORE-16
    module: M-CORE
    check: 수탁자의 서비스 중단·도산에 대비한 비상계획(BCP) 조항이 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [업무연속성, 비상계획, 재해복구, 백업]
    absence_check: true
    sources: []
  # ── M-PRIV: 개인정보 보호법 제26조·시행령 제28조·신용정보법 제17조 ──
  - id: PRIV-01
    module: M-PRIV
    check: 개인정보 처리 업무 위탁이 법정 사항을 포함한 문서(계약서 본문 또는 처리위탁 특약)로 되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [개인정보, 처리위탁, 개인정보 처리, 특약]
    absence_check: true
    sources:
      - law: 개인정보 보호법
        article: 제26조
        clause: 제1항
        quote: '개인정보처리자가 제3자에게 개인정보의 처리 업무를 위탁하는 경우에는 다음 각 호의 내용이 포함된 문서로 하여야 한다'
        verified: false
