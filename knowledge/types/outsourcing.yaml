  - id: OUT-17
    module: M-SOLICIT
    title: 모집위탁 시 배상책임(사용자책임 특칙)
    severity: 필수
    triggers:
      keywords: [모집, 배상책임, 손해배상, 구상, 대리점]
    absence_check: true
    guidance: >
      구 보험업법 제102조(모집 관련 보험회사의 배상책임)는 2020. 3. 24. 삭제되어
      해당 규율은 금융소비자보호법으로 이관되었음. 금소법 제45조 제1항은
      금융상품직접판매업자(보험회사)가 대리·중개업자 등의 대리·중개 업무로
      금융소비자에게 발생한 손해를 배상하도록 하되(강행), 선임·감독에 적절한
      주의를 하고 손해 방지에 노력한 경우 면책되는 단서를 두고, 제2항은
      대리·중개업자에 대한 구상권 행사를 보장함. 제44조는 판매업자등의 일반
      손해배상책임을 정함. 모집위탁 계약에는 수탁자 귀책으로 회사가 배상한
      경우의 구상 조항과 선임·감독 주의를 증빙할 수 있는 교육·점검 체계가
      규정되어야 함. 보험중개사는 제45조 적용에서 제외되는 점을 유의함.
    legal_basis:
      - law: 금융소비자 보호에 관한 법률
        article: 제45조
        verified: false
      - law: 금융소비자 보호에 관한 법률
        article: 제44조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-18
    module: M-DISPATCH
    title: 도급·파견 경계(지휘명령 배제 문언)
    severity: 권장
    triggers:
      keywords: [상주, 지휘, 명령, 근무 장소, 파견, 근태]
    absence_check: true
    guidance: >
      수탁자 소속 인력이 위탁자 사업장에 상주하며 위탁자로부터 직접 지휘·명령을
      받는 실질이면 근로자파견에 해당하여 파견법상 허가·사용제한·직접고용 의무
      리스크가 발생할 수 있음(조문 미확인 — vault 확인 필요). 계약서에 업무
      수행 방법·인력 배치·근태 관리는 수탁자가 독립적으로 결정한다는 지휘명령
      배제 문언, 위탁자의 업무 요청은 수탁자의 현장 책임자를 통해서만 전달된다는
      창구 단일화 조항이 있는지 확인함. 다만 문언이 있어도 실제 운영이 직접
      지휘 형태이면 위장도급으로 판단될 수 있으므로, 상주 인력 구조라면 운영
      실태 점검을 별도로 권고함.
    legal_basis:
      - law: 파견근로자 보호 등에 관한 법률
        article: 제2조
        verified: false
    jid_refs: []
    news_refs: []
