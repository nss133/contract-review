meta:
  type_id: outsourcing
  type_name: 업무위탁
  detect_keywords: [위탁, 수탁, 업무위탁, 위탁업무, 수탁자]
  modules:
    - id: M-CORE
      name: 업무위탁 기본(금융권)
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-PRIV
      name: 개인(신용)정보 처리위탁
      always_on: false
      screening_question: 위탁 업무에 개인(신용)정보 처리가 포함되는가?
      suggest_keywords: [개인정보, 신용정보, 정보주체, 고객정보]
    - id: M-IT
      name: IT·전산 외주
      always_on: false
      screening_question: 전산시스템·프로그램의 개발·운영·유지보수가 포함되는가?
      suggest_keywords: [전산, 시스템 개발, 유지보수, 소프트웨어, 서버]
    - id: M-CLOUD
      name: 클라우드·국외 위탁
      always_on: false
      screening_question: 클라우드 이용 또는 국외 처리 요소가 있는가?
      suggest_keywords: [클라우드, 국외, 해외 이전, AWS, Azure]
    - id: M-SOLICIT
      name: 보험모집 관련 위탁
      always_on: false
      screening_question: 보험모집·판매 관련 업무인가?
      suggest_keywords: [모집, 판매대리, 보험계약 체결, 중개]
    - id: M-DISPATCH
      name: 도급·파견 경계
      always_on: false
      screening_question: 수탁자 인력이 위탁자 사업장에 상주하며 지휘를 받는가?
      suggest_keywords: [상주, 파견, 근무 장소, 지휘, 감독]
checkpoints:
  - id: OUT-01
    module: M-CORE
    title: 위탁 업무 범위 특정·본질적 업무 해당 여부
    severity: 필수
    triggers:
      keywords: [위탁업무, 업무의 범위, 위탁의 범위, 수행 업무, 위탁 대상]
    absence_check: true
    guidance: >
      위탁 대상 업무의 범위가 계약서에 구체적으로 특정되어 있는지, 그 업무가
      인가받은 금융업의 본질적 요소를 포함하는지 확인해야 함. 업무위탁규정
      제3조 제1항 단서는 본질적 요소를 포함하는 업무의 위탁을 원칙적으로
      금지하며(강행), 본질적 요소의 범위는 동조 제2항의 별표 2에서 정함.
      다만 제1항 제1호 가목·나목(타 금융업의 본질적 요소로서 수행 허용된 자에
      대한 위탁, 금융위원회가 인정하는 경우)에 해당하면 위탁할 수 있음(예외).
      범위 조항이 "기타 갑이 지정하는 업무" 등으로 포괄 기재되면 보고 대상
      특정·본질적 업무 판정이 곤란해지므로 열거 방식으로 정비를 요구함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-02
    module: M-CORE
    title: 감독당국 보고·신고 절차
    severity: 필수
    triggers:
      keywords: [보고, 신고, 금융감독원, 감독원장, 금융위원회]
    absence_check: true
    guidance: >
      업무위탁규정 제4조 제1항은 업무위탁 계약 체결 시 수탁자가 업무를 실제로
      수행하려는 날의 7영업일 이전에 계약서(안) 사본·준법감시인 검토의견 등을
      첨부하여 금융감독원장에게 보고하도록 함(강행). 동조 제2항 각 호(기보고
      내용과 동일, 경미한 변경 등)에 해당하면 사전보고를 생략하고 반기별
      사후보고할 수 있음(임의). 계약서에 보고 절차 협조 의무(자료 제공,
      계약 발효 시점의 보고 완료 연동)가 규정되어 있는지, 실무상 보고 일정이
      업무 개시일과 정합하는지 확인함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제4조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-03
    module: M-CORE
    title: 재위탁 제한·사전 동의
    severity: 필수
    triggers:
      keywords: [재위탁, 재수탁, 제3자에게 위탁, 하도급]
    absence_check: true
    guidance: >
      업무위탁규정 제3조 제4항은 수탁자가 위탁자의 동의를 얻어 재위탁할 수
      있도록 하며(임의 — 다만 동의는 필수 전제), 이 경우 재위탁에도 동 규정의
      위탁 요건·보고 조항이 준용되고 보고 주체는 원위탁 금융회사임. 계약서에
      사전 서면 동의 없는 재위탁 금지, 재위탁 시 재수탁자에 대한 동일 수준의
      의무 부과(back-to-back), 재수탁자의 행위에 대한 수탁자 책임 조항이
      있는지 확인함. 개인(신용)정보가 관련되면 M-PRIV의 재위탁 특칙
      (OUT-11·OUT-12)을 함께 검토해야 함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-04
    module: M-CORE
    title: 수탁자 관리·감독권, 자료접근·감사권
    severity: 필수
    triggers:
      keywords: [관리감독, 감사, 점검, 자료 요구, 자료 제출, 접근권]
    absence_check: true
    guidance: >
      업무위탁규정 제3조의2는 금융기관이 별표 3의 업무위수탁기준에 따라 자체
      업무위수탁 운영기준을 마련하고 준수하도록 함(강행). 이에 따라 계약서에
      위탁자의 수탁자에 대한 업무 처리 현황 점검·자료 요구·현장 감사권이
      확보되어 있는지 확인해야 함. 업무위탁규정 제3조 제5항은 수탁회사가
      금융관련법령·업무위수탁기준상 의무를 위반하여 발생한 손해에 대해
      위탁회사가 수탁회사와 연대하여 배상책임을 지도록 하므로(강행), 관리·감독
      장치의 실효성이 위탁자 자신의 책임 리스크와 직결됨. 감사권 행사 시
      수탁자의 협조 의무와 비용 부담도 명시하는 것이 바람직함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조의2
        verified: false
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-05
    module: M-CORE
    title: 금융당국 검사 수인 의무
    severity: 필수
    triggers:
      keywords: [검사, 검사에 응, 감독당국, 조사, 협조 의무]
    absence_check: true
    guidance: >
      수탁자가 위탁업무와 관련하여 금융감독원장의 검사·자료제출 요구에
      응하도록 하는 조항이 계약서에 있는지 확인해야 함. 근거는 업무위탁규정
      제3조의2가 준수를 요구하는 별표 3 업무위수탁기준이며(강행), 별표 3의
      세부 문언은 로컬 DB에 미수록이므로 원문 확인이 필요함(별표 원문 미확인).
      감독원장은 동 규정 제5조에 따라 위탁 내용이 부적합하면 변경권고 등
      조치를 할 수 있으므로(임의 — 감독당국 재량), 검사 수인·시정 협조 조항이
      없으면 계약 변경 요구에 노출될 수 있음. 검사 관련 비용·자료 보존 기간도
      함께 규정하는 것이 바람직함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조의2
        verified: false
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제5조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-06
    module: M-CORE
    title: 비상계획·업무연속성(BCP)·해지 시 이관
    severity: 권장
    triggers:
      keywords: [업무연속성, 비상계획, 재해복구, 이관, 인수인계, 계약 종료 시]
    absence_check: true
    guidance: >
      수탁자의 서비스 중단·도산에 대비한 비상계획(BCP)과 계약 종료·해지 시
      업무·자료의 원활한 이관(인수인계, 데이터 반환·파기, 전환 지원 기간)
      조항이 있는지 확인해야 함. 업무위탁규정 제3조의2의 업무위수탁기준(별표 3)이
      위탁 리스크의 체계적 관리를 요구하는 취지에 비추어(강행), 계속적 위탁일수록
      이관 조항의 부재가 실질적 종속(lock-in) 위험으로 이어짐. 해지 후에도
      이관 완료 시까지 수탁자의 업무 계속 의무와 대가 산정 기준을 두는 것이
      안전함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조의2
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-07
    module: M-CORE
    title: 수탁자의 법령 준수 확약
    severity: 권장
    triggers:
      keywords: [법령 준수, 준수 의무, 관계 법령, 컴플라이언스, 확약]
    absence_check: true
    guidance: >
      수탁자가 위탁업무 수행과 관련된 금융관련법령·개인정보 관련 법령 등을
      준수하겠다는 확약 조항이 있는지 확인해야 함. 업무위탁규정 제3조 제3항은
      위탁 시 수탁자가 관련 법규에 따라 업무수탁이 가능한지, 금융실명법 등
      관련 법령에 저촉되지 않는지를 고려하여 업무가 적정하게 처리되도록
      하여야 한다고 규정함(강행 — 위탁자의 고려 의무). 수탁자의 인허가·등록
      요건이 필요한 업무라면 자격 유지 의무와 상실 시 통지·해지 조항을
      연동해야 함.
    legal_basis:
      - law: 금융기관의 업무위탁 등에 관한 규정
        article: 제3조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-08
    module: M-CORE
    title: 위탁수수료 산정·정산의 적정성
    severity: 권장
    triggers:
      keywords: [위탁수수료, 수수료 산정, 정산, 실비, 단가]
    absence_check: true
    guidance: >
      위탁수수료의 산정 기준(정액·정률·실비 정산)과 정산 주기·증빙 절차가
      명확한지 확인해야 함. 수수료가 업무량·성과와 연동되는 경우 산정 근거
      자료의 제출·검증권을 확보해야 함. 계열회사 간 위탁이면 수수료의 적정성이
      부당지원행위·내부거래 이슈로 연결될 수 있으므로 시장가격 대비 산정 근거를
      문서화하도록 요구함. 수수료 조정 사유(물가·최저임금 변동 등)와 절차도
      점검함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: OUT-09
    module: M-PRIV
    title: 처리위탁 문서화 요건(위탁 목적 외 처리 금지 등)
    severity: 필수
    triggers:
      keywords: [개인정보 처리, 처리위탁, 목적 외, 보호조치, 안전성 확보]
    absence_check: true
    guidance: >
      개인정보 보호법 제26조 제1항은 개인정보 처리 업무 위탁을 소정 사항이
      포함된 문서로 하도록 함(강행). 필수 기재사항은 위탁업무 수행 목적 외
      처리 금지, 기술적·관리적 보호조치, 그리고 시행령 제28조 제1항이 정하는
      위탁업무의 목적·범위, 재위탁 제한, 접근 제한 등 안전성 확보 조치,
      관리 현황 점검 등 감독, 수탁자 의무 위반 시 손해배상 책임임. 계약서
      본문 또는 별첨(개인정보 처리위탁 특약)에 이 다섯 가지가 모두 포함되어
      있는지 항목별로 대조해야 함. 수탁자의 범위 초과 이용·제3자 제공은
      동조 제5항이 금지함(강행).
    legal_basis:
      - law: 개인정보 보호법
        article: 제26조
        verified: false
      - law: 개인정보 보호법 시행령
        article: 제28조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-10
    module: M-PRIV
    title: 수탁자 교육·관리감독·위탁사실 공개
    severity: 필수
    triggers:
      keywords: [교육, 감독, 공개, 홈페이지 게재, 고지]
    absence_check: true
    guidance: >
      개인정보 보호법 제26조 제4항은 위탁자가 수탁자를 교육하고 처리 현황 점검
      등으로 수탁자의 안전한 처리 여부를 감독하도록 함(강행). 동조 제2항은
      위탁 업무 내용과 수탁자를 정보주체가 확인할 수 있도록 공개하도록 하며(강행),
      공개 방법은 시행령 제28조 제2항·제3항(인터넷 홈페이지 지속 게재 등)이 정함.
      재화·서비스 홍보 또는 판매 권유 업무를 위탁하는 경우에는 제26조 제3항에
      따라 위탁 업무 내용과 수탁자를 정보주체에게 서면등의 방법으로 알려야
      함(강행). 계약서에 교육 실시·점검 수인 의무가 있는지, 실무상 홈페이지
      공개 목록에 해당 수탁자가 반영되는지 확인함.
    legal_basis:
      - law: 개인정보 보호법
        article: 제26조
        verified: false
      - law: 개인정보 보호법 시행령
        article: 제28조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-11
    module: M-PRIV
    title: 개인정보 재위탁 시 위탁자 동의
    severity: 필수
    triggers:
      keywords: [재위탁, 다시 위탁, 재수탁자, 제3자 위탁]
    absence_check: true
    guidance: >
      개인정보 보호법 제26조 제6항은 수탁자가 위탁받은 개인정보 처리 업무를
      제3자에게 다시 위탁하려는 경우 위탁자의 동의를 받도록 함(강행, 2023. 3. 14.
      신설). 시행령 제28조 제1항 제2호는 재위탁 제한에 관한 사항을 위탁 문서의
      필수 기재사항으로 정하므로, 계약서에 재위탁 시 사전 서면 동의 절차와
      재수탁자에 대한 동일 의무 부과가 문서화되어 있는지 확인해야 함.
      제26조 제2항의 수탁자 정의는 재수탁자를 포함하므로 재수탁자도 공개 대상이
      되는 점을 유의함. 일반 재위탁 조항(OUT-03)과 별도로 개인정보 부분의
      재위탁 통제가 명시되어야 함.
    legal_basis:
      - law: 개인정보 보호법
        article: 제26조
        verified: false
      - law: 개인정보 보호법 시행령
        article: 제28조
        verified: false
    jid_refs: []
    news_refs: []
  - id: OUT-12
    module: M-PRIV
    title: 개인신용정보 처리위탁 특칙
    severity: 필수
    triggers:
      keywords: [신용정보, 개인신용정보, 암호화, 금융위원회에 알려, 신용정보주체]
    absence_check: true
    guidance: >
      신용정보법 제17조 제1항은 개인신용정보 처리위탁에 개인정보 보호법
      제26조 제1항부터 제3항까지를 준용하고, 제4항은 수탁자에게 개인신용정보를
      제공할 때 식별정보의 암호화 등 보호조치를 하도록 하며(강행), 제5항은
      수탁자 교육과 안전한 처리에 관한 사항의 위탁계약 반영을 요구함(강행).
      제7항은 수탁자의 재위탁을 원칙적으로 금지하되 금융위원회가 인정하는
      경우에만 예외를 허용하므로(강행 원칙 + 예외), 개인정보 보호법상 동의만으로
      재위탁이 가능하다고 오인하지 않도록 계약 문언을 점검해야 함. 제3항의
      금융위원회 통지 대상(대통령령으로 정하는 자) 해당 여부도 확인함.
    legal_basis:
      - law: 신용정보의 이용 및 보호에 관한 법률
        article: 제17조
        verified: false
    jid_refs: []
