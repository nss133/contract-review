meta:
  type_id: finance
  type_name: 금융·여신
  detect_keywords: [대출, 대출약정, 여신, 융자, 담보, 근질권, 질권, 저당, 근저당, 채권양수도, ABL, 리파이낸싱, PF, 이행보증, 보증보험, 대주, 소비대차, 신용공여]
  modules:
    - id: M-LOAN
      name: 여신·대출
      always_on: true
      screening_question: 금전 대여(대출·여신)를 내용으로 하는가?
      suggest_keywords: [대출, 여신, 융자, 대주, 소비대차]
    - id: M-GUAR
      name: 보증·이행보증
      always_on: false
      screening_question: 보증(연대보증·이행보증)이 포함되는가?
      suggest_keywords: [보증, 연대보증, 이행보증, 보증보험]
checks:
  # ── M-LOAN 여신·대출 ─────────────────────────────────────────
  - id: FIN-LOAN-01
    check: 대출원금(대여금액)과 인도(실행) 방법이 특정되어 있는가
    label: "대출원금·실행방법"
    module: M-LOAN
    severity: 권장
    severity_override: true
    severity_basis: "소비대차 성립요건 서술(선언) — 민법 제598조. 리스크: 회사=대주 지위에서 대여채권의 금액·실행범위 미특정은 회수 시 채권 특정 곤란으로 직결(severity_override: risk)"
    norm_type: 선언
    basis: statute
    triggers:
      keywords: [대출금, 대여금, 대출원금, 실행]
    absence_check: false
    sources:
      - law: 민법
        article: 제598조
        clause: ""
        quote: 금전 기타 대체물의 소유권을 상대방에게 이전할 것을 약정하고 상대방은 그와 같은 종류, 품질 및 수량으로 반환할 것을 약정
        verified: true
        source_type: law
  - id: FIN-LOAN-02
    check: 이자율과 이자 기산일(인도일 기준)이 명시되어 있는가
    label: "이자율·기산일"
    module: M-LOAN
    severity: 권장
    severity_basis: 이자약정은 임의규정 — 민법 제600조(이자있는 소비대차의 기산)
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [이자, 이자율, 이율]
    absence_check: true
    # 조건부 부재체크: 이자 관련 어휘가 본문에 있을 때만 부재알람(무이자 대여·계열사 자금대여 등에서 이자율 누락 오탐 방지).
    absence_precondition: [이자, 이자율, 이율, 유이자]
    sources:
      - law: 민법
        article: 제600조
        clause: ""
        quote: 이자있는 소비대차는 차주가 목적물의 인도를 받은 때로부터 이자를 계산하여야 하며
        verified: true
        source_type: law
  - id: FIN-LOAN-03
    check: 약정이자율이 이자제한법상 최고이자율(연 25% 이내 대통령령)을 초과하지 않는가
    label: "최고이자율 준수"
    module: M-LOAN
    severity: 필수
    severity_basis: 강행규정 — 이자제한법 제2조(최고이자율 초과분 무효). 단 법인 여신 등 적용제외 확인 필요
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [이자율, 이율, 연체이자, 지연손해금]
    absence_check: false
    sources:
      - law: 이자제한법
        article: 제2조
        clause: 제1항·제3항
        quote: 최고이자율은 연 25퍼센트를 초과하지 아니하는 범위 안에서 대통령령으로 정한다
        verified: true
        source_type: law
    note: 대차원금 10만원 미만·법인 대상 여신 등 적용범위 확인 필요(이자제한법 제2조 제5항·대부업법 등)
  - id: FIN-LOAN-04
    check: 지연손해금(연체이자)의 이율 또는 산정방법이 정해져 있는가
    label: "지연손해금 이율"
    module: M-LOAN
    severity: 권장
    severity_basis: 금전채무 지연손해는 약정이율 우선 적용 — 민법 제397조(약정 없으면 법정이율)
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [지연손해금, 연체이자, 지연배상, 연체료]
    absence_check: true
    # 조건부 부재체크: 지연·연체 관련 어휘가 본문에 있을 때만 부재알람(무이자·단순 대여에서 지연손해금 조항 부재 오탐 방지, 법정이율로 갈음 가능).
    absence_precondition: [지연손해금, 연체이자, 지연배상, 연체료, 연체]
    sources:
      - law: 민법
        article: 제397조
        clause: 제1항
        quote: 금전채무불이행의 손해배상액은 법정이율에 의한다. 그러나 법령의 제한에 위반하지 아니한 약정이율이 있으면 그 이율에 의한다
        verified: true
        source_type: law

  # ── M-SEC 담보 ────────────────────────────────────────────────
  - id: FIN-GUAR-01
    check: 보증(연대보증)이 보증인의 기명날인·서명 있는 서면으로 표시되어 있는가
    label: "보증 서면방식"
    module: M-GUAR
    severity: 필수
    severity_basis: 강행규정(효력요건) — 민법 제428조의2(서면 아닌 보증은 무효, 전자적 형태 무효)
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [보증, 연대보증, 보증인, 보증서]
    absence_check: true
    sources:
      - law: 민법
        article: 제428조의2
        clause: 제1항
        quote: 보증은 그 의사가 보증인의 기명날인 또는 서명이 있는 서면으로 표시되어야 효력이 발생한다
        verified: true
        source_type: law
  - id: FIN-GUAR-02
    check: 연대보증인 경우 최고·검색의 항변권 배제가 명확히 규정되어 있는가
    label: "연대보증 항변권 배제"
    module: M-GUAR
    severity: 권장
    severity_basis: 임의규정 — 민법 제437조(연대보증은 최고·검색 항변 배제, 단서). 계약상 연대 여부 명확화 필요
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [연대보증, 최고, 검색, 항변]
    absence_check: false
    sources:
      - law: 민법
        article: 제437조
        clause: ""
        quote: 보증인이 주채무자와 연대하여 채무를 부담한 때에는 그러하지 아니하다
        verified: true
        source_type: law
  - id: FIN-GUAR-03
    check: 보증인의 구상권(수탁보증인·공동보증인) 관련 사항이 정리되어 있는가
    label: "보증인 구상권"
    module: M-GUAR
    severity: 참고
    severity_basis: 임의규정 — 민법 제441조(수탁보증인 구상권). 채권자 관점에선 확인 정도
    norm_type: 임의
    severity_override: true
    basis: statute
    triggers:
      keywords: [구상권, 구상, 수탁보증]
    absence_check: false
    sources:
      - law: 민법
        article: 제441조
        clause: 제1항
        quote: 보증인이 된 자가 과실없이 변제 기타의 출재로 주채무를 소멸하게 한 때에는 주채무자에 대하여 구상권이 있다
        verified: true
        source_type: law

  # ── M-ASSET 보험업 자산운용 규제 ──────────────────────────────