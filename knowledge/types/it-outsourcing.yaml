meta:
  type_id: it-outsourcing
  type_name: IT외주·전산용역
  detect_keywords: [전산, 시스템 개발, 소프트웨어, SI, 정보시스템, 정보처리, 전산용역, 외주, 유지보수, 시스템 구축, 시스템 고도화, 솔루션 도입, 프로그램 개발, 서비스 이용계약, 라이선스, 클라우드, SaaS]
  modules:
    - id: M-ITSEC
      name: 전자금융 정보처리시스템 외주(전금감규 §60)
      always_on: false
      activation: strong
      screening_question: 전자금융거래를 위한 정보처리시스템의 개발·운영·유지관리 외주인가?
      suggest_keywords: [전자금융, 전자금융거래, 정보처리시스템, 금융거래정보, 전산실, 전자금융보조업자, 금융거래]
    - id: M-DELIV
      name: 산출물·지식재산권·검수·하자
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-PRIV
      name: 개인(신용)정보 처리위탁
      always_on: false
      screening_question: 전산시스템이 고객·임직원 등 개인(신용)정보를 처리·보관하는가?
      suggest_keywords: [개인정보, 신용정보, 고객정보, 정보주체]
      # ② 개인정보 모듈은 confirm 등급 — 강신호(특이어 2+ 또는 반복 3회+)만 자동 활성,
      #    약신호(상투 준수조항 1회 등)는 질문으로 사람 확인(문언만으론 실제 취급 여부 판단 불가).
      activation: confirm
    - id: M-CLOUD
      name: 클라우드·국외 처리
      always_on: false
      screening_question: 클라우드컴퓨팅서비스 이용 또는 국외 정보처리 요소가 있는가?
      suggest_keywords: [클라우드, 국외, 해외 이전, AWS, Azure, 리전]
checks:
  # ── M-ITSEC: 전자금융감독규정 제60조(외부주문등에 대한 기준) ──
  - id: ITSEC-01
    module: M-ITSEC
    tier: conditional
    check: 외부주문 개발업무에 사용되는 업무장소·전산설비를 내부 업무용과 분리하여 설치·운영하는 조항이 있는가
    label: "업무장소·전산설비 분리"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [분리, 업무장소, 전산설비, 개발 장소, 개발망]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제1호
        quote: '외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영'
        verified: true
  - id: ITSEC-02
    module: M-ITSEC
    tier: conditional
    check: 금융회사와 이용자 간 암호화정보 해독 및 원장 등 중요 데이터 변경을 금지하는 조항이 있는가
    label: "암호해독·원장변경 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [암호화정보, 해독, 원장, 데이터 변경 금지]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제2호
        quote: '금융회사와 이용자 간 암호화정보 해독 및 원장 등 중요 데이터 변경 금지'
        verified: true
  - id: ITSEC-03
    module: M-ITSEC
    tier: conditional
    check: 계좌번호·비밀번호 등 이용자 금융정보의 무단보관·유출 금지 조항이 있는가
    label: "금융정보 무단보관·유출 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [계좌번호, 비밀번호, 금융정보, 무단보관, 유출 금지]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제3호
        quote: '계좌번호, 비밀번호 등 이용자 금융정보 무단보관 및 유출 금지'
        verified: true
  - id: ITSEC-04
    module: M-ITSEC
    tier: conditional
    check: 접근매체 위·변조, 해킹, 개인정보유출 등에 대비한 보안대책 수립 조항이 있는가
    label: "접근매체·해킹 보안대책"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [보안대책, 해킹, 접근매체, 위변조, 정보유출]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제4호
        quote: '접근매체 위ㆍ변조, 해킹, 개인정보유출 등에 대비한 보안대책 수립'
        verified: true
  - id: ITSEC-05
    module: M-ITSEC
    tier: conditional
    check: 금융회사와 전자금융보조업자 간 접속에 전용회선(동등 보안수준의 가상 전용회선 포함)을 사용하는 조항이 있는가
    label: "전용회선 사용"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [전용회선, 회선, 망 분리, 접속, VPN]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제5호
        quote: '금융회사와 전자금융보조업자 간의 접속은 전용회선(전용회선과 동등한 보안수준을 갖춘 가상의 전용회선을 포함한다)을 사용'
        verified: true
  - id: ITSEC-06
    module: M-ITSEC
    tier: conditional
    check: 정보처리시스템 장애 등 서비스 중단에 대비한 비상대책 수립 조항이 있는가
    label: "서비스중단 비상대책"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [비상대책, 장애, 서비스 중단, 복구]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제6호
        quote: '정보처리시스템 장애 등 서비스 중단에 대비한 비상대책 수립'
        verified: true
  - id: ITSEC-07
    module: M-ITSEC
    tier: conditional
    check: 외부주문의 입찰·계약·수행·완료 등 각 단계별 보안관리방안(금융감독원장이 정하는 방안)을 따르도록 하는 조항이 있는가
    label: "단계별 보안관리방안"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [단계별, 보안관리방안, 입찰, 계약, 수행]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제7호
        quote: '외부주문등의 입찰ㆍ계약ㆍ수행ㆍ완료 등 각 단계별로 금융감독원장이 정하는 보안관리방안을 따를 것'
        verified: true
  - id: ITSEC-08
    module: M-ITSEC
    tier: conditional
    check: 중요 전산자료의 백업자료 보존·백업설비 확보 등 백업대책 수립 조항이 있는가
    label: "백업대책 수립"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [백업, 백업설비, 전산자료, 업무지속성]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제8호
        quote: '업무지속성을 위한 중요 전산자료의 백업(backup)자료 보존 및 백업설비 확보 등 백업대책 수립'
        verified: true
  - id: ITSEC-09
    module: M-ITSEC
    tier: conditional
    check: 수탁자(전자금융보조업자)의 재무건전성 연 1회 이상 평가·상시 모니터링에 필요한 자료 제공 협조 조항이 있는가
    label: "수탁자 재무건전성 평가"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재무건전성, 평가, 모니터링, 도산]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제10호
        quote: '전자금융보조업자에 대한 재무건전성을 연1회 이상 평가하여 재무상태 악화에 따른 도산에 대비하고 전자금융보조업자의 주요 경영활동에 대해 상시 모니터링을 실시'
        verified: true
  - id: ITSEC-10
    module: M-ITSEC
    tier: conditional
    check: 수탁자가 제공하는 서비스의 품질수준 연 1회 이상 평가에 협조하는 조항이 있는가
    label: "서비스 품질수준 평가"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [품질수준, 서비스 수준, 평가, SLA]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제11호
        quote: '전자금융보조업자가 제공하는 서비스의 품질수준을 연1회 이상 평가할 것'
        verified: true
  - id: ITSEC-11
    module: M-ITSEC
    tier: conditional
    check: 수탁자가 사전 동의 없이 재외부주문 계약 체결·계약업체 변경을 하지 못하도록 통제하는 조항이 있는가
    label: "재외부주문 사전통제"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재위탁, 외부주문, 사전 동의, 계약업체 변경, 재하도급]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제12호
        quote: '전자금융보조업자가 사전 동의 없이 다시 외부주문등 계약을 체결하거나 계약업체를 변경하지 못하도록 하고, 사전 동의시 해당 계약서에 제7호의 사항을 기재하도록 통제'
        verified: true
  - id: ITSEC-12
    module: M-ITSEC
    tier: conditional
    check: 업무수행인력의 사전 신원조회(또는 신원보증) 및 인력변경 시 인수인계 등 외주인력 관리방안 조항이 있는가
    label: "외주인력 관리방안"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [신원조회, 신원보증, 인수인계, 외주인력, 투입인력]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제13호
        quote: '업무수행인력에 대하여 사전 신원조회 실시(이 경우 신원보증보험 증권 징구로 갈음할 수 있다) 또는 대표자의 신원보증서 징구, 인력변경시 인수인계에 관한 사항 등을 포함한 업무수행인력 관리방안 수립'
        verified: true
  - id: ITSEC-13
    module: M-ITSEC
    tier: conditional
    check: 외부주문에 대한 자체 보안성검토와 정기 보안점검 실시(수탁자 협조) 조항이 있는가
    label: "보안성검토·정기점검"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [보안성검토, 보안점검, 취약점, 점검]
    absence_check: true
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제1항 제14호
        quote: '외부주문등은 자체 보안성검토 및 정기(금융감독원장이 정하는 중요 점검사항에 대해서는 매일) 보안점검 실시'
        verified: true
  - id: ITSEC-14
    module: M-ITSEC
    tier: conditional
    check: 재위탁 구조라면 재수탁업자의 금융거래정보 변경이 위탁회사·원수탁업자의 개별 지시에 따르도록 하는 조항이 있는가
    label: "재수탁자 정보변경 지시"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [재위탁, 개별 지시, 금융거래정보, 재수탁]
    absence_check: false
    sources:
      - law: 전자금융감독규정
        article: 제60조
        clause: 제4항 제1호
        quote: '재수탁업자가 재위탁된 업무를 처리함에 있어 금융거래 정보의 변경이 필요한 경우에는 위탁회사 또는 원수탁업자의 개별적 지시에 따라야 하며, 위탁회사 또는 원수탁업자는 변경된 정보가 지시 내용에 부합하는지 여부를 확인하여야 함'
        verified: true
  - id: ITSEC-15
    module: M-ITSEC
    tier: conditional
    check: 재위탁 구조라면 이용자 금융거래정보를 위탁회사 전산실 내에 두도록 하는 조항이 있는가
    label: "금융정보 전산실내 보관"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [전산실, 금융거래정보, 보관, 재수탁]
    absence_check: false
    sources:
