meta:
  type_id: service-purchase
  type_name: 일반 용역·구매
  detect_keywords: [납품, 구매, 물품, 발주, 검수, 용역, 도급, 공급, 하도급, 렌탈, 임대차, 설치, 제작, 공사, 설계, 감리, 인쇄, 컨설팅, 이용계약]
  modules:
    - id: M-PAY
      name: 대금·지급(하도급법)
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-UNFAIR
      name: 부당특약·불공정약관
      always_on: false
      screening_question: 계약조건이 일방(발주자)이 작성한 정형화된 약관이거나 우월적 지위에서 설정되는가?
      suggest_keywords: [약관, 일반조건, 부당특약, 우월적 지위]
    - id: M-DELIVERY
      name: 납품·검수·하자·위험부담
      always_on: false
      screening_question: 물품 납품 또는 용역 완성물의 인도·검수가 예정되어 있는가?
      suggest_keywords: [납품, 검수, 검사, 인수, 하자, 지체상금]
checks:
  # ── M-PAY: 하도급거래 공정화에 관한 법률 제13조·제13조의2·제14조·제16조·제4조 ──
  - id: SP-PAY-01
    module: M-PAY
    check: 하도급대금 지급기일이 목적물등의 수령일(용역은 수행 완료일)부터 60일 이내로 정해져 있는가
    label: "지급기일 60일 이내"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [지급기일, 60일, 대금 지급, 하도급대금, 지급 기한]
    absence_check: true
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제1항
        quote: '부터 60일 이내의 가능한 짧은 기한으로 정한 지급기일까지 하도급대금을 지급하여야 한다'
        verified: true
    note: 하도급법 적용대상(원사업자→수급사업자 제조·수리·건설·용역위탁, 사업자 규모 요건 충족)에 해당하는 경우 강행. 일반 매매·비적용 거래에는 임의 조정 가능
  - id: SP-PAY-02
    module: M-PAY
    check: 지급기일 미정 또는 60일 초과 약정 시 수령일 기산 간주 규정과의 정합이 확인되는가
    label: "지급기일 미정·초과 간주"
    severity: 참고
    severity_basis: "간주규정임 — 하도급거래 공정화에 관한 법률 제13조"
    norm_type: 간주
    basis: statute
    triggers:
      keywords: [지급기일, 수령일, 지급기일로 본다]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제2항
        quote: '하도급대금의 지급기일이 정하여져 있지 아니한 경우에는 목적물등의 수령일을 하도급대금의 지급기일로 보고'
        verified: true
    note: 하도급법 적용대상 해당 시. 60일 초과 지급기일 약정은 무효화되고 60일 기산 지급기일로 간주됨
  - id: SP-PAY-03
    module: M-PAY
    check: 발주자로부터 준공금·기성금을 수령한 경우 15일 이내 하도급대금(기성부분 상당액)을 지급하도록 규정되어 있는가
    label: "준공·기성금 15일 지급"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [준공금, 기성금, 15일, 기성부분]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제3항
        quote: '그 준공금이나 기성금 등을 지급받은 날부터 15일(하도급대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급하여야 한다'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-PAY-04
    module: M-PAY
    check: 원사업자가 발주자로부터 받은 현금비율 미만으로 하도급대금을 지급하지 못하도록 하는 조항이 있는가
    label: "현금비율 하회 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [현금비율, 현금 지급, 지급 비율]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제4항
        quote: '원사업자가 수급사업자에게 하도급대금을 지급할 때에는 원사업자가 발주자로부터 해당 제조등의 위탁과 관련하여 받은 현금비율 미만으로 지급하여서는 아니 된다'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-PAY-05
    module: M-PAY
    check: 대금을 어음으로 지급하는 경우 발주자로부터 받은 어음 지급기간을 초과하지 않고 할인료를 교부일에 지급하도록 규정되어 있는가
    label: "어음지급 할인료"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [어음, 할인료, 어음대체결제, 만기]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제6항
        quote: '어음을 교부한 날부터 어음의 만기일까지의 기간에 대한 할인료를 어음을 교부하는 날에 수급사업자에게 지급하여야 한다'
        verified: true
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제5항
        quote: '발주자로부터 원사업자가 받은 어음의 지급기간(발행일부터 만기일까지)을 초과하는 어음을 지급하여서는 아니 된다'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-PAY-06
    module: M-PAY
    check: 목적물 수령일부터 60일 초과 지급 시 공정거래위원회 고시 이율에 따른 지연이자를 지급하도록 규정되어 있는가
    label: "60일 초과 지연이자"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [지연이자, 초과기간, 공정거래위원회 고시, 연체]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조
        clause: 제8항
        quote: '그 초과기간에 대하여 연 100분의 40 이내에서 「은행법」에 따른 은행이 적용하는 연체금리 등 경제사정을 고려하여 공정거래위원회가 정하여 고시하는 이율에 따른 이자를 지급하여야 한다'
        verified: true
    note: 하도급법 적용대상 해당 시. 공통 CMN-05-2(일반 지연이자 약정)와 달리 법정 지연이자율(공정위 고시)이 적용됨
  - id: SP-PAY-07
    module: M-PAY
    check: 일률적 단가인하·부당 할당·차별 등 부당한 하도급대금 결정을 금지하는 취지가 계약에 반영되어 있는가
    label: "부당한 대금결정 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제4조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [단가 인하, 부당한 대금, 대금 결정, 일률적]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제4조
        clause: 제1항
        quote: '부당하게 목적물등과 같거나 유사한 것에 대하여 일반적으로 지급되는 대가보다 낮은 수준으로 하도급대금을 결정'
        verified: true
    note: 하도급법 적용대상 해당 시. 제4조 제2항 각 호(일률 단가인하·부당 할당·차별·기망 등)는 부당대금결정으로 간주됨
  - id: SP-PAY-08
    module: M-PAY
    check: 설계변경·목적물 시기변동·경제상황 변동으로 발주자로부터 증액받은 경우 그 내용·비율에 따라 하도급대금을 증액하도록 규정되어 있는가
    label: "설계변경 대금증액"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제16조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [설계변경, 대금 조정, 증액, 계약금액 변경]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제16조
        clause: 제1항
        quote: '그가 발주자로부터 증액받은 계약금액의 내용과 비율에 따라 하도급대금을 증액하여야 한다'
        verified: true
    note: 하도급법 적용대상 해당 시. 감액받은 경우 그 내용·비율에 따라 감액 가능(제16조 제1항 단서)
  - id: SP-PAY-09
    module: M-PAY
    check: 건설위탁의 경우 계약체결일부터 30일 이내 공사대금 지급보증을 하도록 규정되어 있는가(면제사유 해당 시 제외)
    label: "공사대금 지급보증"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조의2"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [지급보증, 공사대금, 계약이행 보증, 건설위탁]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제13조의2
        clause: 제1항
        quote: '건설위탁의 경우 원사업자는 계약체결일부터 30일 이내에 수급사업자에게 다음 각 호의 구분에 따라 해당 금액의 공사대금 지급을 보증'
        verified: true
      - law: 하도급거래 공정화에 관한 법률 시행령
        article: 제8조
        clause: 제1항 제1호
        quote: '원사업자가 수급사업자에게 건설위탁을 하는 경우로서 1건 공사의 공사금액이 1천만원 이하인 경우'
        verified: true
    note: 하도급법 적용대상 중 건설위탁에 한함. 보증 면제사유(공사금액 1천만원 이하 등)의 실체는 시행령 제8조에 위임됨
  - id: SP-PAY-10
    module: M-PAY
    check: 원사업자 지급불능·2회분 이상 미지급 등 사유 발생 시 발주자의 하도급대금 직접지급 요건·효과 조항이 있는가
    label: "발주자 직접지급"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제14조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [직접 지급, 직접지급, 발주자, 지급정지]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제14조
        clause: 제1항
        quote: '수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행을 한 부분에 상당하는 하도급대금을 그 수급사업자에게 직접 지급하여야 한다'
        verified: true
      - law: 하도급거래 공정화에 관한 법률 시행령
        article: 제9조
        clause: 제3항
        quote: '발주자는 원사업자에 대한 대금지급의무의 범위에서 하도급대금 직접 지급 의무를 부담한다'
        verified: true
    note: 하도급법 적용대상 해당 시. 직접지급 의무의 범위·절차 실체는 시행령 제9조에 위임됨(원사업자 대금지급채무는 그 범위에서 소멸 — 제14조 제2항)
  # ── M-UNFAIR: 하도급법 제3조의4(부당특약) + 약관의 규제에 관한 법률 제6조~제14조 ──
  - id: SP-UNF-01
    module: M-UNFAIR
    check: 수급사업자의 이익을 부당하게 침해·제한하는 부당한 특약을 설정하지 않았는가
    label: "부당특약 금지"
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제3조의4"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [부당한 특약, 특약, 비용 부담, 부당 특약]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제3조의4
        clause: 제1항
        quote: '원사업자는 수급사업자의 이익을 부당하게 침해하거나 제한하는 계약조건'
        verified: true
    note: 하도급법 적용대상 해당 시
  - id: SP-UNF-02
    module: M-UNFAIR
    check: 서면에 기재되지 않은 사항을 요구하며 그 비용을 수급사업자에게 부담시키는 약정이 없는가
    label: "서면 외 비용전가"
    severity: 참고
    severity_basis: "간주규정임 — 하도급거래 공정화에 관한 법률 제3조의4"
    norm_type: 간주
    basis: statute
    triggers:
      keywords: [서면에 기재되지, 비용을 부담, 추가 비용]
    absence_check: false
    sources:
      - law: 하도급거래 공정화에 관한 법률
        article: 제3조의4
        clause: 제2항 제1호
        quote: '원사업자가 제3조제1항의 서면에 기재되지 아니한 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정'
        verified: true
    note: 하도급법 적용대상 해당 시. 제3조의4 제2항 각 호는 부당한 특약으로 간주되며 해당 부분에 한하여 무효(제3항)
  - id: SP-UNF-03
    module: M-UNFAIR
    check: 원사업자가 부담하여야 할 민원처리·산업재해 등 비용을 수급사업자에게 부담시키는 약정이 없는가
    label: "원사업자 비용 전가"
    severity: 참고
