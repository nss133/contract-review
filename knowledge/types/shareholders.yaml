meta:
  type_id: shareholders
  type_name: 주주간계약·합의서
  detect_keywords: [주주간, 주주간계약, 주식양도, 지분양도, 의결권, 우선매수, 동반매도, 태그얼롱, 드래그, 합의서]
  modules:
    - id: M-SHARE
      name: 주식 처분 통제(양도제한·우선매수·동반매도)
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-GOV
      name: 지배구조·경영(이사지명·의결권·정보접근·교착)
      always_on: true
      screening_question: null
      suggest_keywords: []
    - id: M-FIN
      name: 자본·지분(신주인수·희석방지·배당)
      always_on: false
      screening_question: 신주발행·증자·배당 등 자본·지분 변동 사항이 포함되는가?
      suggest_keywords: [신주, 증자, 유상증자, 희석, 배당, 종류주식, 우선주]
    - id: M-EXIT
      name: 이탈·경업(경업금지·전업·이탈정산·진술보장)
      always_on: false
      screening_question: 주주의 경업금지·전업의무·이탈 시 지분 정산이 포함되는가?
      suggest_keywords: [경업금지, 전업, 겸직, 콜옵션, 풋옵션, 진술 및 보장]
    - id: M-SETTLE
      name: 합의서 일반(화해·부제소)
      always_on: false
      screening_question: 분쟁 종결·정산을 위한 화해·합의(합의서) 요소가 있는가?
      suggest_keywords: [화해, 합의서, 부제소, 청구권 포기, 분쟁 종결]
    - id: M-ANTITRUST
      name: 공정거래(기업결합신고)
      always_on: false
      screening_question: 지분취득·임원겸임 등이 기업결합신고 대상 규모에 해당할 수 있는가?
      suggest_keywords: [기업결합, 경쟁제한, 공정거래위원회, 지분 취득, 임원겸임]
checks:
  # ── M-SHARE: 주식 처분 통제 (상법 제335조·제335조의2·제336조·제337조) ──
  - id: SH-SHARE-01
    module: M-SHARE
    check: 계약상 주식양도 제한이 정관에 근거한 이사회 승인 방식으로 뒷받침되는가(정관 근거 없는 순수 채권적 제한인지 확인)
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 상법 제335조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [양도제한, 양도의 제한, 이사회의 승인, 정관]
    absence_check: true
    sources:
      - law: 상법
        article: 제335조
        clause: 제1항 단서
        quote: '회사는 정관으로 정하는 바에 따라 그 발행하는 주식의 양도에 관하여 이사회의 승인을 받도록 할 수 있다'
        verified: true
    note: 정관 근거 없는 계약상 양도제한은 당사자 간 채권적 효력에 그쳐 회사·제3자에 대항 불가
  - id: SH-SHARE-02
    module: M-SHARE
    check: 정관상 이사회 승인 대상 주식을 승인 없이 양도하면 회사에 대해 효력이 없음을 전제로 양도 절차가 규정되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제335조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [이사회의 승인, 승인 없이, 양도, 효력]
    absence_check: false
    sources:
      - law: 상법
        article: 제335조
        clause: 제2항
        quote: '제1항 단서의 규정에 위반하여 이사회의 승인을 얻지 아니한 주식의 양도는 회사에 대하여 효력이 없다'
        verified: true
  - id: SH-SHARE-03
    module: M-SHARE
    check: 주권 미발행 회사에서 회사성립·납입기일 후 6월 경과 전 주식양도의 대(對)회사 효력 제한을 양도 시점 설계에 반영했는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제335조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [주권발행전, 주권 미발행, 6월, 양도]
    absence_check: false
    sources:
      - law: 상법
        article: 제335조
        clause: 제3항
        quote: '주권발행전에 한 주식의 양도는 회사에 대하여 효력이 없다. 그러나 회사성립후 또는 신주의 납입기일후 6월이 경과한 때에는 그러하지 아니하다'
        verified: true
  - id: SH-SHARE-04
    module: M-SHARE
    check: 정관상 양도승인 대상인 경우 상법상 양도승인청구·매수청구 절차와 계약상 우선매수 절차의 선후관계가 정리되어 있는가
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 상법 제335조의2"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [양도승인, 승인 청구, 매수청구, 양도의 승인]
    absence_check: false
    sources:
      - law: 상법
        article: 제335조의2
        clause: 제1항
        quote: '주식을 양도하고자 하는 주주는 회사에 대하여 양도의 상대방 및 양도하고자 하는 주식의 종류와 수를 기재한 서면으로 양도의 승인을 청구할 수 있다'
        verified: true
  - id: SH-SHARE-05
    module: M-SHARE
    check: 우선매수권(ROFR) 행사의 통지 절차·행사기간·가격결정 방법이 특정되어 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [우선매수권, 우선매수, ROFR, 우선청약]
    absence_check: true
    sources: []
    note: 우선매수권은 계약자유 영역의 채권적 약정 — 법령상 강제 요건 없음
  - id: SH-SHARE-06
    module: M-SHARE
    check: 동반매도참여권(tag-along) 행사 시 매수인이 소수주주 지분을 동일 조건으로 인수하도록 하는 의무가 규정되어 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [동반매도참여, 동반매각참여, 태그얼롱, tag-along]
    absence_check: true
    sources: []
  - id: SH-SHARE-07
    module: M-SHARE
    check: 동반매도청구권(drag-along) 행사요건·소수주주 매도의무·공정가격 보장이 규정되어 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [동반매도청구, 동반매각청구, 드래그, drag-along]
    absence_check: true
    sources: []
    note: 동반매도청구권은 채권적 약정 — 소수주주 매도의무의 이행강제·공정성(주주평등) 다툼 소지, 가격산정·보호장치 필요
  - id: SH-SHARE-08
    module: M-SHARE
    check: 주식양도의 이행방법(주권 교부)과 명의개서 협력의무가 규정되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제336조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [주권 교부, 명의개서, 주주명부, 양도방법]
    absence_check: true
    sources:
      - law: 상법
        article: 제336조
        clause: 제1항
        quote: '주식의 양도에 있어서는 주권을 교부하여야 한다'
        verified: true
        source_type: law
      - law: 상법
        article: 제337조
        clause: 제1항
        quote: '주식의 이전은 취득자의 성명과 주소를 주주명부에 기재하지 아니하면 회사에 대항하지 못한다'
        verified: true
        source_type: law
  # ── M-GOV: 지배구조·경영 (상법 제382조·제369조·제466조·제391조의3·제382조의3·제398조) ──
  - id: SH-GOV-01
    module: M-GOV
    check: 이사 지명권이 주주총회 선임 절차를 통해 실현되도록 규정되어 있는가(주총 결의 없이 이사 지위를 직접 부여하지 않음)
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제382조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [이사 지명, 지명권, 이사 선임, 이사의 선임]
    absence_check: false
    sources:
      - law: 상법
        article: 제382조
        clause: 제1항
        quote: '이사는 주주총회에서 선임한다'
        verified: true
    note: 이사 선임은 주주총회 전속권한(강행) — 계약상 지명권은 지명주주가 주총에서 찬성의결할 의무로 구성해야 함
  - id: SH-GOV-02
    module: M-GOV
    check: 의결권 구속약정(voting agreement)이 1주 1의결권 원칙 범위 내에서 채권적 약정 형태로 규정되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제369조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [의결권 구속, 의결권 행사, 의결권 공동행사, voting]
    absence_check: false
    sources:
      - law: 상법
        article: 제369조
        clause: 제1항
        quote: '의결권은 1주마다 1개로 한다'
        verified: true
    note: 1주 1의결권은 강행 — 의결권 구속약정은 당사자 간 채권적 효력에 그쳐 회사·제3자 구속·직접 이행강제가 곤란(판례)
  - id: SH-GOV-03
    module: M-GOV
    check: 주요경영사항에 대한 사전 동의권(veto)의 대상 항목이 열거되어 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [사전 동의, 동의권, 협의 사항, 거부권, veto]
    absence_check: true
    sources: []
    note: veto 대상이 이사회·주주총회의 법정 권한을 침해하지 않도록 채권적 약정 범위로 구성 필요
  - id: SH-GOV-04
    module: M-GOV
    check: 계약상 정보접근권이 상법상 소수주주 회계장부열람권·이사회의사록 열람권을 보완하도록 규정되어 있는가
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 상법 제466조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [정보접근, 열람, 회계장부, 자료 제공, 정보 제공]
    absence_check: true
    sources:
      - law: 상법
        article: 제466조
        clause: 제1항
        quote: '발행주식의 총수의 100분의 3 이상에 해당하는 주식을 가진 주주는 이유를 붙인 서면으로 회계의 장부와 서류의 열람 또는 등사를 청구할 수 있다'
        verified: true
        source_type: law
      - law: 상법
        article: 제391조의3
        clause: 제3항
        quote: '주주는 영업시간내에 이사회의사록의 열람 또는 등사를 청구할 수 있다'
        verified: true
        source_type: law
    note: 상법상 회계장부열람권은 3% 이상 지분 요건 — 계약상 정보권으로 지분 미달 주주의 접근을 보완
  - id: SH-GOV-05
    module: M-GOV
    check: 교착상태(deadlock) 해소 절차(콜·풋옵션, 러시안룰렛, 제3자 결정, 해산 등)가 규정되어 있는가
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [교착, deadlock, 러시안룰렛, 매수매도선택권]
    absence_check: true
    sources: []
  - id: SH-GOV-06
    module: M-GOV
    check: 지명이사도 지명주주가 아닌 회사에 대한 충실의무를 부담함을 전제로 이사 행위 지시 조항이 구성되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제382조의3"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [충실의무, 이사의 의무, 지명이사, 선관주의]
    absence_check: false
    sources:
      - law: 상법
        article: 제382조의3
        clause: 제1항
        quote: '이사는 법령과 정관의 규정에 따라 회사 및 주주를 위하여 그 직무를 충실하게 수행하여야 한다'
        verified: true
    note: 지명이사에게 지명주주 지시에 무조건 따를 의무를 지우는 조항은 충실의무(강행)와 충돌 소지 — 개정 상법은 충실의무 대상에 '주주'를 포함하고 전체 주주 공평대우를 요구(제2항)
  - id: SH-GOV-07
    module: M-GOV
    check: 주요주주·지명이사와 회사 간 거래가 이사회 승인(이사 3분의 2) 및 공정성 요건을 거치도록 규정되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제398조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [자기거래, 이해상충, 관계자 거래, 이사회의 승인]
    absence_check: false
    sources:
      - law: 상법
        article: 제398조
        quote: '미리 이사회에서 해당 거래에 관한 중요사실을 밝히고 이사회의 승인을 받아야 한다'
        verified: true
  # ── M-FIN: 자본·지분 (상법 제418조·제344조·제462조) ──
  - id: SH-FIN-01
    module: M-FIN
    check: 주주의 지분비율에 따른 신주인수권(pre-emptive right)이 보장되도록 규정되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제418조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [신주인수권, 신주 배정, 지분비율, 우선청약]
    absence_check: true
    sources:
      - law: 상법
        article: 제418조
        clause: 제1항
        quote: '주주는 그가 가진 주식 수에 따라서 신주의 배정을 받을 권리가 있다'
        verified: true
  - id: SH-FIN-02
    module: M-FIN
    check: 제3자 신주배정이 정관 근거와 경영상 목적 요건을 충족하는 범위로 제한되어 있는가
    severity: 필수
    severity_basis: "근거 조문이 강행규정(의무)임 — 상법 제418조"
    norm_type: 강행
    basis: statute
    triggers:
      keywords: [제3자 배정, 제3자 신주, 경영상 목적, 신주 발행]
    absence_check: false
    sources:
      - law: 상법
        article: 제418조
        clause: 제2항 단서
