  - id: CMN-05-2
    check: 지연지급 시 지연이자(지연손해금) 약정이 있는가
    label: "지연이자 약정"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [지연이자, 지연손해금, 지체상금]
    absence_check: true
    sources: []
  - id: CMN-06
    check: 계약기간의 시기·종기가 명시되어 있는가
    label: "계약기간 시기·종기"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [계약기간, 유효기간, 존속기간]
    absence_check: true
    sources: []
  - id: CMN-07
    check: 갱신 방식(자동갱신·합의갱신)과 갱신 거절 통지 기한이 규정되어 있고, 통지기한이 어느 일방(특히 우리 회사)에만 과도하게 촉박하지 않은가
    label: "갱신·갱신거절 통지"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [갱신, 자동갱신, 연장]
    absence_check: true
    sources: []
  - id: CMN-08
    check: 해지·해제 사유(중대한 위반, 도산 등)가 규정되어 있고, 임의해지권·해지사유가 당사자 간 균형 있게(회사에만 불리하지 않게) 부여되어 있는가
    label: "해지·해제 사유"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [해지, 해제, 계약의 해지]
    absence_check: true
    sources: []
  - id: CMN-09
    check: 해지 절차(시정 최고 기간·서면 통지)가 규정되어 있는가
    label: "해지 절차·통지"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [최고, 시정, 서면 통지]
    absence_check: true
