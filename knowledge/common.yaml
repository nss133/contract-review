  - id: CMN-10
    check: 계약 종료 시 기지급 대금 정산·자료 반환·잔존 조항의 처리가 규정되어 있는가
    label: "종료 시 정산·반환"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [반환, 파기, 존속, 잔존]
    absence_check: true
    sources: []
  - id: CMN-11
    check: 손해배상 책임의 귀책사유와 배상 범위 조항이 있고, 그 책임이 어느 일방(특히 우리 회사)에만 편면적으로 부과되지 않는가
    label: "손해배상 책임·범위"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [손해배상, 배상책임, 배상]
    absence_check: true
    sources: []
  - id: CMN-12
    check: 손해배상 범위 조항이 통상손해 한도 원칙을 확장·제한하는 특약인지 확인되는가
    label: "통상손해 확장·제한 특약"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 민법 제393조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [통상손해, 통상의 손해, 손해배상의 범위]
    absence_check: false
    sources:
      - law: 민법
        article: 제393조
        clause: 제1항
        quote: '채무불이행으로 인한 손해배상은 통상의 손해를 그 한도로 한다'
        verified: true
    note: 임의규정 — 계약상 확장·제한 특약이 우선함
  - id: CMN-13
    check: 특별손해(간접손해·일실이익 등)의 배상 여부와 예견가능성 요건에 관한 문언이 있는가
    label: "특별손해 예견가능성"
    severity: 권장
    severity_basis: "근거 조문이 임의규정임 — 민법 제393조"
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [특별손해, 특별한 사정, 간접손해, 일실이익]
    absence_check: false
    sources:
      - law: 민법
        article: 제393조
        clause: 제2항
        quote: '특별한 사정으로 인한 손해는 채무자가 그 사정을 알았거나 알 수 있었을 때에 한하여 배상의 책임이 있다'
        verified: true
    note: 임의규정 — 계약상 확장·제한 특약이 우선함
  - id: CMN-14
    check: 책임 상한(cap)·면책 조항이 고의·중과실을 상한 예외로 명시하고 있고, 상한·면책의 이익이 당사자 간 대칭적으로(회사에만 불리하지 않게) 배분되어 있는가
    label: "책임상한·중과실 예외"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [책임 상한, 배상액의 한도, 면책, 고의 또는 중과실]
    absence_check: true
    sources: []
  - id: CMN-15
    check: 비밀정보의 정의·범위 조항이 있는가
    label: "비밀정보 정의·범위"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
