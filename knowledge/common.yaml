    note: "복수 언어본 작성 시 해석 불일치를 막기 위한 우선언어(governing language) 조항은 실무 표준이나 법령이 강제하는 것은 아님. 준거법이 외국법이면 해당 외국법의 해석원칙이 적용될 수 있으므로 우선언어 명시가 분쟁예방에 유효."
  - id: CRS-04
