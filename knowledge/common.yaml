checks:
  - id: CMN-01
    check: 계약 당사자가 법인 명의로 정확히 특정되어 있는가(영업점·부서 명의 아님)
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [당사자, 계약당사자, 갑과 을]
    absence_check: true
    sources: []
  - id: CMN-02
    check: 계약의 목적 조항이 수행 업무의 실질(위탁·매매·용역 등 법적 성격)과 일치하게 기재되어 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [목적, 계약의 목적]
    absence_check: true
    sources: []
  - id: CMN-03
    check: 대금·수수료의 금액 또는 산정 방식(산식·단가)이 특정되어 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [대금, 수수료, 대가, 단가]
    absence_check: true
    sources: []
  - id: CMN-04
    check: 대금의 지급 시기·방법과 정산 절차가 규정되어 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [지급, 정산, 지급방법, 지급시기]
    absence_check: true
    sources: []
  - id: CMN-05
    check: 부가가치세 포함 여부와 지연지급 시 지연이자 약정이 있는가
    severity: 참고
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [부가가치세, 지연이자, 지연손해금]
    absence_check: true
    sources: []
  - id: CMN-06
    check: 계약기간의 시기·종기가 명시되어 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [계약기간, 유효기간, 존속기간]
    absence_check: true
    sources: []
  - id: CMN-07
    check: 갱신 방식(자동갱신·합의갱신)과 갱신 거절 통지 기한이 규정되어 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [갱신, 자동갱신, 연장]
    absence_check: true
    sources: []
  - id: CMN-08
    check: 해지·해제 사유(중대한 위반, 도산 등)가 규정되어 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [해지, 해제, 계약의 해지]
    absence_check: true
    sources: []
  - id: CMN-09
    check: 해지 절차(시정 최고 기간·서면 통지)가 규정되어 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [최고, 시정, 서면 통지]
    absence_check: true
    sources: []
  - id: CMN-10
    check: 계약 종료 시 기지급 대금 정산·자료 반환·잔존 조항의 처리가 규정되어 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [반환, 파기, 존속, 잔존]
    absence_check: true
    sources: []
  - id: CMN-11
    check: 손해배상 책임의 귀책사유와 배상 범위 조항이 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [손해배상, 배상책임, 배상]
    absence_check: true
    sources: []
  - id: CMN-12
    check: 손해배상 범위 조항이 통상손해 한도 원칙을 확장·제한하는 특약인지 확인되는가
    severity: 권장
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [통상손해, 통상의 손해, 손해배상의 범위]
    absence_check: false
    sources:
      - law: 민법
        article: 제393조
        clause: 제1항
        quote: '채무불이행으로 인한 손해배상은 통상의 손해를 그 한도로 한다'
        verified: false
    note: 임의규정 — 계약상 확장·제한 특약이 우선함
  - id: CMN-13
    check: 특별손해(간접손해·일실이익 등)의 배상 여부와 예견가능성 요건에 관한 문언이 있는가
    severity: 권장
    norm_type: 임의
    basis: statute
    triggers:
      keywords: [특별손해, 특별한 사정, 간접손해, 일실이익]
    absence_check: false
    sources:
      - law: 민법
        article: 제393조
        clause: 제2항
        quote: '특별한 사정으로 인한 손해는 채무자가 그 사정을 알았거나 알 수 있었을 때에 한하여 배상의 책임이 있다'
        verified: false
    note: 임의규정 — 계약상 확장·제한 특약이 우선함
  - id: CMN-14
    check: 책임 상한(cap)·면책 조항이 고의·중과실을 상한 예외로 명시하고 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [책임 상한, 배상액의 한도, 면책, 고의 또는 중과실]
    absence_check: true
    sources: []
  - id: CMN-15
    check: 비밀정보의 정의·범위 조항이 있는가
    severity: 필수
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [비밀정보, 비밀유지, 기밀, 영업비밀]
    absence_check: true
    sources: []
  - id: CMN-16
    check: 비밀유지 의무의 존속기간(계약 종료 후 잔존 여부·기간)이 명시되어 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [종료 후에도, 존속한다, 비밀유지]
    absence_check: true
    sources: []
  - id: CMN-17
    check: 계약 이행 과정에서 발생하는 산출물·저작물의 권리 귀속 조항이 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [지식재산권, 저작권, 산출물, 결과물]
    absence_check: true
    sources: []
  - id: CMN-18
    check: 제3자 지식재산권 침해 주장 시 수탁자의 방어·면책 의무 조항이 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [권리 침해, 제3자의 권리, 지식재산권 침해]
    absence_check: true
    sources: []
  - id: CMN-19
    check: 분쟁해결 방식(소송·중재)과 관할 법원 지정 조항이 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [관할, 분쟁, 중재, 관할법원]
    absence_check: true
    sources: []
    note: (관할 합의 관련 민사소송법 조문은 로컬 DB 미수록 — 조문 미확인)
  - id: CMN-20
    check: 계약상 지위·권리의무의 사전 서면 동의 없는 양도·이전·담보 제공을 금지하는 조항이 있는가
    severity: 권장
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [양도, 이전, 담보 제공, 승계]
    absence_check: true
    sources: []
  - id: CMN-21
    check: 완전합의 조항과 서면에 의한 변경 방식 조항이 있는가
    severity: 참고
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [완전한 합의, 완전합의, 서면에 의한 변경]
    absence_check: false
    sources: []
