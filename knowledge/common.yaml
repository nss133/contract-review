    sources: []
  - id: CMN-05
    check: 대금·수수료의 부가가치세 포함 여부가 명시되어 있는가
    label: "부가가치세 포함 여부"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [부가가치세, 부가세, VAT]
    absence_check: true
