    note: "외국환거래법·외국환거래규정상 자본거래·지급등의 신고·보고 의무가 거래유형에 따라 발생할 수 있음(자본거래 신고·해외직접투자 신고 등). 계약 조항 강제사항이 아니라 이행상 규제라 basis=practice로 두되, 해당 거래유형이 특정되면 외국환거래법령 원문 확인 후 별도 check 승격 검토(현재 조문 미확인 — 거래유형 미특정)."
