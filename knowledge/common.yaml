meta:
  type_id: common
  type_name: 공통
  detect_keywords: []
  modules:
    - id: X-ASSET
      name: 보험업 자산운용 규제
      always_on: false
      screening_question: 보험회사가 자기자산(일반계정·특별계정)을 운용하는 여신·투자·특별계정 운용인가?
      suggest_keywords: [보험회사, 신용공여, 자산운용, 대주주, 특별계정, 변액, 퇴직연금]
    - id: X-CLOUD
      name: 클라우드·국외 위탁
      always_on: false
      screening_question: 클라우드컴퓨팅서비스 이용 또는 국외 정보처리 요소가 있는가?
      suggest_keywords: [클라우드, 국외, 해외 이전, AWS, Azure, 리전]
      activation: strong
    - id: X-COMP
      name: 공정거래(경쟁제한·거래상지위·기업결합)
      always_on: false
      screening_question: 경쟁사업자 간 협력·공동 거래조건 설정, 거래상지위 남용, 또는 기업결합 신고대상 지분취득·임원겸임이 있는가?
      suggest_keywords: [부당한 공동행위, 경쟁제한, 거래상 지위, 기업결합, 공정거래위원회, 임원겸임]
      activation: strong
    - id: X-CROSS
      name: 국외 당사자·준거법·관할
      always_on: false
      screening_question: 계약 상대방이 외국 법인·개인이거나, 계약이 영문으로 작성되었거나, 이행지·결제통화가 국외/외화인가?
      suggest_keywords: [준거법, governing law, 관할, jurisdiction, 중재, arbitration, 영문, English, Agreement, 해외, 국외, 외국, 원천징수, 외화, USD]
      activation: confirm
    - id: X-EFIN
      name: 전자금융 정보처리시스템 외주
      always_on: false
      screening_question: 전자금융거래를 위한 정보처리시스템의 개발·운영·유지관리 외주인가?
      suggest_keywords: [전자금융, 전자금융거래, 정보처리시스템, 금융거래정보, 전산실, 전자금융보조업자, 금융거래]
      activation: strong
    - id: X-INSMOD
      name: 보험모집 규제
      always_on: false
      screening_question: 보험 모집·판매 또는 대리·중개(방카·GA·제휴판매 등) 업무를 위탁·수행하는가?
      suggest_keywords: [모집, 보험설계사, 보험대리점, 보험중개사, 모집종사자, 방카, 위탁판매, 대리ㆍ중개]
      activation: strong
    - id: X-IP
      name: 산출물·지식재산권
      always_on: false
      screening_question: 용역·개발 산출물의 인도, 지식재산권 귀속, 제3자·오픈소스 라이선스가 쟁점인가?
      suggest_keywords: [저작재산권, 소스코드, 산출물, 지식재산권, 2차적저작물, 오픈소스, 라이선스, 에스크로, 임치]
      activation: strong
    - id: X-PII
      name: 개인(신용)정보 처리·제공
      always_on: false
      screening_question: 이 계약에서 개인정보·개인신용정보를 제공·처리·위탁하는가?
      suggest_keywords: [개인정보, 신용정보, 고객정보, 정보주체, 개인신용정보]
      activation: confirm
    - id: X-REINS
      name: 재보험
      always_on: false
      screening_question: 재보험 출재·수재 또는 공동재보험 협약인가?
      suggest_keywords: [재보험, 출재, 수재, 공동재보험]
    - id: X-RELATED
      name: 대주주·계열사 거래제한
      always_on: false
      screening_question: 계약 상대방이 미래에셋 계열사·대주주·특수관계인이거나, 브랜드(상표) 사용료·그룹 내부거래가 포함되는가?
      suggest_keywords: [계열사, 계열회사, 대주주, 특수관계, 특수관계인, 관계회사, 상표 사용, 상표사용료, 브랜드 수수료, 브랜드사용료, 그룹, 내부거래, 신용공여]
      activation: confirm
    - id: X-SEC
      name: 담보(질권·저당·양도담보)
      always_on: false
      screening_question: 채권 담보로 질권·저당·양도담보를 설정하는가?
      suggest_keywords: [담보, 질권, 근질권, 저당, 근저당, 채권양도, 양도담보]
    - id: X-SUB
      name: 하도급법(대금·부당특약)
      always_on: false
      screening_question: 원사업자·수급사업자 간 제조·수리·건설·용역위탁으로 하도급법 적용대상에 해당하는가?
      suggest_keywords: [하도급, 하도급대금, 수급사업자, 원사업자, 준공금, 기성금, 건설위탁, 부당특약]
      activation: strong
checks:
  - id: CMN-01
    check: 계약 당사자가 법인 명의로 정확히 특정되어 있는가(영업점·부서 명의 아님)
    label: "계약당사자 법인 특정"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [당사자, 계약당사자, 갑과 을]
    absence_check: true
    sources: []
  - id: CMN-02
    check: 계약의 목적 조항이 수행 업무의 실질(위탁·매매·용역 등 법적 성격)과 일치하게 기재되어 있는가
    label: "목적조항 실질 부합"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
