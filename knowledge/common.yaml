  modules: []
checkpoints:
  - id: CMN-01
    title: 당사자·계약 목적 특정
    severity: 필수
    triggers:
      keywords: [목적, 당사자, 갑, 을]
    absence_check: true
    guidance: >
      계약 당사자의 명칭·법인격이 정확히 특정되어 있는지, 계약의 목적 조항이
      수행 업무의 실질과 일치하는지 확인해야 함. 목적 조항은 이후 조항의 해석
      기준이 되므로 위탁·매매·용역 등 계약의 법적 성격이 드러나도록 기재되어야 함.
      당사자 표시가 영업점·부서 명의로 되어 있으면 계약 주체의 권리능력 문제가
      생길 수 있으므로 법인 명의로 정정을 요구해야 함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-02
    title: 대금·지급조건·정산
    severity: 필수
    triggers:
      keywords: [대금, 수수료, 지급, 정산, 대가]
    absence_check: true
    guidance: >
      대금·수수료의 금액 또는 산정 방식, 지급 시기·방법, 정산 절차가 명확한지
      확인해야 함. 산정 기준이 "협의하여 정한다"로만 되어 있으면 분쟁 시 금액
      확정이 곤란하므로 산식·단가·정산 주기를 특정하도록 요구함. 부가가치세
      포함 여부, 지연지급 시 지연이자 약정 유무도 함께 점검함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-03
    title: 계약기간·갱신
    severity: 필수
    triggers:
      keywords: [계약기간, 유효기간, 갱신, 존속기간]
    absence_check: true
    guidance: >
      계약기간의 시기·종기, 갱신 방식(자동갱신·합의갱신)과 갱신 거절 통지
      기한이 명확한지 확인해야 함. 자동갱신 조항은 장기 구속 위험이 있으므로
      갱신 횟수 제한 또는 갱신 시 조건 재협의 근거를 두는 것이 안전함.
      기간 만료 후 업무가 사실상 계속되는 경우의 처리(묵시적 갱신 여부)도
      계약서에서 정리해 두는 것이 바람직함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-04
    title: 해지·해제 사유와 절차
    severity: 필수
    triggers:
      keywords: [해지, 해제, 계약의 종료, 최고]
    absence_check: true
    guidance: >
      약정 해지·해제 사유(중대한 위반, 도산, 신용상태 악화 등)와 절차(시정 최고
      기간, 서면 통지)가 균형 있게 규정되어 있는지 확인해야 함. 일방 당사자만
      임의해지권을 갖는 편면적 조항은 협상으로 상호화하거나 통지 기간을 확보해야 함.
      해지 시 기지급 대금 정산, 자료 반환, 잔존 조항(비밀유지 등)의 처리가
      연동되어 규정되어 있는지 함께 점검함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-05
    title: 손해배상·책임 범위
    severity: 필수
    triggers:
      keywords: [손해배상, 배상책임, 배상, 면책]
    absence_check: true
    guidance: >
      귀책사유·배상 범위·책임 상한(cap)·면책 사유가 어떻게 배분되어 있는지
      확인해야 함. 민법 제393조는 채무불이행 손해배상을 통상손해 한도로 하고
      특별손해는 예견가능성이 있는 때에 한하여 배상하도록 정하나(제1항·제2항),
      임의규정이므로 계약상 확장·제한 특약이 우선함. 당사의 책임만 무제한이고
      상대방 책임에는 상한이 있는 비대칭 구조인지, 간접손해·일실이익 배제 문언이
      당사에 불리하게 작동하는지 점검함. 고의·중과실에 대한 책임 제한은 효력이
      부정될 수 있으므로 상한 예외로 명시하는 것이 안전함.
    legal_basis:
      - law: 민법
        article: 제393조
        verified: false
    jid_refs: []
    news_refs: []
  - id: CMN-06
    title: 비밀유지
    severity: 필수
    triggers:
      keywords: [비밀유지, 기밀, 비공개, 영업비밀]
    absence_check: true
    guidance: >
      비밀정보의 정의·범위, 존속기간(계약 종료 후 잔존 여부), 위반 시 구제수단을
      확인해야 함. 금융회사는 고객정보가 포함될 수 있어 단순 영업비밀 조항으로
      갈음할 수 없으며, 개인정보 포함 시 관련 모듈 검토가 별도로 필요함.
      존속기간 무제한 조항은 유효성 다툼 여지가 있으므로 기간 명시를 권장함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-07
    title: 지식재산권 귀속
    severity: 권장
    triggers:
      keywords: [지식재산, 저작권, 특허, 산출물, 결과물]
    absence_check: true
    guidance: >
      계약 이행 과정에서 발생하는 산출물·저작물의 권리 귀속(원시취득·양도·공유)과
      기존 보유 지식재산의 이용 허락 범위가 구분되어 규정되어 있는지 확인해야 함.
      개발 위탁의 경우 산출물 저작권이 수탁자에게 남으면 계약 종료 후 이용이
      제한될 수 있으므로 위탁자 귀속 또는 포괄적 이용허락을 확보해야 함.
      제3자 권리 침해 시 수탁자의 방어·면책 의무 조항 유무도 점검함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-08
    title: 분쟁해결·관할
    severity: 권장
    triggers:
      keywords: [관할, 분쟁, 중재, 법원, 준거법]
    absence_check: true
    guidance: >
      분쟁해결 방식(소송·중재)과 관할 법원의 지정이 명확한지 확인해야 함.
      전속적 합의관할인지 부가적 합의인지 문언으로 구분되는지, 지정 법원이
      당사에 현저히 불리한 원격지가 아닌지 점검함. 협의 조항과 중재 조항,
      소송 조항이 병존하면 어느 절차가 우선하는지 충돌이 생기므로 단일한
      경로로 정리를 요구함. 국제계약이면 준거법 조항을 별도로 확인해야 함.
      (관할 합의 관련 민사소송법 조문은 로컬 DB 미수록 — 조문 미확인)
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-09
    title: 권리의무 양도 금지
    severity: 권장
    triggers:
      keywords: [양도, 이전, 승계, 담보 제공]
    absence_check: true
    guidance: >
      계약상 지위 또는 권리의무를 상대방 사전 서면 동의 없이 제3자에게 양도·이전·
      담보 제공하지 못하도록 하는 조항이 있는지 확인해야 함. 위탁계약에서는
      수탁자 변경이 실질적 재위탁과 같은 효과를 가지므로 양도 금지 조항이
      재위탁 통제 조항과 정합적으로 규정되어야 함. 합병·영업양도 등 포괄승계의
      처리(통지 의무 또는 해지 사유화)도 함께 점검함.
    legal_basis: []
    jid_refs: []
    news_refs: []
  - id: CMN-10
    title: 완전합의·변경 방식
    severity: 참고
    triggers:
      keywords: [완전합의, 서면 변경, 완전한 합의, 변경 또는 수정]
    absence_check: false
    guidance: >
      계약서가 당사자 간 최종적·완전한 합의임을 확인하는 완전합의 조항과
      계약 변경은 서면(양 당사자 기명날인)으로만 가능하다는 변경 방식 조항의
      유무를 확인함. 완전합의 조항이 있으면 계약 체결 전 구두 설명·제안서 내용을
      원용하기 어려우므로, 중요한 사전 합의는 본문 또는 별첨에 편입시켜야 함.
    legal_basis: []
    jid_refs: []
    news_refs: []
