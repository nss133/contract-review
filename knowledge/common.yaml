    absence_check: true
    sources: []
  - id: CMN-16
    check: 비밀유지 의무의 존속기간(계약 종료 후 잔존 여부·기간)이 명시되어 있는가
    label: "비밀유지 존속기간"
    severity: 참고
    severity_basis: "실무 관행 항목(법령 강제 아님)"
    norm_type: 실무
    basis: practice
    triggers:
      keywords: [종료 후에도, 존속한다, 비밀유지]
    absence_check: true
