<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>계약서 리뷰 가이드 — 법무팀</title>
<style>* { box-sizing: border-box; }
body { margin: 0; font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
       color: #1a1a2e; background: #f5f6fa; }
.topbar { display: flex; align-items: center; gap: 24px; padding: 12px 20px;
          background: #1a1a2e; color: #fff; }
.topbar h1 { font-size: 17px; margin: 0; }
.tab { background: none; border: none; color: #aab; padding: 8px 14px;
       font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #4ea1ff; }
.tab:disabled { opacity: .35; cursor: default; }
main { max-width: 1200px; margin: 0 auto; padding: 20px; }
.pane { display: none; }
.pane.active { display: block; }
.controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 12px; }
select, input[type=search], textarea { font: inherit; padding: 6px 10px;
  border: 1px solid #ccd; border-radius: 6px; }
textarea#contract-text { width: 100%; height: 200px; }
.primary { background: #2456e6; color: #fff; border: none; border-radius: 6px;
           padding: 9px 18px; font-size: 14px; cursor: pointer; }
.filebtn { display: inline-block; padding: 8px 14px; border: 1px dashed #99a;
           border-radius: 6px; cursor: pointer; font-size: 13px; }
.error { color: #c0392b; }
.module-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.module-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid #bbc;
               background: #fff; font-size: 13px; cursor: pointer; }
.module-chip.on { background: #2456e6; color: #fff; border-color: #2456e6; }
.module-chip.suggested { border-color: #e67e22; box-shadow: 0 0 0 2px #f8c47155; }

#input-panel { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
               padding: 4px 16px 16px; margin-bottom: 16px; }
#input-panel summary { cursor: pointer; padding: 10px 0; font-weight: 600; }
.input-actions { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
#analyze-setup { margin-top: 12px; }

.cp-card { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
           padding: 14px 16px; margin-bottom: 10px; }
.cp-card h3 { margin: 0 0 6px; font-size: 15px; }
.cp-card .norm-type { font-size: 12px; color: #667; font-weight: normal; margin-left: 4px; }
.cp-card .check-q { font-weight: 600; margin: 6px 0; }
.sev { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-right: 6px; }
.sev-필수 { background: #fdecea; color: #c0392b; }
.sev-권장 { background: #fef5e7; color: #b9770e; }
.sev-참고 { background: #eaf2f8; color: #21618c; }

.badge { font-size: 11px; padding: 1px 7px; border-radius: 8px; white-space: nowrap; }
.badge.verified { background: #e8f8f0; color: #1e8449; }
.badge.unverified { background: #fef5e7; color: #b9770e; }
.badge.quote-ok { background: #eef2f8; color: #46618c; }
.badge.mismatch { background: #fdecea; color: #c0392b; }
.badge.missing { background: #fdecea; color: #c0392b; }
.badge.ref { background: #eaeef5; color: #48587a; }
.badge.practice { background: #eef0f3; color: #555; }
.badge.cov-addressed { background: #e8f8f0; color: #1e8449; }
.badge.cov-verify { background: #e5f3fa; color: #1a6f96; }
.badge.cov-consider { background: #fef5e7; color: #b9770e; }
.badge.cov-quiet { background: #eef0f3; color: #99a; }
.badge.self-reg { background: #efe9fa; color: #6c3fb5; }

details.law { margin-top: 8px; font-size: 13px; }
details.law pre { white-space: pre-wrap; background: #f8f9fc; padding: 10px;
                  border-radius: 6px; max-height: 300px; overflow-y: auto; }

.quote-block { margin: 8px 0; padding: 8px 12px; background: #f2f6ff;
               border-left: 4px solid #2456e6; border-radius: 0 6px 6px 0; }
.quote-block .quote-label { margin: 0 0 4px; font-size: 11px; color: #2456e6;
                             font-weight: 600; }
.quote-block blockquote { margin: 0; font-size: 13px; line-height: 1.6; }
.match-excerpt { margin-top: 8px; }
.match-excerpt pre { white-space: pre-wrap; font: 13px/1.6 inherit; background: #f8f9fc;
                     padding: 10px; border-radius: 6px; }
.reasons { font-size: 12px; color: #667; }
.ranked-alt { font-size: 12px; color: #667; margin-top: 6px; }
.note { font-size: 12px; color: #667; margin-top: 8px; }

/* 체크리스트 표 */
#checklist-table { width: 100%; border-collapse: collapse; background: #fff;
                    border: 1px solid #e0e2ee; border-radius: 8px; overflow: hidden; }
#checklist-table th, #checklist-table td { padding: 10px 12px; text-align: left;
                    border-bottom: 1px solid #e8eaf2; font-size: 13px; vertical-align: top; }
#checklist-table th { background: #f0f2fa; font-size: 12px; color: #445; }
#checklist-table tr.cp-row { cursor: pointer; }
#checklist-table tr.cp-row:hover { background: #f7f9ff; }
#checklist-table tr.row-consider { background: #fefaf1; }
#checklist-table tr.row-consider:hover { background: #fdf3df; }
#checklist-table tr.expanded { background: #eef2fd; }
#checklist-table tr.cp-detail td { background: #fafbff; padding: 14px 20px; }
.match-cell { font-weight: 600; white-space: nowrap; }
.match-cell.cov-addressed { color: #1e8449; }
.match-cell.cov-verify { color: #1a6f96; }
.match-cell.cov-consider { color: #b9770e; }
.match-cell.cov-quiet { color: #aab; font-weight: normal; }
.sev-basis-hint { display: block; font-size: 11px; color: #889; font-weight: normal;
                  margin-top: 3px; line-height: 1.35; }
.sev-basis { font-size: 12px; color: #778; margin: 2px 0 6px; }
td.empty { text-align: center; color: #889; padding: 24px; }

.empty-note { color: #667; }
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.col { max-height: 75vh; overflow-y: auto; }
.clause { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
          padding: 12px; margin-bottom: 8px; cursor: pointer; }
.clause.sel { border-color: #2456e6; box-shadow: 0 0 0 2px #2456e633; }
.clause .cnt { float: right; font-size: 12px; color: #2456e6; }
.clause pre { white-space: pre-wrap; font: 13px/1.6 inherit; margin: 6px 0 0; }
.consider-item { border-left: 4px solid #e0a83e; }

/* 조항별 좌우대비 */
.clause-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.compare-col { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px; padding: 12px 14px; }
.compare-col h3 { margin: 0 0 10px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.addressed-col { border-top: 3px solid #1e8449; }
.verify-col { border-top: 3px solid #1a6f96; }
.compare-item { border-bottom: 1px solid #eef0f5; padding: 8px 0; }
.compare-item:last-child { border-bottom: none; }
.compare-item .ci-head { display: flex; align-items: center; gap: 6px; }
.compare-item .ci-id { font-size: 12px; color: #667; font-weight: 600; }
.compare-item .ci-q { margin: 4px 0; font-size: 13px; font-weight: 600; }
.compare-item .ci-reason { margin: 2px 0; font-size: 12px; color: #556; }
.compare-item .ci-basis { margin: 2px 0; font-size: 11px; color: #889; }
.compare-item .ci-src { margin: 4px 0 0; font-size: 12px; }
.compare-empty { color: #99a; font-size: 12px; margin: 4px 0; }
@media (max-width: 720px) { .clause-compare { grid-template-columns: 1fr; } }
.disclaimer { text-align: center; font-size: 12px; color: #667; padding: 16px;
              border-top: 1px solid #dde; margin-top: 30px; }

/* 리포트 — 긍정-먼저 검토 워크시트 */
#report-body h2 { font-size: 18px; margin: 0 0 6px; }
.report-intro { color: #556; font-size: 13px; margin: 0 0 16px; line-height: 1.6; }
.report-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.tile { border: 1px solid #e0e2ee; border-radius: 10px; padding: 16px 18px;
        display: flex; flex-direction: column; gap: 3px; background: #fff; }
.tile .tile-n { font-size: 30px; font-weight: 700; line-height: 1; }
.tile .tile-label { font-size: 14px; font-weight: 600; }
.tile .tile-sub { font-size: 12px; color: #778; }
.tile-addressed { border-top: 4px solid #1e8449; }
.tile-addressed .tile-n { color: #1e8449; }
.tile-verify { border-top: 4px solid #1a6f96; }
.tile-verify .tile-n { color: #1a6f96; }
.tile-consider { border-top: 4px solid #b9770e; }
.tile-consider .tile-n { color: #b9770e; }
@media (max-width: 720px) { .report-tiles { grid-template-columns: 1fr; } }

.report-sec-block { margin-bottom: 16px; }
.report-sec-block h3 { font-size: 15px; margin: 0 0 4px; }
.sec-hint { font-size: 12px; color: #889; margin: 0 0 10px; }
.report-sec { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
              padding: 6px 14px; margin-bottom: 12px; }
.report-sec > summary { cursor: pointer; padding: 8px 0; font-weight: 600; font-size: 14px; }
.report-none { color: #889; font-size: 13px; margin: 8px 0; }

.report-item { border: 1px solid #eceef5; border-radius: 8px; padding: 12px 14px;
               margin-bottom: 8px; background: #fff; }
.report-item.consider-item { border-left: 4px solid #e0a83e; }
.report-item.verify-item { border-left: 4px solid #1a6f96; }
.report-item.addressed-item { border-left: 4px solid #1e8449; }
.report-item .ri-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.report-item .ri-q { font-weight: 600; font-size: 14px; }
.report-item .ri-why { font-size: 12px; color: #8a6d1f; margin: 6px 0 4px; }
.report-item .ri-loc { font-size: 12px; color: #556; margin: 6px 0 2px; }
.report-item .ri-reason { font-size: 12px; color: #667; margin: 2px 0; }
.report-item .ri-src { font-size: 12px; color: #556; margin: 6px 0 4px; }
.signoff { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
           color: #445; margin-top: 6px; cursor: pointer; }
.report-more { margin-top: 4px; }
.report-more > summary { cursor: pointer; font-size: 13px; color: #48587a; padding: 6px 0; }

.clause-summary { list-style: none; padding: 0; margin: 8px 0; }
.clause-summary li { padding: 6px 0; border-bottom: 1px solid #f0f2f7; font-size: 13px; }
.clause-summary li:last-child { border-bottom: none; }
.clause-summary .cs-cnt { float: right; font-size: 12px; color: #2456e6; }

@media print { .topbar, .disclaimer, button { display: none; }
               .pane { display: none; } #pane-report { display: block; }
               .report-tiles { break-inside: avoid; }
               .report-item, .tile { break-inside: avoid; }
               .report-sec, .report-more { border: none; padding: 0; } }

.verify-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.verify-progress { font-weight: 600; }
.verify-card { border: 1px solid #dde; border-radius: 8px; padding: 14px; margin-bottom: 14px; background: #fff; }
.verify-card.practice { opacity: .6; }
.verify-card h3 { margin: 0 0 6px; font-size: 15px; }
.verify-card .sev-basis { color: #556; font-size: 13px; margin: 2px 0; }
.verify-card .cp-note { color: #667; font-size: 13px; }
.verify-src { border-top: 1px solid #eef; margin-top: 10px; padding-top: 10px; }
.src-head { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
.compare { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cmp-label { font-size: 11px; color: #889; margin-bottom: 4px; }
.cmp-quote blockquote { margin: 0; padding: 8px 10px; background: #eef6ff; border-left: 3px solid #4a90d9; font-size: 13px; }
.cmp-text pre { margin: 0; padding: 8px 10px; background: #f7f8fa; border-radius: 4px; white-space: pre-wrap; font-size: 13px; max-height: 220px; overflow: auto; }
.cmp-text mark { background: #ffe08a; }
.decide { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
.dec-btn { border: 1px solid #ccd; background: #fff; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
.dec-btn.active.dec-확인 { background: #1f9d55; color: #fff; border-color: #1f9d55; }
.dec-btn.active.dec-보류 { background: #b9902a; color: #fff; border-color: #b9902a; }
.dec-btn.active.dec-수정필요 { background: #c0392b; color: #fff; border-color: #c0392b; }
.dec-note { flex: 1; min-width: 160px; padding: 5px 8px; border: 1px solid #ccd; border-radius: 6px; font-size: 13px; }
.src-decided.verified { margin-top: 8px; color: #1f9d55; font-weight: 600; font-size: 13px; }
@media (max-width: 720px) { .compare { grid-template-columns: 1fr; } }

/* ---------- 조항별 검토의견(verdict) ---------- */
.verdict-ctl { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
.vd-btn { border: 1px solid #ccd; background: #fff; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
.vd-btn:hover { background: #f3f5f9; }
.vd-btn.active.vd-ok { background: #1f9d55; color: #fff; border-color: #1f9d55; }
.vd-btn.active.vd-comment { background: #d98a1f; color: #fff; border-color: #d98a1f; }
.vd-btn.active.vd-na { background: #8a94a6; color: #fff; border-color: #8a94a6; }
.vd-note { display: none; flex: 1; min-width: 140px; padding: 4px 8px; border: 1px solid #ccd; border-radius: 6px; font-size: 12px; }
.vd-note.show { display: inline-block; }
/* 리포트 판정 배지 */
.vd-badge { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
.vd-badge.vd-ok { background: #e3f5ea; color: #1f7a44; }
.vd-badge.vd-comment { background: #fdf0dc; color: #a8660f; }
.vd-badge.vd-na { background: #eef0f3; color: #667; }
.report-verdict-summary { display: flex; gap: 10px; margin: 8px 0; font-size: 13px; }
.opinion-item { border-left: 3px solid #d98a1f; padding: 6px 10px; margin: 6px 0; background: #fffaf2; }
.opinion-item .oi-comment { font-size: 13px; color: #7a4d0a; margin: 3px 0 0; }
.verdict-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; padding: 8px 0; border-bottom: 1px solid #eef0f5; }
.verdict-bar-label { font-size: 12px; color: #667; margin-right: auto; }
.ghost { border: 1px solid #ccd; background: #fff; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
.ghost:hover { background: #f3f5f9; }
.screening-hint { font-size: 12px; color: #667; margin: 8px 0 4px; }
.tag-bar { margin: 4px 0 10px; font-size: 12px; }
.tag-bar-label { color: #667; }
.ctag { display: inline-block; background: #eef2f8; color: #46618c; border: 1px solid #d5deec;
        border-radius: 12px; padding: 2px 10px; font-size: 12px; margin-right: 4px; }

/* 리포트 결론 배너(#7) + 필수 강조(#3) */
.report-concl { display: flex; align-items: baseline; gap: 10px; padding: 12px 16px; border-radius: 8px;
                margin: 4px 0 12px; font-size: 15px; font-weight: 600; line-height: 1.5; }
.report-concl .concl-label { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
                background: rgba(255,255,255,.7); flex-shrink: 0; }
.concl-alert { background: #fdecea; color: #b32b1f; border: 1px solid #f0b4ab; }
.concl-caution { background: #fef6e7; color: #9a6a10; border: 1px solid #f2d492; }
.concl-ok { background: #e9f7ef; color: #1c7a44; border: 1px solid #b6e2c8; }
.tile-consider.tile-must { border-top-color: #c0392b; }
.tile-consider.tile-must .tile-n { color: #c0392b; }
.tile-consider.tile-must .tile-sub { color: #c0392b; font-weight: 600; }

/* 조항별 보기 — 검토 제안 전용 진입·패널 */
.clause-consider { border-left: 4px solid #e0a83e; background: #fffdf7; }
.clause-consider strong { color: #9a6a10; }
.consider-panel { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px; padding: 12px 14px; border-top: 3px solid #e0a83e; }
.consider-panel h3 { margin: 0 0 8px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.consider-hint { font-size: 12px; color: #778; margin: 0 0 12px; }
</style>
</head>
<body>
<header class="topbar">
  <h1>계약서 리뷰 가이드</h1>
  <nav>
    <button data-tab="checklist" class="tab active">체크리스트</button>
    <button data-tab="clauses" class="tab">조항별 보기</button>
    <button data-tab="report" class="tab" id="report-tab" disabled>리포트</button>
    <button data-tab="verify" class="tab">검수</button>
  </nav>
</header>

<main>
  <!-- 체크리스트 (주 탭) -->
  <section id="pane-checklist" class="pane active">
    <details id="input-panel" open>
      <summary>계약서 입력</summary>
      <div id="analyze-input">
        <textarea id="contract-text" placeholder="계약서 텍스트를 붙여넣으세요"></textarea>
        <div class="input-actions">
          <label class="filebtn">.docx 열기<input id="docx-file" type="file" accept=".docx" hidden></label>
          <button id="btn-analyze" class="primary">분석 시작</button>
        </div>
        <p id="input-error" class="error" hidden></p>
      </div>
      <div id="analyze-setup" hidden>
        <div id="tag-bar" class="tag-bar"></div>
        <p class="screening-hint">적용 모듈(규제 레짐) — 칩을 눌러 켜고 끄면 즉시 재검토됩니다</p>
        <div id="screening" class="module-bar"></div>
      </div>
    </details>

    <div class="controls" id="checklist-toolbar">
      <label>계약 유형 <select id="checklist-type"></select></label>
      <label>모듈 <select id="filter-module"><option value="">전체</option></select></label>
      <label>심각도 <select id="filter-severity">
        <option value="">전체</option>
        <option value="필수">필수</option>
        <option value="권장">권장</option>
        <option value="참고">참고</option>
      </select></label>
      <label>검토상태 <select id="filter-match">
        <option value="">전체</option>
        <option value="unmatched">검토 제안만</option>
        <option value="matched">반영·확인만</option>
      </select></label>
      <input id="filter-search" type="search" placeholder="확인사항·법령 검색">
    </div>
    <div id="checklist-modules" class="module-bar"></div>

    <table id="checklist-table">
      <thead>
        <tr><th>매칭</th><th>ID</th><th>확인 사항</th><th>심각도</th><th>규범</th><th>근거</th></tr>
      </thead>
      <tbody id="checklist-body"></tbody>
    </table>
  </section>

  <!-- 조항별 보기 (보조 탭) -->
  <section id="pane-clauses" class="pane">
    <p id="clauses-empty" class="empty-note">먼저 체크리스트 탭에서 계약서를 분석하세요.</p>
    <div id="analyze-result" hidden>
      <div class="verdict-bar">
        <span class="verdict-bar-label">조항을 눌러 검토항목에 이상없음/검토의견/해당없음을 표시</span>
        <button id="verdict-export" class="ghost">검토의견 내보내기</button>
        <label class="filebtn ghost">불러오기<input id="verdict-import" type="file" accept=".json" hidden></label>
      </div>
      <div class="split">
        <div id="clause-list" class="col"></div>
        <div id="mapping-detail" class="col"></div>
      </div>
    </div>
  </section>

  <!-- 종합 리포트 -->
  <section id="pane-report" class="pane">
    <div id="report-body"></div>
    <button onclick="window.print()">인쇄</button>
  </section>

  <section id="pane-verify" class="pane">
    <div class="verify-bar">
      <span id="verify-progress" class="verify-progress"></span>
      <label>유형 <select id="verify-type"></select></label>
      <label>상태
        <select id="verify-filter">
          <option value="all">전체</option>
          <option value="unreviewed">미검수만</option>
          <option value="needsfix">수정 필요만</option>
          <option value="confirmed">확인됨</option>
        </select>
      </label>
      <button id="verify-export" class="primary">판정 내보내기</button>
    </div>
    <div id="verify-list"></div>
  </section>

"sources": [{"law": "독점규제 및 공정거래에 관한 법률", "article": "제45조", "clause": "제1항 제6호", "quote": "자기의 거래상의 지위를 부당하게 이용하여 상대방과 거래하는 행위", "verified": true, "source_type": "law", "text": "제45조(불공정거래행위의 금지)\n① 사업자는 다음 각 호의 어느 하나에 해당하는 행위로서 공정한 거래를 해칠 우려가 있는 행위(이하 \"불공정거래행위\"라 한다)를 하거나, 계열회사 또는 다른 사업자로 하여금 이를 하도록 하여서는 아니 된다.\n6. 자기의 거래상의 지위를 부당하게 이용하여 상대방과 거래하는 행위\n7. 거래의 상대방의 사업활동을 부당하게 구속하는 조건으로 거래하는 행위", "status": "quote_ok"}, {"law": "독점규제 및 공정거래에 관한 법률", "article": "제45조", "clause": "제1항 제7호", "quote": "거래의 상대방의 사업활동을 부당하게 구속하는 조건으로 거래하는 행위", "verified": true, "source_type": "law", "text": "제45조(불공정거래행위의 금지)\n① 사업자는 다음 각 호의 어느 하나에 해당하는 행위로서 공정한 거래를 해칠 우려가 있는 행위(이하 \"불공정거래행위\"라 한다)를 하거나, 계열회사 또는 다른 사업자로 하여금 이를 하도록 하여서는 아니 된다.\n6. 자기의 거래상의 지위를 부당하게 이용하여 상대방과 거래하는 행위\n7. 거래의 상대방의 사업활동을 부당하게 구속하는 조건으로 거래하는 행위", "status": "quote_ok"}]}, {"id": "ALL-INS-01", "check": "보험 모집을 위탁하는 경우 모집 위탁 상대방이 법정 모집자격자(설계사·대리점·중개사 등)인가", "module": "M-INSMOD", "severity": "필수", "severity_basis": "강행규정 — 보험업법 제83조 제1항(모집할 수 있는 자 한정)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["모집", "위탁", "보험대리점", "설계사"]}, "absence_check": false, "sources": [{"law": "보험업법", "article": "제83조", "clause": "제1항", "quote": "모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다", "verified": true, "source_type": "law", "text": "제83조(모집할 수 있는 자)\n① 모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다.\n1. 보험설계사\n2. 보험대리점\n3. 보험중개사\n4. 보험회사의 임원 또는 직원", "status": "quote_ok"}]}, {"id": "ALL-REINS-01", "check": "재보험 출재 시 원보험계약의 효력과 분리(원계약 무영향)가 전제되어 있는가", "module": "M-REINS", "severity": "참고", "severity_basis": "선언규정 — 상법 제661조(재보험은 원보험계약 효력에 무영향)", "norm_type": "선언", "basis": "statute", "triggers": {"keywords": ["재보험", "출재", "원보험"]}, "absence_check": false, "sources": [{"law": "상법", "article": "제661조", "clause": "", "quote": "이 재보험계약은 원보험계약의 효력에 영향을 미치지 아니한다", "verified": true, "source_type": "law", "text": "제661조(재보험)\n보험자는 보험사고로 인하여 부담할 책임에 대하여 다른 보험자와 재보험계약을 체결할 수 있다. 이 재보험계약은 원보험계약의 효력에 영향을 미치지 아니한다.", "status": "quote_ok"}]}]}, {"meta": {"type_id": "finance", "type_name": "금융·여신", "detect_keywords": ["대출", "대출약정", "여신", "융자", "담보", "근질권", "질권", "저당", "근저당", "채권양수도", "ABL", "리파이낸싱", "PF", "이행보증", "보증보험", "대주", "소비대차", "신용공여"], "modules": [{"id": "M-LOAN", "name": "여신·대출", "always_on": true, "screening_question": "금전 대여(대출·여신)를 내용으로 하는가?", "suggest_keywords": ["대출", "여신", "융자", "대주", "소비대차"]}, {"id": "M-SEC", "name": "담보(질권·저당·양도담보)", "always_on": false, "screening_question": "채권 담보로 질권·저당·양도담보를 설정하는가?", "suggest_keywords": ["담보", "질권", "근질권", "저당", "근저당", "채권양도", "양도담보"]}, {"id": "M-GUAR", "name": "보증·이행보증", "always_on": false, "screening_question": "보증(연대보증·이행보증)이 포함되는가?", "suggest_keywords": ["보증", "연대보증", "이행보증", "보증보험"]}, {"id": "M-ASSET", "name": "보험업 자산운용 규제", "always_on": false, "screening_question": "보험회사가 대주(貸主)로서 자기자산을 운용하는 여신인가?", "suggest_keywords": ["보험회사", "신용공여", "자산운용", "대주주"]}]}, "checks": [{"id": "FIN-LOAN-01", "check": "대출원금(대여금액)과 인도(실행) 방법이 특정되어 있는가", "module": "M-LOAN", "severity": "참고", "severity_basis": "소비대차의 성립요건 — 민법 제598조(요물성 아님, 낙성계약이나 원금 특정은 계약 본질)", "norm_type": "선언", "basis": "statute", "triggers": {"keywords": ["대출금", "대여금", "대출원금", "실행"]}, "absence_check": false, "sources": [{"law": "민법", "article": "제598조", "clause": "", "quote": "금전 기타 대체물의 소유권을 상대방에게 이전할 것을 약정하고 상대방은 그와 같은 종류, 품질 및 수량으로 반환할 것을 약정", "verified": true, "source_type": "law", "text": "제598조(소비대차의 의의)\n소비대차는 당사자 일방이 금전 기타 대체물의 소유권을 상대방에게 이전할 것을 약정하고 상대방은 그와 같은 종류, 품질 및 수량으로 반환할 것을 약정함으로써 그 효력이 생긴다.", "status": "quote_ok"}]}, {"id": "FIN-LOAN-02", "check": "이자율과 이자 기산일(인도일 기준)이 명시되어 있는가", "module": "M-LOAN", "severity": "권장", "severity_basis": "이자약정은 임의규정 — 민법 제600조(이자있는 소비대차의 기산)", "norm_type": "임의", "basis": "statute", "triggers": {"keywords": ["이자", "이자율", "이율"]}, "absence_check": true, "sources": [{"law": "민법", "article": "제600조", "clause": "", "quote": "이자있는 소비대차는 차주가 목적물의 인도를 받은 때로부터 이자를 계산하여야 하며", "verified": true, "source_type": "law", "text": "제600조(이자계산의 시기)\n이자있는 소비대차는 차주가 목적물의 인도를 받은 때로부터 이자를 계산하여야 하며 차주가 그 책임있는 사유로 수령을 지체할 때에는 대주가 이행을 제공한 때로부터 이자를 계산하여야 한다.", "status": "quote_ok"}]}, {"id": "FIN-LOAN-03", "check": "약정이자율이 이자제한법상 최고이자율(연 25% 이내 대통령령)을 초과하지 않는가", "module": "M-LOAN", "severity": "필수", "severity_basis": "강행규정 — 이자제한법 제2조(최고이자율 초과분 무효). 단 법인 여신 등 적용제외 확인 필요", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["이자율", "이율", "연체이자", "지연손해금"]}, "absence_check": false, "sources": [{"law": "이자제한법", "article": "제2조", "clause": "제1항·제3항", "quote": "최고이자율은 연 25퍼센트를 초과하지 아니하는 범위 안에서 대통령령으로 정한다", "verified": true, "source_type": "law", "text": "제2조(이자의 최고한도)\n①금전대차에 관한 계약상의 최고이자율은 연 25퍼센트를 초과하지 아니하는 범위 안에서 대통령령으로 정한다.\n③계약상의 이자로서 제1항에서 정한 최고이자율을 초과하는 부분은 무효로 한다.\n④채무자가 최고이자율을 초과하는 이자를 임의로 지급한 경우에는 초과 지급된 이자 상당금액은 원본에 충당되고, 원본이 소멸한 때에는 그 반환을 청구할 수 있다.\n⑤대차원금이 10만원 미만인 대차의 이자에 관하여는 제1항을 적용하지 아니한다.", "status": "quote_ok"}], "note": "대차원금 10만원 미만·법인 대상 여신 등 적용범위 확인 필요(이자제한법 제2조 제5항·대부업법 등)"}, {"id": "FIN-LOAN-04", "check": "지연손해금(연체이자)의 이율 또는 산정방법이 정해져 있는가", "module": "M-LOAN", "severity": "권장", "severity_basis": "금전채무 지연손해는 약정이율 우선 적용 — 민법 제397조(약정 없으면 법정이율)", "norm_type": "임의", "basis": "statute", "triggers": {"keywords": ["지연손해금", "연체이자", "지연배상", "연체료"]}, "absence_check": true, "sources": [{"law": "민법", "article": "제397조", "clause": "제1항", "quote": "금전채무불이행의 손해배상액은 법정이율에 의한다. 그러나 법령의 제한에 위반하지 아니한 약정이율이 있으면 그 이율에 의한다", "verified": true, "source_type": "law", "text": "제397조(금전채무불이행에 대한 특칙)\n①금전채무불이행의 손해배상액은 법정이율에 의한다. 그러나 법령의 제한에 위반하지 아니한 약정이율이 있으면 그 이율에 의한다.\n②전항의 손해배상에 관하여는 채권자는 손해의 증명을 요하지 아니하고 채무자는 과실없음을 항변하지 못한다.", "status": "quote_ok"}]}, {"id": "FIN-SEC-01", "check": "동산질권 설정 시 목적물 점유 이전(질물 인도)이 규정되어 있는가", "module": "M-SEC", "severity": "필수", "severity_basis": "강행규정(효력요건) — 민법 제330조(질권설정은 목적물 인도로 효력 발생, 요물성)", "norm_type": "선언", "severity_override": true, "basis": "statute", "triggers": {"keywords": ["동산질권", "질권", "질물", "점유", "인도"]}, "absence_check": false, "sources": [{"law": "민법", "article": "제330조", "clause": "", "quote": "질권의 설정은 질권자에게 목적물을 인도함으로써 그 효력이 생긴다", "verified": true, "source_type": "law", "text": "제330조(설정계약의 요물성)\n질권의 설정은 질권자에게 목적물을 인도함으로써 그 효력이 생긴다.", "status": "quote_ok"}]}, {"id": "FIN-SEC-02", "check": "지명채권(예금 등) 질권 설정 시 제3채무자 통지·승낙(대항요건)이 규정되어 있는가", "module": "M-SEC", "severity": "필수", "severity_basis": "강행규정(대항요건) — 민법 제349조(질권설정 통지·승낙 없으면 제3채무자·제3자 대항 불가)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["예금질권", "근질권", "채권질권", "제3채무자", "통지", "승낙"]}, "absence_check": true, "sources": [{"law": "민법", "article": "제349조", "clause": "제1항", "quote": "제삼채무자에게 질권설정의 사실을 통지하거나 제삼채무자가 이를 승낙함이 아니면 이로써 제삼채무자 기타 제삼자에게 대항하지 못한다", "verified": true, "source_type": "law", "text": "제349조(지명채권에 대한 질권의 대항요건)\n①지명채권을 목적으로 한 질권의 설정은 설정자가 제450조의 규정에 의하여 제삼채무자에게 질권설정의 사실을 통지하거나 제삼채무자가 이를 승낙함이 아니면 이로써 제삼채무자 기타 제삼자에게 대항하지 못한다.\n②제451조의 규정은 전항의 경우에 준용한다.", "status": "quote_ok"}]}, {"id": "FIN-SEC-03", "check": "저당권(근저당) 설정 시 피담보채권과 채권최고액이 특정되어 있는가", "module": "M-SEC", "severity": "필수", "severity_basis": "강행규정 — 민법 제357조(근저당은 채무 최고액 확정 필요)", "norm_type": "선언", "severity_override": true, "basis": "statute", "triggers": {"keywords": ["저당권", "근저당", "채권최고액", "피담보채권"]}, "absence_check": true, "sources": [{"law": "민법", "article": "제357조", "clause": "제1항", "quote": "저당권은 그 담보할 채무의 최고액만을 정하고 채무의 확정을 장래에 보류하여 이를 설정할 수 있다", "verified": true, "source_type": "law", "text": "제357조(근저당)\n①저당권은 그 담보할 채무의 최고액만을 정하고 채무의 확정을 장래에 보류하여 이를 설정할 수 있다. 이 경우에는 그 확정될 때까지의 채무의 소멸 또는 이전은 저당권에 영향을 미치지 아니한다.\n②전항의 경우에는 채무의 이자는 최고액 중에 산입한 것으로 본다.", "status": "quote_ok"}, {"law": "민법", "article": "제356조", "clause": "", "quote": "채무의 담보로 제공한 부동산에 대하여 다른 채권자보다 자기채권의 우선변제를 받을 권리", "verified": true, "source_type": "law", "text": "제356조(저당권의 내용)\n저당권자는 채무자 또는 제삼자가 점유를 이전하지 아니하고 채무의 담보로 제공한 부동산에 대하여 다른 채권자보다 자기채권의 우선변제를 받을 권리가 있다.", "status": "quote_ok"}]}, {"id": "FIN-SEC-04", "check": "저당권 피담보채권 범위(원본·이자·지연배상 1년분 한정)가 반영되어 있는가", "module": "M-SEC", "severity": "참고", "severity_basis": "강행규정이나 계약 임의조정 여지 낮음 — 민법 제360조(지연배상은 1년분 한정)", "norm_type": "강행", "severity_override": true, "basis": "statute", "triggers": {"keywords": ["피담보채권", "지연배상", "실행비용"]}, "absence_check": false, "sources": [{"law": "민법", "article": "제360조", "clause": "", "quote": "그러나 지연배상에 대하여는 원본의 이행기일을 경과한 후의 1년분에 한하여 저당권을 행사할 수 있다", "verified": true, "source_type": "law", "text": "제360조(피담보채권의 범위)\n저당권은 원본, 이자, 위약금, 채무불이행으로 인한 손해배상 및 저당권의 실행비용을 담보한다. 그러나 지연배상에 대하여는 원본의 이행기일을 경과한 후의 1년분에 한하여 저당권을 행사할 수 있다.", "status": "quote_ok"}]}, {"id": "FIN-SEC-05", "check": "채권양도담보 설정 시 채무자 통지·승낙(확정일자)으로 대항요건을 갖추는가", "module": "M-SEC", "severity": "필수", "severity_basis": "강행규정(대항요건) — 민법 제450조(채권양도 통지·승낙, 제3자 대항은 확정일자 요)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["채권양도", "양도담보", "채권양수도", "확정일자"]}, "absence_check": true, "sources": [{"law": "민법", "article": "제450조", "clause": "", "quote": "전항의 통지나 승낙은 확정일자있는 증서에 의하지 아니하면 채무자 이외의 제삼자에게 대항하지 못한다", "verified": true, "source_type": "law", "text": "제450조(지명채권양도의 대항요건)\n①지명채권의 양도는 양도인이 채무자에게 통지하거나 채무자가 승낙하지 아니하면 채무자 기타 제삼자에게 대항하지 못한다.\n②전항의 통지나 승낙은 확정일자있는 증서에 의하지 아니하면 채무자 이외의 제삼자에게 대항하지 못한다.", "status": "quote_ok"}]}, {"id": "FIN-GUAR-01", "check": "보증(연대보증)이 보증인의 기명날인·서명 있는 서면으로 표시되어 있는가", "module": "M-GUAR", "severity": "필수", "severity_basis": "강행규정(효력요건) — 민법 제428조의2(서면 아닌 보증은 무효, 전자적 형태 무효)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["보증", "연대보증", "보증인", "보증서"]}, "absence_check": true, "sources": [{"law": "민법", "article": "제428조의2", "clause": "제1항", "quote": "보증은 그 의사가 보증인의 기명날인 또는 서명이 있는 서면으로 표시되어야 효력이 발생한다", "verified": true, "source_type": "law", "text": "제428조의2(보증의 방식)\n① 보증은 그 의사가 보증인의 기명날인 또는 서명이 있는 서면으로 표시되어야 효력이 발생한다. 다만, 보증의 의사가 전자적 형태로 표시된 경우에는 효력이 없다.\n② 보증채무를 보증인에게 불리하게 변경하는 경우에도 제1항과 같다.\n③ 보증인이 보증채무를 이행한 경우에는 그 한도에서 제1항과 제2항에 따른 방식의 하자를 이유로 보증의 무효를 주장할 수 없다.", "status": "quote_ok"}]}, {"id": "FIN-GUAR-02", "check": "연대보증인 경우 최고·검색의 항변권 배제가 명확히 규정되어 있는가", "module": "M-GUAR", "severity": "권장", "severity_basis": "임의규정 — 민법 제437조(연대보증은 최고·검색 항변 배제, 단서). 계약상 연대 여부 명확화 필요", "norm_type": "임의", "basis": "statute", "triggers": {"keywords": ["연대보증", "최고", "검색", "항변"]}, "absence_check": false, "sources": [{"law": "민법", "article": "제437조", "clause": "", "quote": "보증인이 주채무자와 연대하여 채무를 부담한 때에는 그러하지 아니하다", "verified": true, "source_type": "law", "text": "제437조(보증인의 최고, 검색의 항변)\n채권자가 보증인에게 채무의 이행을 청구한 때에는 보증인은 주채무자의 변제자력이 있는 사실 및 그 집행이 용이할 것을 증명하여 먼저 주채무자에게 청구할 것과 그 재산에 대하여 집행할 것을 항변할 수 있다. 그러나 보증인이 주채무자와 연대하여 채무를 부담한 때에는 그러하지 아니하다.", "status": "quote_ok"}]}, {"id": "FIN-GUAR-03", "check": "보증인의 구상권(수탁보증인·공동보증인) 관련 사항이 정리되어 있는가", "module": "M-GUAR", "severity": "참고", "severity_basis": "임의규정 — 민법 제441조(수탁보증인 구상권). 채권자 관점에선 확인 정도", "norm_type": "임의", "severity_override": true, "basis": "statute", "triggers": {"keywords": ["구상권", "구상", "수탁보증"]}, "absence_check": false, "sources": [{"law": "민법", "article": "제441조", "clause": "제1항", "quote": "보증인이 된 자가 과실없이 변제 기타의 출재로 주채무를 소멸하게 한 때에는 주채무자에 대하여 구상권이 있다", "verified": true, "source_type": "law", "text": "제441조(수탁보증인의 구상권)\n①주채무자의 부탁으로 보증인이 된 자가 과실없이 변제 기타의 출재로 주채무를 소멸하게 한 때에는 주채무자에 대하여 구상권이 있다.\n②제425조제2항의 규정은 전항의 경우에 준용한다.", "status": "quote_ok"}]}, {"id": "FIN-ASSET-01", "check": "여신(신용공여)이 보험업법 자산운용 원칙(안정성·유동성·수익성·공익성)에 부합하는가", "module": "M-ASSET", "severity": "필수", "severity_basis": "강행규정 — 보험업법 제104조(자산운용 원칙·선관주의)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["자산운용", "신용공여", "선량한 관리자"]}, "absence_check": false, "sources": [{"law": "보험업법", "article": "제104조", "clause": "", "quote": "보험회사는 그 자산을 운용할 때 안정성ㆍ유동성ㆍ수익성 및 공익성이 확보되도록 하여야 한다", "verified": true, "source_type": "law", "text": "제104조(자산운용의 원칙)\n① 보험회사는 그 자산을 운용할 때 안정성ㆍ유동성ㆍ수익성 및 공익성이 확보되도록 하여야 한다.\n② 보험회사는 선량한 관리자의 주의로써 그 자산을 운용하여야 한다.", "status": "quote_ok"}]}, {"id": "FIN-ASSET-02", "check": "금지되는 자산운용(투기목적 대출·자기주식 취득 목적 대출·임직원 대출 등)에 해당하지 않는가", "module": "M-ASSET", "severity": "필수", "severity_basis": "강행규정(금지) — 보험업법 제105조(금지되는 자산운용)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["투기", "자기주식", "임직원 대출", "정치자금"]}, "absence_check": false, "sources": [{"law": "보험업법", "article": "제105조", "clause": "", "quote": "상품이나 유가증권에 대한 투기를 목적으로 하는 자금의 대출", "verified": true, "source_type": "law", "text": "제105조(금지 또는 제한되는 자산운용)\n보험회사는 그 자산을 다음 각 호의 어느 하나에 해당하는 방법으로 운용하여서는 아니 된다.\n1. 대통령령으로 정하는 업무용 부동산이 아닌 부동산(저당권 등 담보권의 실행으로 취득하는 부동산은 제외한다)의 소유\n3. 상품이나 유가증권에 대한 투기를 목적으로 하는 자금의 대출\n4. 직접ㆍ간접을 불문하고 해당 보험회사의 주식을 사도록 하기 위한 대출\n5. 직접ㆍ간접을 불문하고 정치자금의 대출\n6. 해당 보험회사의 임직원에 대한 대출(보험약관에 따른 대출 및 금융위원회가 정하는 소액대출은 제외한다)", "status": "quote_ok"}]}, {"id": "FIN-ASSET-03", "check": "대주주·동일차주 신용공여가 자산운용 한도(보험업법 제106조)를 초과하지 않는가", "module": "M-ASSET", "severity": "필수", "severity_basis": "강행규정(한도) — 보험업법 제106조(신용공여 비율 한도)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["신용공여", "동일차주", "한도", "대주주"]}, "absence_check": false, "sources": [{"law": "보험업법", "article": "제106조", "clause": "제1항", "quote": "동일차주에 대한 신용공여 또는 그 동일차주가 발행한 채권 및 주식 소유의 합계액 가. 일반계정: 총자산의 100분의 12", "verified": true, "source_type": "law", "text": "제106조(자산운용의 방법 및 비율)\n① 보험회사는 일반계정에 속하는 자산과 특별계정에 속하는 자산을 운용할 때 다음 각 호의 비율을 초과할 수 없다.\n1. 동일한 개인 또는 법인에 대한 신용공여 가. 일반계정: 총자산의 100분의 3 나. 특별계정: 각 특별계정 자산의 100분의 5\n3. 동일차주에 대한 신용공여 또는 그 동일차주가 발행한 채권 및 주식 소유의 합계액 가. 일반계정: 총자산의 100분의 12", "status": "quote_ok"}]}, {"id": "FIN-ASSET-04", "check": "대주주에 대한 신용공여 시 이사회 의결·공시 등 절차를 준수하는가", "module": "M-ASSET", "severity": "필수", "severity_basis": "강행규정 — 보험업법 제111조(대주주 거래제한, 이사회 의결·보고·공시)", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["대주주", "신용공여", "이사회", "공시"]}, "absence_check": false, "sources": [{"law": "보험업법", "article": "제111조", "clause": "제2항", "quote": "대통령령으로 정하는 금액 이상의 신용공여를 하거나 그 보험회사의 대주주가 발행한 채권 또는 주식을 대통령령으로 정하는 금액 이상으로 취득하려는 경우에는 미리 이사회의 의결을 거쳐야 한다", "verified": true, "source_type": "law", "text": "제111조(대주주와의 거래제한 등)\n① 보험회사는 직접 또는 간접으로 그 보험회사의 대주주와 다음 각 호의 행위를 하여서는 아니 된다.\n1. 대주주가 다른 회사에 출자하는 것을 지원하기 위한 신용공여\n② 보험회사는 그 보험회사의 대주주에 on": "클라우드컴퓨팅서비스 이용 또는 국외 정보처리 요소가 있는가?", "suggest_keywords": ["클라우드", "국외", "해외 이전", "AWS", "Azure", "리전"]}]}, "checks": [{"id": "ITSEC-01", "module": "M-ITSEC", "check": "외부주문 개발업무에 사용되는 업무장소·전산설비를 내부 업무용과 분리하여 설치·운영하는 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 전자금융감독규정 제60조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["분리", "업무장소", "전산설비", "개발 장소", "개발망"]}, "absence_check": true, "sources": [{"law": "전자금융감독규정", "article": "제60조", "clause": "제1항 제1호", "quote": "외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영", "verified": true, "text": "제60조(외부주문등에 대한 기준) ① 금융회사 또는 전자금융업자는 전자금융거래를 위한 외부주문등의 경우에는 다음 각 호의 사항을 준수하여야 한다.<개정 2013. 12. 3.> 1. 외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영<개정 2015. 2. 3.> 2. 금융회사와 이용자 간 암호화정보 해독 및 원장 등 중요 데이터 변경 금지<개정 2013. 12. 3.> 3. 계좌번호, 비밀번호 등 이용자 금융정보 무단보관 및 유출 금지 4. 접근매체 위ㆍ변조, 해킹, 개인정보유출 등에 대비한 보안대책 수립 5. 금융회사와 전자금융보조업자 간의 접속은 전용회선(전용회선과 동등한 보안수준을 갖춘 가상의 전용회선을 포함한다)을 사용<개정 2013. 12. 3., 2016. 10. 5.> 6. 정보처리시스템 장애 등 서비스 중단에 대비한 비상대책 수립 7. 외부주문등의 입찰ㆍ계약ㆍ수행ㆍ완료 등 각 단계별로 금융감독원장이 정하는 보안관리방안을 따를 것<개정 2015. 2. 3.> 8. 업무지속성을 위한 중요 전산자료의 백업(backup)자료 보존 및 백업설비 확보 등 백업대책 수립 9. 정보관리의 취약점을 최소화하고 보안유지를 위한 내부통제방안을 수립ㆍ운용하고, 통제는 제8조제1항제2호의 조직에서 수행<개정 2015. 2. 3.> 10. 전자금융보조업자에 대한 재무건전성을 연1회 이상 평가하여 재무상태 악화에 따른 도산에 대비하고 전자금융보조업자의 주요 경영활동에 대해 상시 모니터링을 실시 11. 전자금융보조업자가 제공하는 서비스의 품질수준을 연1회 이상 평가할 것 12. 전자금융보조업자가 사전 동의 없이 다시 외부주문등 계약을 체결하거나 계약업체를 변경하지 못하도록 하고, 사전 동의시 해당 계약서에 제7호의 사항을 기재하도록 통제<개정 2016. 6. 30.> 13. 업무수행인력에 대하여 사전 신원조회 실시(이 경우 신원보증보험 증권 징구로 갈음할 수 있다) 또는 대표자의 신원보증서 징구, 인력변경시 인수인계에 관한 사항 등을 포함한 업무수행인력 관리방안 수립<개정 2018. 12. 21.> 14. 외부주문등은 자체 보안성검토 및 정기(금융감독원장이 정하는 중요 점검사항에 대해서는 매일) 보안점검 실시<개정 2015. 2. 3.> ② 금융회사 또는 전자금융업자는 제1항제10호 및 제11호의 평가결과를 금융감독원장에게 보고하여야 한다.<개정 2013. 12. 3.> ③ 금융감독원장은 제2항의 규정에 따른 평가결과 보고를 접수하고, 그 평가실시 여부를 제58조제2항의 규정에 따른 정보기술부문 실태평가에 반영할 수 있다. ④ 법 제40조제6항 단서에서 \"금융위원회가 인정하는 경우\"란 전자금융거래정보의 보호와 관련된 전산장비ㆍ소프트웨어에 대한 개발ㆍ운영 및 유지관리 업무를 재위탁하는 경우로서 다음 각 호의  그 밖의 부정한 수단으로 영업비밀을 취득하는 행위(이하 \"부정취득행위\"라 한다) 또는 그 취득한 영업비밀을 사용하거나 공개(비밀을 유지하면서 특정인에게 알리는 것을 포함한다. 이하 같다)하는 행위\n나.  영업비밀에 대하여 부정취득행위가 개입된 사실을 알거나 중대한 과실로 알지 못하고 그 영업비밀을 취득하는 행위 또는 그 취득한 영업비밀을 사용하거나 공개하는 행위\n다.  영업비밀을 취득한 후에 그 영업비밀에 대하여 부정취득행위가 개입된 사실을 알거나 중대한 과실로 알지 못하고 그 영업비밀을 사용하거나 공개하는 행위\n라.  계약관계 등에 따라 영업비밀을 비밀로서 유지하여야 할 의무가 있는 자가 부정한 이익을 얻거나 그 영업비밀의 보유자에게 손해를 입힐 목적으로 그 영업비밀을 사용하거나 공개하는 행위\n마.  영업비밀이 라목에 따라 공개된 사실 또는 그러한 공개행위가 개입된 사실을 알거나 중대한 과실로 알지 못하고 그 영업비밀을 취득하는 행위 또는 그 취득한 영업비밀을 사용하거나 공개하는 행위\n바.  영업비밀을 취득한 후에 그 영업비밀이 라목에 따라 공개된 사실 또는 그러한 공개행위가 개입된 사실을 알거나 중대한 과실로 알지 못하고 그 영업비밀을 사용하거나 공개하는 행위\n4.  \"도메인이름\"이란 인터넷상의 숫자로 된 주소에 해당하는 숫자ㆍ문자ㆍ기호 또는 이들의 결합을 말한다.", "status": "quote_ok"}], "note": "단순 존속기간 명시 여부는 공통(CMN-16)에서 확인 — 본 항목은 NDA 고유 쟁점. 영업비밀은 비공지성이 상실되면 보호가 종료되므로 존속기간이 정보의 성질·보호기간과 정합해야 함. 존속기간을 무제한·영구로 정한 경우 상대방에 부당하게 불리한 약정으로 유효성이 다투어질 수 있음"}, {"id": "NDA-12", "module": "M-NDA", "check": "계약 종료 또는 보유자 요청 시 비밀정보(사본 포함)의 반환·파기 의무 조항이 있는가", "severity": "참고", "severity_basis": "실무 관행 항목(법령 강제 아님)", "norm_type": "실무", "basis": "practice", "triggers": {"keywords": ["반환", "파기", "폐기", "사본", "반납"]}, "absence_check": true, "sources": []}, {"id": "NDA-13", "module": "M-NDA", "check": "파기·반환 이행을 확인하는 파기확인서 제출 등 증빙 조항이 있는가", "severity": "참고", "severity_basis": "실무 관행 항목(법령 강제 아님)", "norm_type": "실무", "basis": "practice", "triggers": {"keywords": ["파기확인서", "확인서", "증빙", "파기 사실 확인"]}, "absence_check": false, "sources": []}, {"id": "NDA-14", "module": "M-NDA", "check": "비밀정보 침해·누설 시 침해행위의 금지·예방 청구(가처분 포함)가 가능함이 확인되거나 배제되지 않는가", "severity": "권장", "severity_basis": "근거 조문이 임의규정임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제10조", "norm_type": "임의", "basis": "statute", "triggers": {"keywords": ["금지청구", "침해금지", "예방", "가처분", "침해행위의 금지"]}, "absence_check": false, "sources": [{"law": "부정경쟁방지 및 영업비밀보호에 관한 법률", "article": "제10조", "clause": "제1항", "quote": "영업비밀의 보유자는 영업비밀 침해행위를 하거나 하려는 자에 대하여 그 행위에 의하여 영업상의 이익이 침해되거나 침해될 우려가 있는 경우에는 법원에 그 행위의 금지 또는 예방을 청구할 수 있다", "verified": true, "source_type": "law", "text": "제10조(영업비밀 침해행위에 대한 금지청구권 등)\n① 영업비밀의 보유자는 영업비밀 침해행위를 하거나 하려는 자에 대하여 그 행위에 의하여 영업상의 이익이 침해되거나 침해될 우려가 있는 경우에는 법원에 그 행위의 금지 또는 예방을 청구할 수 있다.\n② 영업비밀 보유자가 제1항에 따른 청구를 할 때에는 침해행위를 조성한 물건의 폐기, 침해행위에 제공된 설비의 제거, 그 밖에 침해행위의 금지 또는 예방을 위하여 필요한 조치를 함께 청구할 수 있다.", "status": "quote_ok"}], "note": "법정 구제권 — 계약이 이를 배제·제한하는 문언이 없는지 확인"}, {"id": "NDA-15", "module": "M-NDA", "check": "비밀정보(영업비밀) 침해로 인한 손해배상책임 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제11조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["손해배상", "배상 책임", "손해를 배상", "배상하여야"]}, "absence_check": true, "sources": [{"law": "부정경쟁방지 및 영업비밀보호에 관한 법률", "article": "제11조", "quote": "고의 또는 과실에 의한 영업비밀 침해행위로 영업비밀 보유자의 영업상 이익을 침해하여 손해를 입힌 자는 그 손해를 배상할 책임을 진다", "verified": true, "source_type": "law", "text": "제11조(영업비밀 침해에 대한 손해배상책임)\n고의 또는 과실에 의한 영업비밀 침해행위로 영업비밀 보유자의 영업상 이익을 침해하여 손해를 입힌 자는 그 손해를 배상할 책임을 진다.", "status": "quote_ok"}]}, {"id": "NDA-16", "module": "M-NDA", "check": "침해자가 얻은 이익을 손해액으로 추정하는 등 손해액 입증경감 규정을 원용할 수 있는 구조인가", "severity": "참고", "severity_basis": "추정규정임 — 부정경쟁방지 및 영업비밀보호에 관한 법률 제14조의2", "norm_type": "추정", "basis": "statute", "triggers": {"keywords": ["손해액 추정", "이익액", "손해액", "입증"]}, "absence_check": false, "sources": [{"law": "부정경쟁방지 및 영업비밀보호에 관한 법률", "article": "제14조의2", "clause": "제2항", "quote": "영업상의 이익을 침해한 자가 그 침해행위에 의하여 이익을 받은 것이 있으면 그 이익액을 영업상의 이익을 침해당한 자의 손해액으로 추정한다", "verified": true, "source_type": "law", "text": "제14조의2(손해액의 추정 등)\n① 부정경쟁행위, 제3조의2제1항이나 제2항을 위반한 행위 또는 영업비밀 침해행위로 영업상의 이익을 침해당한 자가 제5조 또는 제11조에 따른 손해배상을 청구하는 경우 영업상의 이익을 침해한 자가 그 부정경쟁행위, 제3조의2제1항이나 제2항을 위반한 행위 또는 영업비밀 침해행위(이하 이 항에서 \"부정경쟁행위등침해행위\"라 한다)를 하게 한 물건을 양도하였을 때에는 다음 각 호에 해당하는 금액의 합계액을 손해액으로 할 수 있다.\n1.  그 물건의 양도수량(영업상의 이익을 침해당한 자가 그 부정경쟁행위등침해행위 외의 사유로 판매할 수 없었던 사정이 있는 경우에는 그 부정경쟁행위등침해행위 외의 사유로 판매할 수 없었던 수량을 뺀 수량) 중 영업상의 이익을 침해당한 자가 생산할 수 있었던 물건의 수량에서 실제 판매한 물건의 수량을 뺀 수량을 넘지 아니하는 수량에 영업상의 이익을 침해당한 자가 그 부정경쟁행위등침해행위가 없었다면 판매할 수 있었던 물건의 단위수량당 이익액을 곱한 금액\n  "quote": "보험회사는 손해사정 위수탁 당사자 간 합의한 업무범위 등 계약조건을 반드시 반영하여 손해사정업무 위탁계약서를 작성하고 교부하여야 한다", "verified": false, "source_type": "self_regulation", "text": "제5조(위탁손해사정사 위탁 절차) ① 보험회사의 위탁 절차는 위탁 대상 업무설정, 위탁 대상 보험사고 및 상품 설정, 업체 현황 조사, 후보선정, 비교평가, 후보당사자 의견 청취, 계약체결, 보험업감독규정 제9-21조의2에 따른 예탁보증여부 및 인허가보증보험 가입여부 확인, 결과‧평가요소의 안내 등 모든 위탁 관련 업무를 포함한다.\n② 보험회사는 손해사정사 또는 손해사정업자가 제출한 손해사정 업무 결과 등 객관적인 평가자료에 근거하여 그 업무에 소요되는 필요 비용을 고려한 합리적인 위탁수수료 산정‧지급체계를 설계하여야 하고, 자회사와 비자회사 위탁손해사정사를 불합리한 방식으로 차별하여서는 아니된다.\n③ 보험회사는 손해사정에 관한 업무를 자회사인 위탁손해사정사에게 일정 비율을 초과하여 위탁한 경우에는 제1항에 따른 위탁절차와 동 위탁절차에 따른 위탁결과 등을 연1회 이사회에 보고하고 홈페이지에 공시하여야 한다.\n④ 제3항의 일정비율은 각 보험회사의 직전년도 전체 손해사정업무 중 위탁된 손해사정업무가 차지하는 비율의 100분의 50을 말하고, 동 위탁 건수 산정 대상이 되는 업무 범위는 보험업법 제188조 손해사정사의 업무를 의미한다.\n⑤ 보험회사는 위탁 계약 체결 및 이행과 관련하여 손해사정사 또는 손해사정업자에게 보험회사에 유리한 손해사정을 강요할 수 없고, 손해사정의 공정성을 보호하기 위하여 다음 각 호의 원칙을 준수하여야 한다.\n1. 보험회사는 손해사정 위수탁 당사자 간 합의한 업무범위 등 계약조건을 반드시 반영하여 손해사정업무 위탁계약서를 작성하고 교부하여야 한다.\n2. 보험회사는 손해사정 위탁계약서상 계약사항을 이행하지 않거나 위탁계약서에 정한 업무 외의 업무를 강요할 수 없다.\n3. 보험회사는 위탁손해사정사 선정을 위한 입찰 전후로 “예정 가격”을 1개 사례에 대해서만 형식적으로 조사하거나, 시장 평균 대비 과도하게 낮추어 조사하는 등 예정 가격을 낮추도록 유도할 수 없다.\n4. 보험회사는 보험업감독규정 제9-21조에 따른 보정요청 등 정당한 사유 없이 손해사정서상 결정된 보험금 지급 금액을 임의 변경하여 지급할 수 없다. 다만, 배상책임보험의 사고 당사자 간 합의에 따른 조정 등은 제외한다.\n5. 보험회사의 자체 의료자문 결과를 손해사정서 작성 전에 위탁손해사정사에게 송부하거나, 보험금 합의 및 제한 요건/기준을 설정하는 등 손해사정 결과에 영향력을 행사 할 수 없다.\n⑥ 보험회사는 다음 각 호의 경우를 제외하고는 위탁계약에 따라 수수료를 지급하여야 한다.\n1. 조사 중단, 미결 등 손해사정사 또는 손해사정업자가 위탁계약서에서 정한 사항을 준수하지 못하는 경우\n2. 손해사정사 또는 손해사정업자가 보험업법 제189조, 보험업법시행령 제99조, 보험업감독규정 제9-14조 등을 위반하는 경우\n3. 손해사정사 또는 손해사정업자가 보험계약자와 분쟁을 야기하거나, 손해사정 미이행 및 불완전 이행을 고의 또는 중과실로 초래한 경우\n⑦ 보험회사, 보험협회, 손해사정사 또는 손해사정업자 단체는 위탁실무의 공정성과 관련된 사안을 논의하기 위하여 손해사정 협의체를 구성 및 운영할 수 있다.", "status": "quote_ok"}], "note": "자율규제(손해사정 업무위탁 모범규준)는 손해사정 위탁에 한해 업무범위 계약서 반영 의무를 부과 — 일반 위탁의 참고 근거"}, {"id": "CORE-02", "module": "M-CORE", "check": "위탁 업무가 인가받은 금융업 또는 다른 금융업의 본질적 요소를 포함하지 않는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조", "norm_type": "강행", "basis": 경우에는 최초 1회에 한하여 선정을 위한 별도의 기준을 마련할 수 있다.\n1. 평가항목별 평가산정 세부지침이 모범규준의 평가기준과 일관성이 있도록 합리적으로 설정하여야 한다.\n2. 객관적인 자료로 입증이 가능한 평가여야 한다.\n3. 평가항목별 배점은 특정항목에 편중되지 않아야 한다.\n4.정성평가 배점을 늘려 정량평가 항목의 배점을 초과하거나, 형식적으로 절대평가를 수행하거나, 동일한 평가유형/지표를 특별한 이유없이 손해사정사 또는 손해사정업자별로 다르게 적용하여서는 아니된다.\n③ 제1항의 평가기준에는 손해사정사 또는 손해사정업자별 보험금액‧손해율 등을 평가하거나, 손해사정업자별 손해율 총량한도 등을 고정적으로 제한하여 손해사정사 또는 손해사정업자에게 담보별로 보험금의 부지급, 인위적인 삭감을 유도하는 등 손해사정의 객관성 및 공정성을 훼손하거나 소비자에게 불리한 내용을 포함할 수 없다.\n④ 보험회사는 내부감사 또는 준법감시인의 확인을 거쳐 마련한 제1항의 위탁 평가 기준을 홈페이지에 공시하고, 평가기준의 중대한 변경이 있는 경우 이를 위탁 당사자에게 알려야 한다. 또한, 평가기준에 따라 위탁손해사정사를 선정한 경우 당사자 등 이해관계자의 요청이 있으면 불가피한 사유가 없는 한, 세부지표 등 평가기준 등을 제공하여야 한다.", "status": "quote_ok"}]}, {"id": "CORE-06", "module": "M-CORE", "check": "위탁업무 처리가 금융실명법 등 관련 법령에 저촉되지 않도록 하는 법령 준수 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["금융실명", "관련 법령", "법령 준수", "컴플라이언스"]}, "absence_check": true, "sources": [{"law": "금융기관의 업무위탁 등에 관한 규정", "article": "제3조(업무위탁 등)", "clause": "제3항 제5호", "quote": "「금융실명거래 및 비밀보장에 관한 법률」 등 관련 법령에의 저촉 여부", "verified": true, "text": "제3조(업무위탁 등) ① 금융기관은 인가등을 받은 업무를 영위함에 있어 제3자에게 업무를 위탁하거나 제3자의 업무를 수탁할 수 있다. 다만, 다음 각 호의 어느 하나에 해당하는 사항은 그러하지 아니하다.<개정 2017. 11. 14.> 1. 인가 등을 받은 금융업 또는 다른 금융업의 본질적 요소를 포함하는 업무를 위탁하는 경우. 다만, 다음 각 목의 어느 하나에 해당하는 업무의 경우에는 위탁할 수 있다. 가. 위탁하고자 하는 업무가 해당 금융업의 본질적 요소가 아니라 다른 금융업의 본질적 요소인 경우로서 법령에서 해당 업무수행을 허용하고 있는 자에 대하여 위탁하는 경우 나. 인가등을 받은 업무를 효율적으로 수행하는 데 필요한 경우로서 해당 업무를 위탁하더라도 금융기관의 건전성 또는 신인도를 저해하거나 금융질서의 문란 또는 금융이용자 피해를 발생시킬 우려가 낮은 것으로 금융위원회가 인정하는 경우 2. 관련 법령에서 금융기관이 수행하도록 의무를 부여하고 있는 경우 3. 업무의 위탁 또는 수탁으로 인하여 당해 금융기관의 건전성 또는 신인도를 크게 저해하거나 금융질서의 문란 또는 금융이용자의 피해 발생이 심히 우려되는 경우 ② 제1항 제1호의 본질적 요소에 해당하는 사항은 <별표 2>과 같다.<개정 2017. 11. 14.> 1. <본호 삭제 2005. 7. 27> 2. <본호 삭제 2005. 7. 27> 3. <본호 삭제 2005. 7. 27> 4. <본호 삭제 2005. 7. 27> ③ 금융기관이 제1항의 규정에 따라 제3자에게 업무를 위탁하거나 제3자로부터 업무를 수탁하는 경우에는 다음 각 호의 사항을 고려하여 동 업무가 적정하게 처리될 수 있도록 하여야 한다.<개정 2017. 11. 14.> 1. 업무위 라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다.<개정 2017. 11. 14.> 1. 당해 금융기관 또는 동일한 금융업을 영위하는 다른 금융기관이 감독원장에게 보고한 내용과 동일한 경우<개정 2017. 11. 14.> 2. 금융기관이 약관 등을 보고하면서 당해 약관 등의 내용과 관련된 위탁 또는 수탁예정업무를 보고한 경우(제1항에 의한 첨부서류를 제출한 경우에 한한다) 3. 해당 금융기관이 이미 보고한 내용을 일부 변경하는 경우로서 변경되는 내용이 경미한 경우<개정 2017. 11. 14.> 4. 동일한 수탁자에게 반복, 지속적으로 업무위탁이 이루어지는 경우로서 최초 업무위탁시에 사전보고가 이루어진 경우. 단, 이 경우 금융회사는 사전보고시에 향후 발생 가능한 추가적인 업무위탁의 대략적인 내용을 작성하여 금감원장에게 제출하여야 한다.<신설 2017. 11. 14.> 5. 금융기관이 제3자로부터 업무를 수탁하는 경우 ③ 감독원장은 제1항 및 제2항의 규정에 의하여 금융기관이 보고한 업무위탁 또는 수탁현황을 매반기 금융위에 보고하여야 한다.", "status": "quote_ok"}]}, {"id": "CORE-12", "module": "M-CORE", "check": "본 위탁이 사전보고 생략(반기별 사후보고) 사유에 해당하는지 확인되는가", "severity": "권장", "severity_basis": "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제4조", "norm_type": "임의", "basis": "statute", "triggers": {"keywords": ["사후보고", "반기", "업무보고서"]}, "absence_check": false, "sources": [{"law": "금융기관의 업무위탁 등에 관한 규정", "article": "제4조(보고)", "clause": "제2항", "quote": "제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다", "verified": true, "text": "제4조(보고) ① 금융기관이 제3조제1항의 규정에 따라 제3자와 업무위탁 계약을 체결하거나 제3자(금융기관 및「자본시장과 금융투자업에 관한 법률」에 따른 금융투자업자, 종합금융회사는 제외한다)와 업무수탁계약을 체결하고자 하는 경우에는 그 사실을 업무를 위탁받은 자가 그 위탁받은 업무를 실제로 수행하려는 날의 7영업일 이전에 <별지 제1호 서식>에 따라 다음 각호의 서류를 첨부하여 감독원장에게 보고하여야 한다.<개정 2017. 11. 14.> 1. 위탁 또는 수탁 관련 계약서(안) 사본 2. 업무위수탁계약이 제3조제3항 각 호의 고려사항에 저촉되지 아니하고 제3조의2에 따른 자체 업무위수탁 운영기준에 위배되지 아니하다는 준법감시인(준법감시인이 없는 경우에는 감사 등 이에 준하는 자를 말한다)의 검토의견 및 관련 자료 사본<개정 2017. 11. 14.> 3. 위탁 또는 수탁의 필요성 및 기대효과 4. 위탁 또는 수탁에 따른 업무처리절차의 주요변경내용 ② 금융기관은 제1항의 규정에 불구하고 다음 각호의 1에 해당하는 경우에는 제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다.<개정 2017. 11. 14.> 1. 당해 금융기관 또는 동일한 금융업을 영위하는 다른 금융기관이 감독원장에게 보고한 내용과 동일한 경우<개정 2017. 11. 14.> 2. 금융기관이 약관 등을 보고하면서 당해 약관 등의 내용과 관련된 위탁 또는 수탁예정업무를 보고한 경우(제1항에 의한 첨부서류를 제출한 경우에 한한다) 3. 해당 금융기관이 이미 보고한 내용을 일부 변경하는 경우로서 변경되는 내용이 경미한 경우<개정 2017. 11. 14.> 4. 동일 이 강행규정(의무)임 — 개인정보 보호법 제26조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["개인정보", "처리위탁", "개인정보 처리", "특약"]}, "absence_check": true, "sources": [{"law": "개인정보 보호법", "article": "제26조", "clause": "제1항", "quote": "개인정보처리자가 제3자에게 개인정보의 처리 업무를 위탁하는 경우에는 다음 각 호의 내용이 포함된 문서로 하여야 한다", "verified": true, "text": "제26조(업무위탁에 따른 개인정보의 처리 제한) 제26조(업무위탁에 따른 개인정보의 처리 제한) ① 개인정보처리자가 제3자에게 개인정보의 처리 업무를 위탁하는 경우에는 다음 각 호의 내용이 포함된 문서로 하여야 한다. <개정 2023.3.14> 1. 위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항 2. 개인정보의 기술적ㆍ관리적 보호조치에 관한 사항 3. 그 밖에 개인정보의 안전한 관리를 위하여 대통령령으로 정한 사항 ② 제1항에 따라 개인정보의 처리 업무를 위탁하는 개인정보처리자(이하 \"위탁자\"라 한다)는 위탁하는 업무의 내용과 개인정보 처리 업무를 위탁받아 처리하는 자(개인정보 처리 업무를 위탁받아 처리하는 자로부터 위탁받은 업무를 다시 위탁받은 제3자를 포함하며, 이하 \"수탁자\"라 한다)를 정보주체가 언제든지 쉽게 확인할 수 있도록 대통령령으로 정하는 방법에 따라 공개하여야 한다. <개정 2023.3.14> ③ 위탁자가 재화 또는 서비스를 홍보하거나 판매를 권유하는 업무를 위탁하는 경우에는 대통령령으로 정하는 방법에 따라 위탁하는 업무의 내용과 수탁자를 정보주체에게 알려야 한다. 위탁하는 업무의 내용이나 수탁자가 변경된 경우에도 또한 같다. ④ 위탁자는 업무 위탁으로 인하여 정보주체의 개인정보가 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손되지 아니하도록 수탁자를 교육하고, 처리 현황 점검 등 대통령령으로 정하는 바에 따라 수탁자가 개인정보를 안전하게 처리하는지를 감독하여야 한다. <개정 2015.7.24> ⑤ 수탁자는 개인정보처리자로부터 위탁받은 해당 업무 범위를 초과하여 개인정보를 이용하거나 제3자에게 제공하여서는 아니 된다. ⑥ 수탁자는 위탁받은 개인정보의 처리 업무를 제3자에게 다시 위탁하려는 경우에는 위탁자의 동의를 받아야 한다. <신설 2023.3.14> ⑦ 수탁자가 위탁받은 업무와 관련하여 개인정보를 처리하는 과정에서 이 법을 위반하여 발생한 손해배상책임에 대하여는 수탁자를 개인정보처리자의 소속 직원으로 본다. <개정 2023.3.14> ⑧ 수탁자에 관하여는 제15조부터 제18조까지, 제21조, 제22조, 제22조의2, 제23조, 제24조, 제24조의2, 제25조, 제25조의2, 제27조, 제28조, 제28조의2부터 제28조의5까지, 제28조의7부터 제28조의11까지, 제29조, 제30조, 제30조의2, 제31조, 제33조, 제34조, 제34조의2, 제35조, 제35조의2, 제36조, 제37조, 제37조의2, 제38조, 제59조, 제63조, 제63조의2 및 제64조의2를 준용한다. 이 경우 \"개인정보처리자\"는 \"수탁자\"로 본다. <개정 2023.3.14>", "status": "quote_ok"}]}, {"id": "PRIV-02", "module": "M-PRIV", "check": "위탁 문서에 위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항이 포함되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["목적 외", "목적외", "처리 금지"]}, "absence_check": true, "sources": [{"law": "개인정보 보호법", "article": "제26조", "clause": "제 , "전산설비", "개발 장소"]}, "absence_check": true, "sources": [{"law": "전자금융감독규정", "article": "제60조", "clause": "제1항 제1호", "quote": "외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영", "verified": true, "text": "제60조(외부주문등에 대한 기준) ① 금융회사 또는 전자금융업자는 전자금융거래를 위한 외부주문등의 경우에는 다음 각 호의 사항을 준수하여야 한다.<개정 2013. 12. 3.> 1. 외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영<개정 2015. 2. 3.> 2. 금융회사와 이용자 간 암호화정보 해독 및 원장 등 중요 데이터 변경 금지<개정 2013. 12. 3.> 3. 계좌번호, 비밀번호 등 이용자 금융정보 무단보관 및 유출 금지 4. 접근매체 위ㆍ변조, 해킹, 개인정보유출 등에 대비한 보안대책 수립 5. 금융회사와 전자금융보조업자 간의 접속은 전용회선(전용회선과 동등한 보안수준을 갖춘 가상의 전용회선을 포함한다)을 사용<개정 2013. 12. 3., 2016. 10. 5.> 6. 정보처리시스템 장애 등 서비스 중단에 대비한 비상대책 수립 7. 외부주문등의 입찰ㆍ계약ㆍ수행ㆍ완료 등 각 단계별로 금융감독원장이 정하는 보안관리방안을 따를 것<개정 2015. 2. 3.> 8. 업무지속성을 위한 중요 전산자료의 백업(backup)자료 보존 및 백업설비 확보 등 백업대책 수립 9. 정보관리의 취약점을 최소화하고 보안유지를 위한 내부통제방안을 수립ㆍ운용하고, 통제는 제8조제1항제2호의 조직에서 수행<개정 2015. 2. 3.> 10. 전자금융보조업자에 대한 재무건전성을 연1회 이상 평가하여 재무상태 악화에 따른 도산에 대비하고 전자금융보조업자의 주요 경영활동에 대해 상시 모니터링을 실시 11. 전자금융보조업자가 제공하는 서비스의 품질수준을 연1회 이상 평가할 것 12. 전자금융보조업자가 사전 동의 없이 다시 외부주문등 계약을 체결하거나 계약업체를 변경하지 못하도록 하고, 사전 동의시 해당 계약서에 제7호의 사항을 기재하도록 통제<개정 2016. 6. 30.> 13. 업무수행인력에 대하여 사전 신원조회 실시(이 경우 신원보증보험 증권 징구로 갈음할 수 있다) 또는 대표자의 신원보증서 징구, 인력변경시 인수인계에 관한 사항 등을 포함한 업무수행인력 관리방안 수립<개정 2018. 12. 21.> 14. 외부주문등은 자체 보안성검토 및 정기(금융감독원장이 정하는 중요 점검사항에 대해서는 매일) 보안점검 실시<개정 2015. 2. 3.> ② 금융회사 또는 전자금융업자는 제1항제10호 및 제11호의 평가결과를 금융감독원장에게 보고하여야 한다.<개정 2013. 12. 3.> ③ 금융감독원장은 제2항의 규정에 따른 평가결과 보고를 접수하고, 그 평가실시 여부를 제58조제2항의 규정에 따른 정보기술부문 실태평가에 반영할 수 있다. ④ 법 제40조제6항 단서에서 \"금융위원회가 인정하는 경우\"란 전자금융거래정보의 보호와 관련된 전산장비ㆍ소프트웨어에 대한 개발ㆍ운영 및 유지관리 업무를 재위탁하는 경우로서 다음 각 호의 사항을 준수하는 경우를 말한다. 1. 재수탁업자가 재위탁된 업무를 처리함에 있어 금융거래 정보의 변경이 필요한 경우에는 위탁회사 또는 원수탁업자의 개별적 지시에 따라야 하며, 위탁회사 또는 원수탁업자는 변경된 정보가 지시 내용에 부합하는지 여부를 확인하여야 함 2. 위탁업무와 관련된 이용자의 금융거래정보는 위탁회사의 전산실 내에 두어야 함. 다만, 재수탁업자가 이용자의 이용자 정보를 어떠한 경우에도 알지 못하도록 위탁회사 또는 원수탁업자가 금융거래정보를 처리하여 제공한 경우에는 위탁회사의 관리ㆍ통제 하에 재수탁회사 등 제3의 장소로 이전 가능함 ⑤ 금융회사 또는 전자금융업자는 제14조의2제1항제2호에 따른 평가를 위하여 제37조의6제1항 각 호의 어느 하나에 해당하는 기관에 지원을 요 조제2호를 적용하고, 해당 정보처리시스템을 국내에 설치하여야 한다. <단서신설 2018. 12. 21><개정 2022. 11. 23., 2025. 2. 5.> ⑧ 그 밖에 금융회사 또는 전자금융업자의 클라우드컴퓨팅서비스 이용에 대해서는 「금융회사의 정보처리 업무 위탁에 관한 규정」에 따른다.<종전의 제9항에서 이동, 2025. 2. 5.><신설 2018. 12. 21.> #### 제5절 정보보호부문<신설 2025. 2. 5.>", "status": "quote_ok"}]}, {"id": "SOL-01", "module": "M-SOLICIT", "check": "위탁 상대방이 보험설계사·보험대리점·보험중개사 등 모집 자격자로서 유효하게 등록되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 보험업법 제83조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["모집", "보험설계사", "보험대리점", "보험중개사"]}, "absence_check": true, "sources": [{"law": "보험업법", "article": "제83조", "clause": "제1항", "quote": "모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다", "verified": true, "source_type": "law", "text": "제83조(모집할 수 있는 자)\n① 모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다.\n1. 보험설계사\n2. 보험대리점\n3. 보험중개사\n4. 보험회사의 임원 또는 직원", "status": "quote_ok"}, {"law": "보험권 표준내부통제기준", "article": "제37조", "clause": "제3항", "quote": "회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다", "verified": true, "source_type": "self_regulation", "text": "제37조(모집업무 위탁관리 관련 내부통제체계) ① 회사는 모집업무(보험계약의 체결을 중개하거나 대리하는 것을 말한다. 이하 같다)와 관련하여 법령을 준수하고, 경영을 건전하게 하며, 거래질서를 해치는 일이 없도록 관리하기 위하여 회사의 임직원과 모집종사자가 직무를 수행할 때 준수해야 할 기준 및 절차를 별도로 정할 수 있다.\n② 회사는 모집업무 위탁관리업무를 효율적으로 수행할 수 있도록 내부통제 체계를 구축·운영하여야 한다.\n③ 회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다.\n④ 회사는 모집종사자와 위탁계약 체결 전에 모집종사자에게 적용되는 법령 및 규정을 모집종사자에게 설명하여야 한다.\n⑤ 회사는 모집종사자에 의한 금융사고(수수료등 환수 불이행 등)에 대비하여 영업보증금 제출 또는 그에 준하는 이행을 담보하기 위한 조치를 취하여야 한다.\n⑥ 회사는 모집종사자의 모집업무 위탁계약에 명시된 업무 수행에 대한 수수료 지급기준과 환수기준을 마련하고 이를 위탁계약의 내용에 포함하여야 한다.\n⑦ 회사는 모집종사자의 위탁업무 수행에 관한 평가기준을 수립·운영하고 평가결과가 미흡한 모집종사자에게는 필요한 조치를 취하여야 한다.\n⑧ 회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다.\n⑨ 회사는 모집종사자와 위탁계약을 해지하는 경우 해당 모집종사자가 모집한 계약의 담당을 다른 모집종사자에게 즉시 이관하여 관리하여야 한다.\n⑩ 회사는 임직원 및 모집종사자 모집과 관련한 법령 및 내부통제기준 등의 내규를 위반할 경우 이를 제재하기 위한 기준 및 절차를 마련해야 한다.", "status": "quote_ok"}]}, {"id": "SOL-02", "module": "M-SOLICIT", "check": "모집 자격·등록의 유지 의무와 등록 취소·말소 시 통지·해지 조항이 있는가", "severity": "참고", "severity_basis": "실무 관행 항목(법령 강제 아님)", "norm_type": "실무", "basis": "practice", "triggers": {"keywords": ["등록", "말소", "취소", "자격"]}, "absence_check": true, "sources": [{"law": "보험권 표준내부통제기준", "article": "제37조", "clause": "제8항", "quote": "회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다", "verified": false, "source_type": "self_regulation", "text": "제37조(모집업무 위탁관리 관련 내부통제체계) ① 회사는 모집업무(보험계약의 체결을 중개하거나 대리하는 것을 말한다. 이하 같다)와 관련하여 법령을 준수하고, 경영을 건전하게 하며, 거래질서를 해치는 일이 없도록 관리하기 위하여 회사의 임직원과 모집종사자가 직무를 수행할 때 준수해야 할 기준 및 절차를 별도로 정할 수 있다.\n② 회사는 모집업무 위탁관리업무를 효율적으로 수행할 수 있도록 내부통제 체계를 구축·운영하여야 한다.\n③ 회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다.\n④ 회사는 모집종사자와 위탁계약 체결 전에 모집종사자에게 적용되는 법령 및 규정을 모집종사자에게 설명하여야 한다.\n⑤ 회사는 모집종사자에 의한 금융사고(수수료등 환수 불이행 등)에 대비하여 영업보증금 제출 또는 그에 준하는 이행을 담보하기 위한 조치를 취하여야 한다.\n⑥ 회사는 모집종사자의 모집업무 위탁계약에 명시된 업무 수행에 대한 수수료 지급기준과 환수기준을 마련하고 이를 위탁계약의 내용에 포함하여야 한다.\n⑦ 회사는 모집종사자의 위탁업무 수행에 관한 평가기준을 수립·운영하고 평가결과가 미흡한 모집종사자에게는 필요한 조치를 취하여야 한다.\n⑧ 회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다.\n⑨ 회사는 모집종사자와 위탁계약을 해지하는 경우 해당 모집종사자가 모집한 계약의 담당을 다른 모집종사자에게 즉시 이관하여 관리하여야 한다.\n⑩ 회사는 임직원 및 모집종사자 모집과 관련한 법령 및 내부통제기준 등의 내규를 위반할 경우 이를 제재하기 위한 기준 및 절차를 마련해야 한다.", "status": "quote_ok"}], "note": "자율규제(보험권 표준내부통제기준 제37조)는 위탁계약 해지 절차·사유의 계약서 반영을 요구"}, {"id": "SOL-03", "module": "M-SOLICIT", "check": "수탁자의 금융소비자보호법 위반으로 발생한 손해에 대한 책임 분담 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융소비자 보호에 관한 법률 제44조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["손해배상", "금융소비자", "위반", "배상"]}, "absence_check": true, "sources": [{"law": "금융소비자 보호에 관한 법률", "article": "제44조", "clause": "제1항", "quote": "금융상품판매업자등이 고의 또는 과실로 이 법을 위반하여 금융소비자에게 손해를 발생시킨 경우에는 그 손해를 배상할 책임이 있다", "verified": true, "text": "제44조(금융상품판매업자등의 손해배상책임) 제44조(금융상품판매업자등의 손해  이내의 가능한 짧은 기한으로 정한 지급기일까지 하도급대금을 지급하여야 한다", "verified": true, "text": "제13조(하도급대금의 지급 등)\n① 원사업자가 수급사업자에게 제조등의 위탁을 하는 경우에는 목적물등의 수령일(건설위탁의 경우에는 인수일을, 용역위탁의 경우에는 수급사업자가 위탁받은 용역의 수행을 마친 날을, 납품등이 잦아 원사업자와 수급사업자가 월 1회 이상 세금계산서의 발행일을 정한 경우에는 그 정한 날을 말한다. 이하 같다)부터 60일 이내의 가능한 짧은 기한으로 정한 지급기일까지 하도급대금을 지급하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다.\n1.  원사업자와 수급사업자가 대등한 지위에서 지급기일을 정한 것으로 인정되는 경우\n2.  해당 업종의 특수성과 경제여건에 비추어 그 지급기일이 정당한 것으로 인정되는 경우\n② 하도급대금의 지급기일이 정하여져 있지 아니한 경우에는 목적물등의 수령일을 하도급대금의 지급기일로 보고, 목적물등의 수령일부터 60일이 지난 후에 하도급대금의 지급기일을 정한 경우(제1항 단서에 해당되는 경우는 제외한다)에는 목적물등의 수령일부터 60일이 되는 날을 하도급대금의 지급기일로 본다.\n③ 원사업자는 수급사업자에게 제조등의 위탁을 한 경우 원사업자가 발주자로부터 제조ㆍ수리ㆍ시공 또는 용역수행행위의 완료에 따라 준공금 등을 받았을 때에는 하도급대금을, 제조ㆍ수리ㆍ시공 또는 용역수행행위의 진척에 따라 기성금 등을 받았을 때에는 수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행한 부분에 상당하는 금액을 그 준공금이나 기성금 등을 지급받은 날부터 15일(하도급대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급하여야 한다.\n④ 원사업자가 수급사업자에게 하도급대금을 지급할 때에는 원사업자가 발주자로부터 해당 제조등의 위탁과 관련하여 받은 현금비율 미만으로 지급하여서는 아니 된다.\n⑤ 원사업자가 하도급대금을 어음으로 지급하는 경우에는 해당 제조등의 위탁과 관련하여 발주자로부터 원사업자가 받은 어음의 지급기간(발행일부터 만기일까지)을 초과하는 어음을 지급하여서는 아니 된다.\n⑥ 원사업자가 하도급대금을 어음으로 지급하는 경우에 그 어음은 법률에 근거하여 설립된 금융기관에서 할인이 가능한 것이어야 하며, 어음을 교부한 날부터 어음의 만기일까지의 기간에 대한 할인료를 어음을 교부하는 날에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일(제1항 단서에 따라 지급기일이 정하여진 경우에는 그 지급기일을, 발주자로부터 준공금이나 기성금 등을 받은 경우에는 제3항에서 정한 기일을 말한다. 이하 이 조에서 같다) 이내에 어음을 교부하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 어음의 만기일까지의 기간에 대한 할인료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑦ 원사업자는 하도급대금을 어음대체결제수단을 이용하여 지급하는 경우에는 지급일(기업구매전용카드의 경우는 카드결제 승인일을, 외상매출채권 담보대출의 경우는 납품등의 명세 전송일을, 구매론의 경우는 구매자금 결제일을 말한다. 이하 같다)부터 하도급대금 상환기일까지의 기간에 대한 수수료(대출이자를 포함한다. 이하 같다)를 지급일에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일 이내에 어음대체결제수단을 이용하여 지급하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 하도급대금 상환기일까지의 기간에 대한 수수료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑧ 원사업자가 하도급대금을 목적물등의 수령일부터 60일이 지난 후에 지급하는 경우에는 그 초과기간에 대하여 연 100분의 40 이내에서 「은행법」에 따른 은행이 적용하는 연체금리 등 경제사정을 고려하여 공정거래위원회가 정하여 고시하는 이율에 따른 이자를 지급하여야 한다.\n⑨ 제6항에서 적용하는 할인율은 연 100분의 40 이내에서 법률에 근거하여 설립된 금융기관에서 적용되는 상업어음할인율을 고려하여 공정거래위원회가 정하여 고시한다.\n⑩ 제7항에서 적용하는 수수료율은 원사업자가 금융기관(「여신전문금융업법」 제2조제2호의2에 따른 신용카드업자를 포함한다)과 체결한 어음대체결제수단의 약정상 수수료율로 한다.\n⑪ 제1항부터 제10항까지의 규정은 「중견기업 성장촉진 및 경쟁력 강화에 관한 특별법」 제2조제1호에 따른 중견기업으로 연간매출액이 대통령령으로 정하는 금액(제1호의 회사와 거래하는 경우에는 3천억원으로 한다) 미만인 중견기업이 다음 각 호의 어느 하나에 해당하는 자로부터 제조등의 위탁을 받은 경우에도 적용한다. 이 경우 제조등의 위탁을 한 자는 제1항부터 제10항까지, 제19조, 제20조, 제23조제2항, 제24조의4제1항, 제24조의5제6항, 제25조제1항 및 제3항, 제25조의2, 제25조의3제1항, 제25조의5제1항, 제26조제2항, 제30조제1항, 제33조, 제35조제1항을 적용할 때에는 원사업자로 보고, 제조등의 위탁을 받은 중견기업은 제1항부터 제10항까지, 제19조, 제21조, 제23조제2항, 제24조의4제1항, 제25조의2, 제33조를 적용할 때에는 수급사업자로 본다.\n1.  「독점규제 및 공정거래에 관한 법률」 제31조제1항에 따른 상호출자제한기업집단에 속하는 회사\n2.  제1호에 따른 회사가 아닌 사업자로서 연간매출액이 대통령령으로 정하는 금액을 초과하는 사업자", "status": "quote_ok"}], "note": "하도급법 적용대상(원사업자→수급사업자 제조·수리·건설·용역위탁, 사업자 규모 요건 충족)에 해당하는 경우 강행. 일반 매매·비적용 거래에는 임의 조정 가능"}, {"id": "SP-PAY-02", "module": "M-PAY", "check": "지급기일 미정 또는 60일 초과 약정 시 수령일 기산 간주 규정과의 정합이 확인되는가", "severity": "참고", "severity_basis": "간주규정임 — 하도급거래 공정화에 관한 법률 제13조", "norm_type": "간주", "basis": "statute", "triggers": {"keywords": ["지급기일", "수령일", "지급기일로 본다"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제13조", "clause": "제2항", "quote": "하도급대금의 지급기일이 정하여져 있지 아니한 경우에는 목적물등의 수령일을 하도급대금의 지급기일로 보고", "verified": true, "text": "제13조(하도급대금의 지급 등)\n① 원사업자가 수급사업자에게 제조등의 위탁을 하는 경우에는 목적물등의 수령일(건설위탁의 경우에는 인수일을, 용역위탁의 경우에는 수급사업자가 위탁받은 용역의 수행을 마친 날을, 납품등이 잦아 원사업자와 수급사업자가 월 1회 이상 세금계산서의 발행일을 정한 경우에는 그 정한 날을 말한다. 이하 같다)부터 60일 이내의 가능한 짧은 기한으로 정한 지급기일까지 하도급대금을 지급하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다.\n1.  원사업자와 수급사업자가 대등한 지위에서 지급기일을 정한 것으로 인정되는 경우\n2.  해당 업종의 특수성과 경제여건에 비추어 그 지급기일이 정당한 것으로 인정되는 경우\n② 하도급대금의 지급기일이 정하여져 있지 아니한 경우에는 목적물등의 수령일을 하도급대금의 지급기일로 보고, 목적물등의 수령일부터 60일이 지난 후에 하도급대금의 지급기일을 정한 경우(제1항 단서에 해당되는 경우는 제외한다)에는 목적물등의 수령일부터 60일이 되는 날을 하도급대금의 지급기일로 본다.\n③ 원사업자는 수급사업자에게 제조등의 위탁을 한 경우 원사업자가 발주자로부터 제조ㆍ수리ㆍ시공 또는 용역수행행위의 완료에 따라 준공금 등을 받았을 때에는 하도급대금을, 제조ㆍ수리ㆍ시공 또는 용역수행행위의 진척에 따라 기성금 등을 받았을 때에는 수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행한 부분에 상당하는 금액을 그 준공금이나 기성금 등을 지급받은 날부터 15일(하도급대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급하여야 한다.\n④ 원사업자가 수급사업자에게 하도급대금을 지급할 때에는 원사업자가 발주자로부터 해당 제조등의 위탁과 관련하여 받은 현금비율 미만으로 지급하여서는 아니 된다.\n⑤ 원사업자가 하도급대금을 어음으로 지급하는 경우에는 해당 제조등의 위탁과 관련하여 발주자로부터 원사업자가 받은 어음의 지급기간(발행일부터 만기일까지)을 초과하는 어음을 지급하여서는 아니 된다.\n⑥ 원사업자가 하도급대금을 어음으로 지급하는 경우에 그 어음은 법률에 근거하여 설립된 금융기관에서 할인이 가능한 것이어야 하며, 어음을 교부한 날부터 어음의 만기일까지의 기간에 대한 할인료를 어음을 교부하는 날에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일(제1항 단서에 따라 지급기일이 정하여진 경우에는 그 지급기일을, 발주자로부터 준공금이나 기성금 등을 받은 경우에는 제3항에서 정한 기일을 말한다. 이하 이 조에서 같다) 이내에 어음을 교부하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 어음의 만기일까지의 기간에 대한 할인료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑦ 원사업자는 하도급대금을 어음대체결제수단을 이용하여 지급하는 경우에는 지급일(기업구매전용카드의 경우는 카드결제 승인일을, 외상매출채권 담보대출의 경우는 납품등의 명세 전송일을, 구매론의 경우는 구매자금 결제일을 말한다. 이하 같다)부터 하도급대금 상환기일까지의 기간에 대한 수수료(대출이자를 포함한다. 이하 같다)를 지급일에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일 이내에 어음대체결제수단을 이용하여 지급하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 하도급대금 상환기일까지의 기간에 대한 수수료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑧ 원사업자가 하도급대금을 목적물등의 수령일부터 60일이 지난 후에 지급하는 경우에는 그 초과기간에 대하여 연 100분의 40 이내에서 「은행법」에 따른 은행이 적용하는 연체금리 등 경제사정을 고려하여 공정거래위원회가 정하여 고시하는 이율에 따른 이자를 지급하여야 한다.\n⑨ 제6항에서 적용하는 할인율은 연 100분의 40 이내에서 법률에 근거하여 설립된 금융기관에서 적용되는 상업어음할인율을 고려하여 공정거래위원회가 정하여 고시한다.\n⑩ 제7항에서 적용하는 수수료율은 원사업자가 금융기관(「여신전문금융업법」 제2조제2호의2에 따른 신용카드업자를 포함한다)과 체결한 어음대체결제수단의 약정상 수수료율로 한다.\n⑪ 제1항부터 제10항까지의 규정은 「중견기업 성장촉진 및 경쟁력 강화에 관한 특별법」 제2조제1호에 따른 중견기업으로 연간매출액이 대통령령으로 정하는 금액(제1호의 회사와 거래하는 경우에는 3천억원으로 한다) 미만인 중견기업이 다음 각 호의 어느 하나에 해당하는 자로부터 제조등의 위탁을 받은 경우에도 적용한다. 이 경우 제조등의 위탁을 한 자는 제1항부터 제10항까지, 제19조, 제20조, 제23조제2항, 제24조의4제1항, 제24조의5제6항, 제25조제1항 및 제3항, 제25조의2, 제25조의3제1항, 제25조의5제1항, 제26조제2항, 제30조제1항, 제33조, 제35조제1항을 적용할 때에는 원사업자로 보고, 제조등의 위탁을 받은 중견기업은 제1항부터 제10항까지, 제19조, 제21조, 제23조제2항, 제24조의4제1항, 제25조의2, 제33조를 적용할 때에는 수급사업자로 본다.\n1.  「독점규제 및 공정거래에 관한 법률」 제31조제1항에 따른 상호출자제한기업집단에 속하는 회사\n2.  제1호에 따른 회사가 아닌 사업자로서 연간매출액이 대통령령으로 정하는 금액을 초과하는 사업자", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시. 60일 초과 지급기일 약정은 무효화되고 60일 기산 지급기일로 간주됨"}, {"id": "SP-PAY-03", "module": "M-PAY", "check": "발주자로부터 준공금·기성금을 수령한 경우 15일 이내 하도급대금(기성부분 상당액)을 지급하도록 규정되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["준공금", "기성금", "15일", "기성부분"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제13조", "clause": "제3항", "quote": "그 준공금이나 기성금 등을 지급받은 날부터 15일(하도급대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급하여야 한다", "verified": true, "text": "제13조(하도급대금의 지급 등)\n① 원사업자가 수급사업자에게 제조등의 위탁을 하는 경우에는 목적물등의 수령일(건설위탁의 경우에는 인수일을, 용역위탁의 경우에는 수급사업자가 위탁받은 용역의 수행을 마친 날을, 납품등이 잦아 원사업자와 수급사업자가 월 1회 이상 세금계산서의 발행일을 정한 경우에는 그 정한 날을 말한다. 이하 같다)부터 60일 이내의 가능한 짧은 기한으로 정한 지급기일까지 하도급대금을 지급하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다.\n1.  원사업자와 수급사업자가 대등한 지위에서 지급기일을 정한 것으로 인정되는 경우\n2.  해당 업종의 특수성과 경제여건에 비추어 그 지급기일이 정당한 것으로 인정되는 경우\n② 하도급대금의 지급기일이 정하여져 있지 아니한 경우에는 목적물등의 수령일을 하도급대금의 지급기일로 보고, 목적물등의 수령일부터 60일이 지난 후에 하도급대금의 지급기일을 정한 경우(제1항 단서에 해당되는 경우는 제외한다)에는 목적물등의 수령일부터 60일이 되는 날을 하도급대금의 지급기일로 본다.\n③ 원사업자는 수급사업자에게 제조등의 위탁을 한 경우 원사업자가 발주자로부터 제조ㆍ수리ㆍ시공 또는 용역수행행위의 완료에 따라 준공금 등을 받았을 때에는 하도급대금을, 제조ㆍ수리ㆍ시공 또는 용역수행행위의 진척에 따라 기성금 등을 받았을 때에는 수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행한 부분에 상당하는 금액을 그 준공금이나 기성금 등을 지급받은 날부터 15일(하도급대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급하여야 한다.\n④ 원사업자가 수급사업자에게 하도급대금을 지급할 때에는 원사업자가 발주자로부터 해당 제조등의 위탁과 관련하여 받은 현금비율 미만으로 지급하여서는 아니 된다.\n⑤ 원사업자가 하도급대금을 어음으로 지급하는 경우에는 해당 제조등의 위탁과 관련하여 발주자로부터 원사업자가 받은 어음의 지급기간(발행일부터 만기일까지)을 초과하는 어음을 지급하여서는 아니 된다.\n⑥ 원사업자가 하도급대금을 어음으로 지급하는 경우에 그 어음은 법률에 근거하여 설립된 금융기관에서 할인이 가능한 것이어야 하며, 어음을 교부한 날부터 어음의 만기일까지의 기간에 대한 할인료를 어음을 교부하는 날에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일(제1항 단서에 따라 지급기일이 정하여진 경우에는 그 지급기일을, 발주자로부터 준공금이나 기성금 등을 받은 경우에는 제3항에서 정한 기일을 말한다. 이하 이 조에서 같다) 이내에 어음을 교부하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 어음의 만기일까지의 기간에 대한 할인료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑦ 원사업자는 하도급대금을 어음대체결제수단을 이용하여 지급하는 경우에는 지급일(기업구매전용카드의 경우는 카드결제 승인일을, 외상매출채권 담보대출의 경우는 납품등의 명세 전송일을, 구매론의 경우는 구매자금 결제일을 말한다. 이하 같다)부터 하도급대금 상환기일까지의 기간에 대한 수수료(대출이자를 포함 인정되는 경우\n② 하도급대금의 지급기일이 정하여져 있지 아니한 경우에는 목적물등의 수령일을 하도급대금의 지급기일로 보고, 목적물등의 수령일부터 60일이 지난 후에 하도급대금의 지급기일을 정한 경우(제1항 단서에 해당되는 경우는 제외한다)에는 목적물등의 수령일부터 60일이 되는 날을 하도급대금의 지급기일로 본다.\n③ 원사업자는 수급사업자에게 제조등의 위탁을 한 경우 원사업자가 발주자로부터 제조ㆍ수리ㆍ시공 또는 용역수행행위의 완료에 따라 준공금 등을 받았을 때에는 하도급대금을, 제조ㆍ수리ㆍ시공 또는 용역수행행위의 진척에 따라 기성금 등을 받았을 때에는 수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행한 부분에 상당하는 금액을 그 준공금이나 기성금 등을 지급받은 날부터 15일(하도급대금의 지급기일이 그 전에 도래하는 경우에는 그 지급기일) 이내에 수급사업자에게 지급하여야 한다.\n④ 원사업자가 수급사업자에게 하도급대금을 지급할 때에는 원사업자가 발주자로부터 해당 제조등의 위탁과 관련하여 받은 현금비율 미만으로 지급하여서는 아니 된다.\n⑤ 원사업자가 하도급대금을 어음으로 지급하는 경우에는 해당 제조등의 위탁과 관련하여 발주자로부터 원사업자가 받은 어음의 지급기간(발행일부터 만기일까지)을 초과하는 어음을 지급하여서는 아니 된다.\n⑥ 원사업자가 하도급대금을 어음으로 지급하는 경우에 그 어음은 법률에 근거하여 설립된 금융기관에서 할인이 가능한 것이어야 하며, 어음을 교부한 날부터 어음의 만기일까지의 기간에 대한 할인료를 어음을 교부하는 날에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일(제1항 단서에 따라 지급기일이 정하여진 경우에는 그 지급기일을, 발주자로부터 준공금이나 기성금 등을 받은 경우에는 제3항에서 정한 기일을 말한다. 이하 이 조에서 같다) 이내에 어음을 교부하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 어음의 만기일까지의 기간에 대한 할인료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑦ 원사업자는 하도급대금을 어음대체결제수단을 이용하여 지급하는 경우에는 지급일(기업구매전용카드의 경우는 카드결제 승인일을, 외상매출채권 담보대출의 경우는 납품등의 명세 전송일을, 구매론의 경우는 구매자금 결제일을 말한다. 이하 같다)부터 하도급대금 상환기일까지의 기간에 대한 수수료(대출이자를 포함한다. 이하 같다)를 지급일에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일 이내에 어음대체결제수단을 이용하여 지급하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 하도급대금 상환기일까지의 기간에 대한 수수료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑧ 원사업자가 하도급대금을 목적물등의 수령일부터 60일이 지난 후에 지급하는 경우에는 그 초과기간에 대하여 연 100분의 40 이내에서 「은행법」에 따른 은행이 적용하는 연체금리 등 경제사정을 고려하여 공정거래위원회가 정하여 고시하는 이율에 따른 이자를 지급하여야 한다.\n⑨ 제6항에서 적용하는 할인율은 연 100분의 40 이내에서 법률에 근거하여 설립된 금융기관에서 적용되는 상업어음할인율을 고려하여 공정거래위원회가 정하여 고시한다.\n⑩ 제7항에서 적용하는 수수료율은 원사업자가 금융기관(「여신전문금융업법」 제2조제2호의2에 따른 신용카드업자를 포함한다)과 체결한 어음대체결제수단의 약정상 수수료율로 한다.\n⑪ 제1항부터 제10항까지의 규정은 「중견기업 성장촉진 및 경쟁력 강화에 관한 특별법」 제2조제1호에 따른 중견기업으로 연간매출액이 대통령령으로 정하는 금액(제1호의 회사와 거래하는 경우에는 3천억원으로 한다) 미만인 중견기업이 다음 각 호의 어느 하나에 해당하는 자로부터 제조등의 위탁을 받은 경우에도 적용한다. 이 경우 제조등의 위탁을 한 자는 제1항부터 제10항까지, 제19조, 제20조, 제23조제2항, 제24조의4제1항, 제24조의5제6항, 제25조제1항 및 제3항, 제25조의2, 제25조의3제1항, 제25조의5제1항, 제26조제2항, 제30조제1항, 제33조  경우에는 제3항에서 정한 기일을 말한다. 이하 이 조에서 같다) 이내에 어음을 교부하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 어음의 만기일까지의 기간에 대한 할인료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑦ 원사업자는 하도급대금을 어음대체결제수단을 이용하여 지급하는 경우에는 지급일(기업구매전용카드의 경우는 카드결제 승인일을, 외상매출채권 담보대출의 경우는 납품등의 명세 전송일을, 구매론의 경우는 구매자금 결제일을 말한다. 이하 같다)부터 하도급대금 상환기일까지의 기간에 대한 수수료(대출이자를 포함한다. 이하 같다)를 지급일에 수급사업자에게 지급하여야 한다. 다만, 목적물등의 수령일부터 60일 이내에 어음대체결제수단을 이용하여 지급하는 경우에는 목적물등의 수령일부터 60일이 지난 날 이후부터 하도급대금 상환기일까지의 기간에 대한 수수료를 목적물등의 수령일부터 60일 이내에 수급사업자에게 지급하여야 한다.\n⑧ 원사업자가 하도급대금을 목적물등의 수령일부터 60일이 지난 후에 지급하는 경우에는 그 초과기간에 대하여 연 100분의 40 이내에서 「은행법」에 따른 은행이 적용하는 연체금리 등 경제사정을 고려하여 공정거래위원회가 정하여 고시하는 이율에 따른 이자를 지급하여야 한다.\n⑨ 제6항에서 적용하는 할인율은 연 100분의 40 이내에서 법률에 근거하여 설립된 금융기관에서 적용되는 상업어음할인율을 고려하여 공정거래위원회가 정하여 고시한다.\n⑩ 제7항에서 적용하는 수수료율은 원사업자가 금융기관(「여신전문금융업법」 제2조제2호의2에 따른 신용카드업자를 포함한다)과 체결한 어음대체결제수단의 약정상 수수료율로 한다.\n⑪ 제1항부터 제10항까지의 규정은 「중견기업 성장촉진 및 경쟁력 강화에 관한 특별법」 제2조제1호에 따른 중견기업으로 연간매출액이 대통령령으로 정하는 금액(제1호의 회사와 거래하는 경우에는 3천억원으로 한다) 미만인 중견기업이 다음 각 호의 어느 하나에 해당하는 자로부터 제조등의 위탁을 받은 경우에도 적용한다. 이 경우 제조등의 위탁을 한 자는 제1항부터 제10항까지, 제19조, 제20조, 제23조제2항, 제24조의4제1항, 제24조의5제6항, 제25조제1항 및 제3항, 제25조의2, 제25조의3제1항, 제25조의5제1항, 제26조제2항, 제30조제1항, 제33조, 제35조제1항을 적용할 때에는 원사업자로 보고, 제조등의 위탁을 받은 중견기업은 제1항부터 제10항까지, 제19조, 제21조, 제23조제2항, 제24조의4제1항, 제25조의2, 제33조를 적용할 때에는 수급사업자로 본다.\n1.  「독점규제 및 공정거래에 관한 법률」 제31조제1항에 따른 상호출자제한기업집단에 속하는 회사\n2.  제1호에 따른 회사가 아닌 사업자로서 연간매출액이 대통령령으로 정하는 금액을 초과하는 사업자", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시. 공통 CMN-05-2(일반 지연이자 약정)와 달리 법정 지연이자율(공정위 고시)이 적용됨"}, {"id": "SP-PAY-07", "module": "M-PAY", "check": "일률적 단가인하·부당 할당·차별 등 부당한 하도급대금 결정을 금지하는 취지가 계약에 반영되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제4조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["단가 인하", "부당한 대금", "대금 결정", "일률적"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제4조", "clause": "제1항", "quote": "부당하게 목적물등과 같거나 유사한 것에 대하여 일반적으로 지급되는 대가보다 낮은 수준으로 하도급대금을 결정", "verified": true, "text": "제4조(부당한 하도급대금의 결정 금지)\n① 원사업자는 수급사업자에게 제조등의 위탁을 하는 경우 부당하게 목적물등과 같거나 유사한 것에 대하여 일반적으로 지급되는 대가보다 낮은 수준으로 하도급대금을 결정(이하 \"부당한 하도급대금의 결정\"이라 한다)하거나 하도급받도록 강요하여서는 아니 된다.\n② 다음 각 호의 어느 하나에 해당하는 원사업자의 행위는 부당한 하도급대금의 결정으로 본다.\n1.  정당한 사유 없이 일률적인 비율로 단가를 인하하여 하도급대금을 결정하는 행위\n2.  협조요청 등 어떠한 명목으로든 일방적으로 일정 금액을 할당한 후 그 금액을 빼고 하도급대금을 결정하는 행위\n3.  정당한 사유 없이 특정 수급사업자를 차별 취급하여 하도급대금을 결정하는 행위\n4.  수급사업자에게 발주량 등 거래조건에 대하여 착오를 일으키게 하거나 다른 사업자의 견적 또는 거짓 견적을 내보이는 등의 방법으로 수급사업자를 속이고 이를 이용하여 하도급대금을 결정하는 행위\n5.  원사업자가 일방적으로 낮은 단가에 의하여 하도급대금을 결정하는 행위\n6.  수의계약(隨意契約)으로 하도급계약을 체결할 때 정당한 사유 없이 대통령령으로 정하는 바에 따른 직접공사비 항목의 값을 합한 금액보다 낮은 금액으로 하도급대금을 결정하는 행위\n7.  경쟁입찰에 의하여 하도급계약을 체결할 때 정당한 사유 없이 최저가로 입찰한 금액보다 낮은 금액으로 하도급대금을 결정하는 행위\n8.  계속적 거래계약에서 원사업자의 경영적자, 판매가격 인하 등 수급사업자의 책임으로 돌릴 수 없는 사유로 수급사업자에게 불리하게 하도급대금을 결정하는 행위", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시. 제4조 제2항 각 호(일률 단가인하·부당 할당·차별·기망 등)는 부당대금결정으로 간주됨"}, {"id": "SP-PAY-08", "module": "M-PAY", "check": "설계변경·목적물 시기변동·경제상황 변동으로 발주자로부터 증액받은 경우 그 내용·비율에 따라 하도급대금을 증액하도록 규정되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제16조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["설계변경", "대금 조정", "증액", "계약금액 변경"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제16조", "clause": "제1항", "quote": "그가 발주자로부터 증액받은 계약금액의 내용과 비율에 따라 하도급대금을 증액하여야 한다", "verified": true, "text": "제16조(설계변경 등에 따른 하도급대금의 조정)\n① 원사업자는 제조등의 위탁을 한 후에 다음 각 호의 경우에 모두 해당하는 때에는 그가 발주자로부터 증액받은 계약금액의 내용과 비율에 따라 하도급대금을 증액하여야 한다. 다만, 원사업자가 발주자로부터 계약금액을 감액받은 경우에는 그 내용과 비율에 따라 하도급대금을 감액할 수 있다.\n1.  설계변경, 목적물등의 납품등 시기의 변동 또는 경제상황의 변동 등을 이유로 계약금액이 증액되는 경우\n2.  제1호와 같은 이유로 목적물등의 완성 또는 완료에 추가비용이 들 경우\n② 제1항에 따라 하도급대금을 증액 또는 감액할 경우, 원사업자는 발주자로부터 계약금액을 증액 또는 감액받은 날부터 15일 이내에 발주자로부터 증액 또는 감액받은 사유와 내용을 해당 수급사업자에게 통지하여야 한다. 다만, 발주자가 그 사유와 내용을 해당 수급사업자에게 직접 통지한 경우에는 그러하지 아니하다.\n③ 제1항에 따른 하도급대금의 증액 또는 감액은 원사업자가 발주자로부터 계약금액을 증액 또는 감액받은 날부터 30일 이내에 하여야 한다.\n④ 원사업자가 제1항의 계약금액 증액에 따라 발주자로부터 추가금액을 지급받은 날부터 15일이 지난 후에 추가 하도급대금을 지급하는 경우의 이자에 관하여는 제13조제8항을 준용하고, 추가 하도급대금을 어음 또는 어음대체결제수단을 이용하여 지급하는 경우의 어음할인료ㆍ수수료의 지급 및 어음할인율ㆍ수수료율에 관하여는 제13조제6항ㆍ제7항ㆍ제9항 및 제10항을 준용한다. 이 경우 \"목적물등의 수령일부터 60일\"은 \"추가금액을 받은 날부터 15일\"로 본다.", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시. 감액받은 경우 그 내용·비율에 따라 감액 가능(제16조 제1항 단서)"}, {"id": "SP-PAY-09", "module": "M-PAY", "check": "건설위탁의 경우 계약체결일부터 30일 이내 공사대금 지급보증을 하도록 규정되어 있는가(면제사유 해당 시 제외)", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제13조의2", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["지급보증", "공사대금", "계약이행 보증", "건설위탁"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제13조의2", "clause": "제1항", "quote": "건설위탁의 경우 원사업자는 계약체결일부터 30일 이내에 수급사업자에게 다음 각 호의 구분에 따라 해당 금액의 공사대금 지급을 보증", "verified": true, "text": "제13조의2(건설하도급 계약이행 및 대금지급 보증)\n① 건설위탁의 경우 원사업자는 계약체결일부터 30일 이내에 수급사업자에게 다음 각 호의 구분에 따라 해당 금액의 공사대금 지급을 보증(지급수단이 어음인 경우에는 만기일까지를, 어음대체결제수단인 경우에는 하도급대금 상환기일까지를 보증기간으로 한다)하고, 수급사업자는 원사업자에게 계약금액의 100분의 10에 해당하는 금액의 계약이행을 보증하여야 한다. 다만, 원사업자의 재무구조와 공사의 규모 등을 고려하여 보증이 필요하지 아니하거나 보증이 적합하지 아니하다고 인정되는 경우로서 대통령령으로 정하는 경우에는 그러하지 아니하다.\n1.  공사기간이 4개월 이하인 경우: 계약금액에서 선급금을 뺀 금액\n2.  공사기간이 4개월을 초과하는 경우로서 기성부분에 대한 대가의 지급 주기가 2개월 이내인 경우: 보증금액 = (하도급계약금액 - 계약상 선급금) ÷ 공사기간(개월 수) × 4\n3.  공사기간이 4개월을 초과하는 경우로서 기성부분에 대한 대가의 지급 주기가 2개월을 초과하는 경우: 보증금액 = (하도급계약금액 - 계약상 선급금) ÷ 공사기간(개월 수) × 기성부분에 대한 대가의 지급주기(개월수) × 2\n② 원사업자는 제1항 각 호 외의 부분 단서에 따른 공사대금 지급의 보증이 필요하지 아니하거나 적합하지 아니하다고 인정된 사유가 소멸한 경우에는 그 사유가 소멸한 날부터 30일 이내에 제1항에 따른 공사대금 지급보증을 하여야 한다. 다만, 계약의 잔여기간, 위탁사무의 기성률, 잔여대금의 금액 등을 고려하여 보증이 필요하지 아니하다고 인정되는 경우로서 대통령령으로 정하는 경우에는 그러하지 아니하다.\n③ 다음 각 호의 어느 하나에 해당하는 자와 건설공사에 관하여 장기계속계약(총액으로 입찰하여 각 회계연도 예산의 범위에서 낙찰된 금액의 일부에 대하여 연차별로 계약을 체결하는 계약으로서 「국가를 당사자로 하는 계약에 관한 법률」 제21조 또는 「지방자치단체를 당사자로 하는 계약에 관한 법률」 제24조에 따른 장기계속계약을 말한다. 이하 이 조에서 \"장기계속건설계약\"이라 한다)을 체결한 원사업자가 해당 건설공사를 장기계속건설하도급계약을 통하여 건설위탁하는 경우 원사업자는 최초의 장기계속건설하도급계약 체결일부터 30일 이내에 수급사업자에게 제1항 각 호 외의 부분 본문에 따라 공사대금 지급을 보증하고, 수급사업자는 원사업자에게 최초 장기계속건설하도급계약 시 약정한 총 공사금액의 100분의 10에 해당하는 금액으로 계약이행을 보증하여야 한다.\n1.  국가 또는 지방자치단체\n2.  「공공기관의 운영에 관한 법률」에 따른 공기업, 준정부기관 또는 「지방공기업법」에 따른 지방공사, 지방공단\n④ 제3항에 따라 수급사업자로부터 계약이행 보증을 받은 원사업자는 장기계속건설계약의 연차별 계약의 이행이 완료되어 이에 해당하는 계약보증금을 같은 항 각 호의 어느 하나에 해당하는 자로부터 반환받을 수 있는 날부터 30일 이내에 수급사업자에게 해당 수급사업자가 이행을 완료한 연차별 장기계속건설하도급계약에 해당하는 하도급 계약이행보증금을 반환하여야 한다. 이 경우 이행이 완료된 부분에 해당하는 계약이행 보증의 효력은 상실되는 것으로 본다.\n⑤ 제1항부터 제3항까지의 규정에 따른 원사업자와 수급사업자 간의 보증은 현금(체신관서 또는 「은행법」에 따른 은행이 발행한 자기앞수표를 포함한다)의 지급 또는 다음 각 호의 어느 하나의 기관이 발행하는 보증서의 교부에 의하여 한다.\n1.  「건설산업기본법」에 따른 각 공제조합\n2.  「보험업법」에 따른 보험회사\n3.  「신용보증기금법」에 따른 신용보증기금\n4.  「은행법」에 따른 금융기관\n5.  그 밖에 대통령령으로 정하는 보증기관\n⑥ 제5항에 따른 기관은 다음 각 호의 어느 하나에 해당하는 사유로 수급사업자가 보증약관상 필요한 청구서류를 갖추어 보증금 지급을 요청한 경우 30일 이내에 제1항의 보증금액을 수급사업자에게 지급하여야 한다. 다만, 보증금 지급요건 충족 여부, 지급액에 대한 이견 등 대통령령으로 정하는 불가피한 사유가 있는 경우 보증기관은 수급사업자에게 통지하고 대통령령으로 정하는 기간 동안 보증금 지급을 보류할 수 있다.\n1.  원사업자가 당좌거래정지 또는 금융거래정지로 하도급대금을 지급할 수 없는 경우\n2.  원사업자의 부도ㆍ파산ㆍ폐업 또는 회사회생절차 개시 신청 등으로 하도급대금을 지급할 수 없는 경우\n3.  원사업자의 해당 사업에 관한 면허ㆍ등록 등이 취소ㆍ말소되거나 영업정지 등으로 하도급대금을 지급할 수 없는 경우\n4.  원사업자가 제13조에 따라 지급하여야 할 하도급대금을 2회 이상 수급사업자에게 지급하지 아니한 경우\n5.  그 밖에 원사업자가 제1호부터 제4호까지에 준하는 지급불능 등 대통령령으로 정하는 사유로 인하여 하도급대금을 지급할 수 없는 경우\n⑦ 원사업자는 제5항에 따라 지급보증서를 교부할 때 그 공사기간 중에 건설위탁하는 모든 공사에 대한 공사대금의 지급보증이나 1회계연도에 건설위탁하는 모든 공사에 대한 공사대금의 지급보증을 하나의 지급보증서의 교부에 의하여 할 수 있다.\n⑧ 제1항부터 제7항까지에서 규정한 것 외에 하도급계약 이행보증 및 하도급대금 지급보증에 관하여 필요한 사항은 대통령령으로 정한다.\n⑨ 원사업자가 제1항 각 호 외의 부분 본문, 제2항 본문 또는 제3항 각 호 외의 부분에 따른 공사대금 지급보증을 하지 아니하는 경우에는 수급사업자는 계약이행을 보증하지 아니할 수 있다.\n⑩ 제1항 또는 제3항에 따른 수급사업자의 계약이행 보증에 대한 원사업자의 청구권은 해당 원사업자가 제1항부터 제3항까지의 규정에 따른 공사대금 지급을 보증한 후가 아니면 이를 행사할 수 없다. 다만, 제1항 각 호 외의 부분 단서 또는 제2항 단서에 따라 공사대금 지급을 보증하지 아니하는 경우에는 그러하지 아니하다.", "status": "quote_ok"}, {"law": "하도급거래 공정화에 관한 법률 시행령", "article": "제8조", "clause": "제1항 제1호", "quote": "원사업자가 수급사업자에게 건설위탁을 하는 경우로서 1건 공사의 공사금액이 1천만원 이하인 경우", "verified": true, "text": "제8조(건설하도급 계약이행 및 대금지급 보증)\n① 법 제13조의2제1항 각 호 외의 부분 단서에서 \"대통령령으로 정하는 경우\"란 다음 각 호의 어느 하나에 해당하는 경우를 말한다.\n1.  원사업자가 수급사업자에게 건설위탁을 하는 경우로서 1건 공사의 공사금액이 1천만원 이하인 경우\n2.  삭제\n3.  하도급계약 체결일부터 30일 이내에 법 제14조제1항제2호에 따른 합의를 한 경우\n4.  하도급대금의 지급을 전자적으로 관리하기 위하여 운영되고 있는 시스템(이하 \"하도급대금지급관리시스템\"이라 한다)을 활용하여 발주자가 원사업자 명의의 계좌를 거치지 아니하고 수급사업자에게 하도급대금을 지급하는 경우\n② 법 제13조의2제5항제5호에서 \"대통령령으로 정하는 보증기관\"이란 다음 각 호의 자를 말한다.\n1.  「전기공사공제조합법」에 따른 전기공사공제조합\n2.  「정보통신공사업법」에 따른 정보통신공제조합\n3.  「주택도시기금법」에 따른 주택도시보증공사\n4.  「소방산업의 진흥에 관한 법률」에 따른 소방산업공제조합\n5.  그 밖에 다른 법령에 따라 보증업무를 담당할 수 있는 기관 중에서 공정거래위원회가 정하여 고시하는 기관\n③ 법 제13조의2제6항 각 호 외의 부분 단서에서 \"보증금 지급요건 충족 여부, 지급액에 대한 이견 등 대통령령으로 정하는 불가피한 사유가 있는 경우\"란 다음 각 호의 어느 하나에 해당하는 경우를 말한다.\n1.  보증기간 동안의 원사업자 및 수급사업자의 계약이행 여부가 불명확하여 자료보완이 필요하다고 인정하는 경우\n2.  지급하여야 할 기성금(명칭을 불문하고 계약이행에 따른 대가로 지급되는 것을 말한다)에 대하여 원사업자와 수급사업자 사이에 이견이 있는 경우\n④ 법 제13조의2제6항 각 호 외의 부분 단서에서 \"대통령령으로 정하는 기간\"이란 30일을 말한다. 다만, 수급사업자와 합의한 경우 15일의 범위에서 한 차례만 그 기간을 연장할 수 있다.\n⑤ 법 제13조의2제6항제5호에서 \"제1호부터 제4호까지에 준하는 지급불능 등 대통령령으로 정하는 사유로 인하여 하도급대금을 지급할 수 없는 경우\"란 다음 각 호의 어느 하나에 해당하여 하도급대금을 지급할 수 없는 경우를 말한다.\n1.  원사업자가 「기업구조조정 촉진법」 제5조제2항에 따라 관리절차의 개시를 신청한 경우\n2.  발주자에 대한 원사업자의 공사대금채권에 대하여 제3채권자가 압류ㆍ가압류를 하였거나 원사업자가 해당 공사대금채권을 제3자에게 양도한 경우\n3.  법 제2조제14항에 따른 신용카드업자 또는 금융기관이 수급사업자에게 상환청구를 할 수 있는 어음대체결제수단으로 하도급대금을 지급한 후 원사업자가 해당 신용카드업자 또는 금융기관에 하도급대금을 결제하지 아니한 경우\n4.  원사업자가 수급사업자에게 하도급대금으로 지급한 어음이 부도로 처리된 경우\n5.  원사업자가 수급사업자로부터 지급기일 이후 2회 이상 하도급대금 지급에 관한 최고를 받고도 이를 이행하지 아니한 경우\n⑥ 제1항제4호에 따라 대금지급 보증의무 면제대상이 되는 하도급대금지급관리시스템의 종류는 공정거래위원회가 정하여 고시한다.", "status": "quote_ok"}], "note": "하도급법 적용대상 중 건설위탁에 한함. 보증 면제사유(공사금액 1천만원 이하 등)의 실체는 시행령 제8조에 위임됨"}, {"id": "SP-PAY-10", "module": "M-PAY", "check": "원사업자 지급불능·2회분 이상 미지급 등 사유 발생 시 발주자의 하도급대금 직접지급 요건·효과 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제14조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["직접 지급", "직접지급", "발주자", "지급정지"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제14조", "clause": "제1항", "quote": "수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행을 한 부분에 상당하는 하도급대금을 그 수급사업자에게 직접 지급하여야 한다", "verified": true, "text": "제14조(하도급대금의 직접 지급)\n① 발주자는 다음 각 호의 어느 하나에 해당하는 사유가 발생한 때에는 수급사업자가 제조ㆍ수리ㆍ시공 또는 용역수행을 한 부분에 상당하는 하도급대금을 그 수급사업자에게 직접 지급하여야 한다.\n1.  원사업자의 지급정지ㆍ파산, 그 밖에 이와 유사한 사유가 있거나 사업에 관한 허가ㆍ인가ㆍ면허ㆍ등록 등이 취소되어 원사업자가 하도급대금을 지급할 수 없게 된 경우로서 수급사업자가 하도급대금의 직접 지급을 요청한 때\n2.  발주자가 하도급대금을 직접 수급사업자에게 지급하기로 발주자ㆍ원사업자 및 수급사업자 간에 합의한 때\n3.  원사업자가 제13조제1항 또는 제3항에 따라 지급하여야 하는 하도급대금의 2회분 이상을 해당 수급사업자에게 지급하지 아니한 경우로서 수급사업자가 하도급대금의 직접 지급을 요청한 때\n4.  원사업자가 제13조의2제1항 또는 제2항에 따른 하도급대금 지급보증 의무를 이행하지 아니한 경우로서 수급사업자가 하도급대금의 직접 지급을 요청한 때\n② 제1항에 따른 사유가 발생한 경우 원사업자에 대한 발주자의 대금지급채무와 수급사업자에 대한 원사업자의 하도급대금 지급채무는 그 범위에서 소멸한 것으로 본다.\n③ 원사업자가 발주자에게 해당 하도급 계약과 관련된 수급사업자의 임금, 자재대금 등의 지급 지체 사실(원사업자의 귀책사유로 그 지급 지체가 발생한 경우는 제외한다)을 입증할 수 있는 서류를 첨부하여 해당 하도급대금의 직접 지급 중지를 요청한 경우, 발주자는 제1항에도 불구하고 그 하도급대금을 직접 지급하여서는 아니 된다.\n④ 제1항에 따라 발주자가 해당 수급사업자에게 하도급대금을 직접 지급할 때에 발주자가 원사업자에게 이미 지급한 하도급금액은 빼고 지급한다.\n⑤ 제1항에 따라 수급사업자가 발주자로부터 하도급대금을 직접 받기 위하여 기성부분의 확인 등이 필요한 경우 원사업자는 지체 없이 이에 필요한 조치를 이행하여야 한다.\n⑥ 제1항에 따라 하도급대금을 직접 지급하는 경우의 지급 방법 및 절차 등에 관하여 필요한 사항은 대통령령으로 정한다.", "status": "quote_ok"}, {"law": "하도급거래 공정화에 관한 법률 시행령", "article": "제9조", "clause": "제3항", "quote": "발주자는 원사업자에 대한 대금지급의무의 범위에서 하도급대금 직접 지급 의무를 부담한다", "verified": true, "text": "제9조(하도급대금의 직접 지급)\n① 법 제14조제1항에 따른 수급사업자의 직접지급 요청은 그 의사표시가 발주자에게 도달한 때부터 효력이 발생하며, 그 의사표시가 도달되었다는 사실은 수급사업자가 증명하여야 한다.\n② 발주자는 하도급대금을 직접 지급할 때에 「민사집행법」 제248조제1항 등의 공탁사유가 있는 경우에는 해당 법령에 따라 공탁(供託)할 수 있다.\n③ 발주자는 원사업자에 대한 대금지급의무의 범위에서 하도급대금 직접 지급 의무를 부담한다.\n④ 하도급대금의 직접 지급 요건을 갖추고, 그 수급사업자가 제조ㆍ수리ㆍ시공한 분(分)에 대한 하도급대금이 확정된 경우, 발주자는 도급계약의 내용에 따라 수급사업자에게 하도급대금을 지급하여야 한다.", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시. 직접지급 의무의 범위·절차 실체는 시행령 제9조에 위임됨(원사업자 대금지급채무는 그 범위에서 소멸 — 제14조 제2항)"}, {"id": "SP-UNF-01", "module": "M-UNFAIR", "check": "수급사업자의 이익을 부당하게 침해·제한하는 부당한 특약을 설정하지 않았는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 하도급거래 공정화에 관한 법률 제3조의4", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["부당한 특약", "특약", "비용 부담", "부당 특약"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제3조의4", "clause": "제1항", "quote": "원사업자는 수급사업자의 이익을 부당하게 침해하거나 제한하는 계약조건", "verified": true, "text": "제3조의4(부당한 특약의 금지)\n① 원사업자는 수급사업자의 이익을 부당하게 침해하거나 제한하는 계약조건(이하 \"부당한 특약\"이라 한다)을 설정하여서는 아니 된다.\n② 다음 각 호의 어느 하나에 해당하는 약정은 부당한 특약으로 본다.\n1.  원사업자가 제3조제1항의 서면에 기재되지 아니한 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정\n2.  원사업자가 부담하여야 할 민원처리, 산업재해 등과 관련된 비용을 수급사업자에게 부담시키는 약정\n3.  원사업자가 입찰내역에 없는 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정\n4.  그 밖에 이 법에서 보호하는 수급사업자의 이익을 제한하거나 원사업자에게 부과된 의무를 수급사업자에게 전가하는 등 대통령령으로 정하는 약정\n③ 제2항제1호부터 제3호까지에 해당하는 부당한 특약은 그 부분에 한정하여 무효로 하고, 같은 항 제4호에 해당하는 부당한 특약은 당사자 일방에게 현저하게 불공정한 경우 그 부분에 한정하여 무효로 한다.", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시"}, {"id": "SP-UNF-02", "module": "M-UNFAIR", "check": "서면에 기재되지 않은 사항을 요구하며 그 비용을 수급사업자에게 부담시키는 약정이 없는가", "severity": "참고", "severity_basis": "간주규정임 — 하도급거래 공정화에 관한 법률 제3조의4", "norm_type": "간주", "basis": "statute", "triggers": {"keywords": ["서면에 기재되지", "비용을 부담", "추가 비용"]}, "absence_check": false, "sources": [{"law": "하도급거래 공정화에 관한 법률", "article": "제3조의4", "clause": "제2항 제1호", "quote": "원사업자가 제3조제1항의 서면에 기재되지 아니한 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정", "verified": true, "text": "제3조의4(부당한 특약의 금지)\n① 원사업자는 수급사업자의 이익을 부당하게 침해하거나 제한하는 계약조건(이하 \"부당한 특약\"이라 한다)을 설정하여서는 아니 된다.\n② 다음 각 호의 어느 하나에 해당하는 약정은 부당한 특약으로 본다.\n1.  원사업자가 제3조제1항의 서면에 기재되지 아니한 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정\n2.  원사업자가 부담하여야 할 민원처리, 산업재해 등과 관련된 비용을 수급사업자에게 부담시키는 약정\n3.  원사업자가 입찰내역에 없는 사항을 요구함에 따라 발생된 비용을 수급사업자에게 부담시키는 약정\n4.  그 밖에 이 법에서 보호하는 수급사업자의 이익을 제한하거나 원사업자에게 부과된 의무를 수급사업자에게 전가하는 등 대통령령으로 정하는 약정\n③ 제2항제1호부터 제3호까지에 해당하는 부당한 특약은 그 부분에 한정하여 무효로 하고, 같은 항 제4호에 해당하는 부당한 특약은 당사자 일방에게 현저하게 불공정한 경우 그 부분에 한정하여 무효로 한다.", "status": "quote_ok"}], "note": "하도급법 적용대상 해당 시. 제3조의4 제2항 각 호는 부당한 특약으로 간주되며 해당 부분에 한하여 무효(제3항)"}, {"id": "SP-UNF-03", "module": "M-UNFAIR", "check": "원사업자가 부담하여야 할 민원처리·산업재해 등 비용을 수급사업자에게 부담시키는 약정이 없는가", "severity": "참고", "severity_basis": "간주규정임 — 하도급거래 공정화에 관한 법률 제3조의4", "norm_type": "간주", "basis": "statute", "triggers": {"keywor
