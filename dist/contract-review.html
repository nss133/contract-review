<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>계약서 리뷰 가이드 — 법무팀</title>
<style>* { box-sizing: border-box; }
body { margin: 0; font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
       color: #1a1a2e; background: #f5f6fa; }
.topbar { display: flex; align-items: center; gap: 24px; padding: 12px 20px;
          background: #1a1a2e; color: #fff; }
.topbar h1 { font-size: 17px; margin: 0; }
.tab { background: none; border: none; color: #aab; padding: 8px 14px;
       font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #4ea1ff; }
.tab:disabled { opacity: .35; cursor: default; }
main { max-width: 1200px; margin: 0 auto; padding: 20px; }
.pane { display: none; }
.pane.active { display: block; }
.controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 12px; }
select, input[type=search], textarea { font: inherit; padding: 6px 10px;
  border: 1px solid #ccd; border-radius: 6px; }
textarea#contract-text { width: 100%; height: 200px; }
.primary { background: #2456e6; color: #fff; border: none; border-radius: 6px;
           padding: 9px 18px; font-size: 14px; cursor: pointer; }
.filebtn { display: inline-block; padding: 8px 14px; border: 1px dashed #99a;
           border-radius: 6px; cursor: pointer; font-size: 13px; }
.error { color: #c0392b; }
.module-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.module-chip { padding: 5px 12px; border-radius: 20px; border: 1px solid #bbc;
               background: #fff; font-size: 13px; cursor: pointer; }
.module-chip.on { background: #2456e6; color: #fff; border-color: #2456e6; }
.module-chip.suggested { border-color: #e67e22; box-shadow: 0 0 0 2px #f8c47155; }

#input-panel { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
               padding: 4px 16px 16px; margin-bottom: 16px; }
#input-panel summary { cursor: pointer; padding: 10px 0; font-weight: 600; }
.input-actions { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
#analyze-setup { margin-top: 12px; }

.cp-card { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
           padding: 14px 16px; margin-bottom: 10px; }
.cp-card h3 { margin: 0 0 6px; font-size: 15px; }
.cp-card .norm-type { font-size: 12px; color: #667; font-weight: normal; margin-left: 4px; }
.cp-card .check-q { font-weight: 600; margin: 6px 0; }
.sev { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-right: 6px; }
.sev-필수 { background: #fdecea; color: #c0392b; }
.sev-권장 { background: #fef5e7; color: #b9770e; }
.sev-참고 { background: #eaf2f8; color: #21618c; }

.badge { font-size: 11px; padding: 1px 7px; border-radius: 8px; white-space: nowrap; }
.badge.verified { background: #e8f8f0; color: #1e8449; }
.badge.unverified { background: #fef5e7; color: #b9770e; }
.badge.mismatch { background: #fdecea; color: #c0392b; }
.badge.missing { background: #fdecea; color: #c0392b; }
.badge.ref { background: #eaeef5; color: #48587a; }
.badge.practice { background: #eef0f3; color: #555; }
.badge.cov-addressed { background: #e8f8f0; color: #1e8449; }
.badge.cov-verify { background: #e5f3fa; color: #1a6f96; }
.badge.cov-consider { background: #fef5e7; color: #b9770e; }
.badge.cov-quiet { background: #eef0f3; color: #99a; }
.badge.self-reg { background: #efe9fa; color: #6c3fb5; }

details.law { margin-top: 8px; font-size: 13px; }
details.law pre { white-space: pre-wrap; background: #f8f9fc; padding: 10px;
                  border-radius: 6px; max-height: 300px; overflow-y: auto; }

.quote-block { margin: 8px 0; padding: 8px 12px; background: #f2f6ff;
               border-left: 4px solid #2456e6; border-radius: 0 6px 6px 0; }
.quote-block .quote-label { margin: 0 0 4px; font-size: 11px; color: #2456e6;
                             font-weight: 600; }
.quote-block blockquote { margin: 0; font-size: 13px; line-height: 1.6; }
.match-excerpt { margin-top: 8px; }
.match-excerpt pre { white-space: pre-wrap; font: 13px/1.6 inherit; background: #f8f9fc;
                     padding: 10px; border-radius: 6px; }
.reasons { font-size: 12px; color: #667; }
.ranked-alt { font-size: 12px; color: #667; margin-top: 6px; }
.note { font-size: 12px; color: #667; margin-top: 8px; }

/* 체크리스트 표 */
#checklist-table { width: 100%; border-collapse: collapse; background: #fff;
                    border: 1px solid #e0e2ee; border-radius: 8px; overflow: hidden; }
#checklist-table th, #checklist-table td { padding: 10px 12px; text-align: left;
                    border-bottom: 1px solid #e8eaf2; font-size: 13px; vertical-align: top; }
#checklist-table th { background: #f0f2fa; font-size: 12px; color: #445; }
#checklist-table tr.cp-row { cursor: pointer; }
#checklist-table tr.cp-row:hover { background: #f7f9ff; }
#checklist-table tr.row-consider { background: #fefaf1; }
#checklist-table tr.row-consider:hover { background: #fdf3df; }
#checklist-table tr.expanded { background: #eef2fd; }
#checklist-table tr.cp-detail td { background: #fafbff; padding: 14px 20px; }
.match-cell { font-weight: 600; white-space: nowrap; }
.match-cell.cov-addressed { color: #1e8449; }
.match-cell.cov-verify { color: #1a6f96; }
.match-cell.cov-consider { color: #b9770e; }
.match-cell.cov-quiet { color: #aab; font-weight: normal; }
.sev-basis-hint { display: block; font-size: 11px; color: #889; font-weight: normal;
                  margin-top: 3px; line-height: 1.35; }
.sev-basis { font-size: 12px; color: #778; margin: 2px 0 6px; }
td.empty { text-align: center; color: #889; padding: 24px; }

.empty-note { color: #667; }
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.col { max-height: 75vh; overflow-y: auto; }
.clause { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
          padding: 12px; margin-bottom: 8px; cursor: pointer; }
.clause.sel { border-color: #2456e6; box-shadow: 0 0 0 2px #2456e633; }
.clause .cnt { float: right; font-size: 12px; color: #2456e6; }
.clause pre { white-space: pre-wrap; font: 13px/1.6 inherit; margin: 6px 0 0; }
.consider-item { border-left: 4px solid #e0a83e; }

/* 조항별 좌우대비 */
.clause-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.compare-col { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px; padding: 12px 14px; }
.compare-col h3 { margin: 0 0 10px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.addressed-col { border-top: 3px solid #1e8449; }
.verify-col { border-top: 3px solid #1a6f96; }
.compare-item { border-bottom: 1px solid #eef0f5; padding: 8px 0; }
.compare-item:last-child { border-bottom: none; }
.compare-item .ci-head { display: flex; align-items: center; gap: 6px; }
.compare-item .ci-id { font-size: 12px; color: #667; font-weight: 600; }
.compare-item .ci-q { margin: 4px 0; font-size: 13px; font-weight: 600; }
.compare-item .ci-reason { margin: 2px 0; font-size: 12px; color: #556; }
.compare-item .ci-basis { margin: 2px 0; font-size: 11px; color: #889; }
.compare-item .ci-src { margin: 4px 0 0; font-size: 12px; }
.compare-empty { color: #99a; font-size: 12px; margin: 4px 0; }
@media (max-width: 720px) { .clause-compare { grid-template-columns: 1fr; } }
.disclaimer { text-align: center; font-size: 12px; color: #667; padding: 16px;
              border-top: 1px solid #dde; margin-top: 30px; }

/* 리포트 — 긍정-먼저 검토 워크시트 */
#report-body h2 { font-size: 18px; margin: 0 0 6px; }
.report-intro { color: #556; font-size: 13px; margin: 0 0 16px; line-height: 1.6; }
.report-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.tile { border: 1px solid #e0e2ee; border-radius: 10px; padding: 16px 18px;
        display: flex; flex-direction: column; gap: 3px; background: #fff; }
.tile .tile-n { font-size: 30px; font-weight: 700; line-height: 1; }
.tile .tile-label { font-size: 14px; font-weight: 600; }
.tile .tile-sub { font-size: 12px; color: #778; }
.tile-addressed { border-top: 4px solid #1e8449; }
.tile-addressed .tile-n { color: #1e8449; }
.tile-verify { border-top: 4px solid #1a6f96; }
.tile-verify .tile-n { color: #1a6f96; }
.tile-consider { border-top: 4px solid #b9770e; }
.tile-consider .tile-n { color: #b9770e; }
@media (max-width: 720px) { .report-tiles { grid-template-columns: 1fr; } }

.report-sec-block { margin-bottom: 16px; }
.report-sec-block h3 { font-size: 15px; margin: 0 0 4px; }
.sec-hint { font-size: 12px; color: #889; margin: 0 0 10px; }
.report-sec { background: #fff; border: 1px solid #e0e2ee; border-radius: 8px;
              padding: 6px 14px; margin-bottom: 12px; }
.report-sec > summary { cursor: pointer; padding: 8px 0; font-weight: 600; font-size: 14px; }
.report-none { color: #889; font-size: 13px; margin: 8px 0; }

.report-item { border: 1px solid #eceef5; border-radius: 8px; padding: 12px 14px;
               margin-bottom: 8px; background: #fff; }
.report-item.consider-item { border-left: 4px solid #e0a83e; }
.report-item.verify-item { border-left: 4px solid #1a6f96; }
.report-item.addressed-item { border-left: 4px solid #1e8449; }
.report-item .ri-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.report-item .ri-q { font-weight: 600; font-size: 14px; }
.report-item .ri-why { font-size: 12px; color: #8a6d1f; margin: 6px 0 4px; }
.report-item .ri-loc { font-size: 12px; color: #556; margin: 6px 0 2px; }
.report-item .ri-reason { font-size: 12px; color: #667; margin: 2px 0; }
.report-item .ri-src { font-size: 12px; color: #556; margin: 6px 0 4px; }
.signoff { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
           color: #445; margin-top: 6px; cursor: pointer; }
.report-more { margin-top: 4px; }
.report-more > summary { cursor: pointer; font-size: 13px; color: #48587a; padding: 6px 0; }

.clause-summary { list-style: none; padding: 0; margin: 8px 0; }
.clause-summary li { padding: 6px 0; border-bottom: 1px solid #f0f2f7; font-size: 13px; }
.clause-summary li:last-child { border-bottom: none; }
.clause-summary .cs-cnt { float: right; font-size: 12px; color: #2456e6; }

@media print { .topbar, .disclaimer, button { display: none; }
               .pane { display: none; } #pane-report { display: block; }
               .report-tiles { break-inside: avoid; }
               .report-item, .tile { break-inside: avoid; }
               .report-sec, .report-more { border: none; padding: 0; } }
</style>
</head>
<body>
<header class="topbar">
  <h1>계약서 리뷰 가이드</h1>
  <nav>
    <button data-tab="checklist" class="tab active">체크리스트</button>
    <button data-tab="clauses" class="tab">조항별 보기</button>
    <button data-tab="report" class="tab" id="report-tab" disabled>리포트</button>
  </nav>
</header>

<main>
  <!-- 체크리스트 (주 탭) -->
  <section id="pane-checklist" class="pane active">
    <details id="input-panel" open>
      <summary>계약서 입력</summary>
      <div id="analyze-input">
        <textarea id="contract-text" placeholder="계약서 텍스트를 붙여넣으세요"></textarea>
        <div class="input-actions">
          <label class="filebtn">.docx 열기<input id="docx-file" type="file" accept=".docx" hidden></label>
          <button id="btn-analyze" class="primary">분석 시작</button>
        </div>
        <p id="input-error" class="error" hidden></p>
      </div>
      <div id="analyze-setup" hidden>
        <div id="screening" class="module-bar"></div>
        <button id="btn-run" class="primary">이 조건으로 검토</button>
      </div>
    </details>

    <div class="controls" id="checklist-toolbar">
      <label>계약 유형 <select id="checklist-type"></select></label>
      <label>모듈 <select id="filter-module"><option value="">전체</option></select></label>
      <label>심각도 <select id="filter-severity">
        <option value="">전체</option>
        <option value="필수">필수</option>
        <option value="권장">권장</option>
        <option value="참고">참고</option>
      </select></label>
      <label>검토상태 <select id="filter-match">
        <option value="">전체</option>
        <option value="unmatched">검토 제안만</option>
        <option value="matched">반영·확인만</option>
      </select></label>
      <input id="filter-search" type="search" placeholder="확인사항·법령 검색">
    </div>
    <div id="checklist-modules" class="module-bar"></div>

    <table id="checklist-table">
      <thead>
        <tr><th>매칭</th><th>ID</th><th>확인 사항</th><th>심각도</th><th>규범</th><th>근거</th></tr>
      </thead>
      <tbody id="checklist-body"></tbody>
    </table>
  </section>

  <!-- 조항별 보기 (보조 탭) -->
  <section id="pane-clauses" class="pane">
    <p id="clauses-empty" class="empty-note">먼저 체크리스트 탭에서 계약서를 분석하세요.</p>
    <div id="analyze-result" class="split" hidden>
      <div id="clause-list" class="col"></div>
      <div id="mapping-detail" class="col"></div>
    </div>
  </section>

  <!-- 종합 리포트 -->
  <section id="pane-report" class="pane">
    <div id="report-body"></div>
    <button onclick="window.print()">인쇄</button>
  </section>
</main>

<footer class="disclaimer">
  본 도구는 규칙 기반 스크리닝 참고자료이며 법적 판단을 대체하지 않음.
  근거 배지: <span class="badge verified">원문확인</span>
  <span class="badge unverified">원문 미대조</span>
  <span class="badge mismatch">문언 불일치</span>
  <span class="badge missing">원문 미확인</span>
  <span class="badge ref">참조</span>
  <span class="badge practice">실무</span>

"제5조", "clause": "제5항 제1호", "quote": "보험회사는 손해사정 위수탁 당사자 간 합의한 업무범위 등 계약조건을 반드시 반영하여 손해사정업무 위탁계약서를 작성하고 교부하여야 한다", "verified": false, "source_type": "self_regulation", "text": "제5조(위탁손해사정사 위탁 절차) ① 보험회사의 위탁 절차는 위탁 대상 업무설정, 위탁 대상 보험사고 및 상품 설정, 업체 현황 조사, 후보선정, 비교평가, 후보당사자 의견 청취, 계약체결, 보험업감독규정 제9-21조의2에 따른 예탁보증여부 및 인허가보증보험 가입여부 확인, 결과‧평가요소의 안내 등 모든 위탁 관련 업무를 포함한다.\n② 보험회사는 손해사정사 또는 손해사정업자가 제출한 손해사정 업무 결과 등 객관적인 평가자료에 근거하여 그 업무에 소요되는 필요 비용을 고려한 합리적인 위탁수수료 산정‧지급체계를 설계하여야 하고, 자회사와 비자회사 위탁손해사정사를 불합리한 방식으로 차별하여서는 아니된다.\n③ 보험회사는 손해사정에 관한 업무를 자회사인 위탁손해사정사에게 일정 비율을 초과하여 위탁한 경우에는 제1항에 따른 위탁절차와 동 위탁절차에 따른 위탁결과 등을 연1회 이사회에 보고하고 홈페이지에 공시하여야 한다.\n④ 제3항의 일정비율은 각 보험회사의 직전년도 전체 손해사정업무 중 위탁된 손해사정업무가 차지하는 비율의 100분의 50을 말하고, 동 위탁 건수 산정 대상이 되는 업무 범위는 보험업법 제188조 손해사정사의 업무를 의미한다.\n⑤ 보험회사는 위탁 계약 체결 및 이행과 관련하여 손해사정사 또는 손해사정업자에게 보험회사에 유리한 손해사정을 강요할 수 없고, 손해사정의 공정성을 보호하기 위하여 다음 각 호의 원칙을 준수하여야 한다.\n1. 보험회사는 손해사정 위수탁 당사자 간 합의한 업무범위 등 계약조건을 반드시 반영하여 손해사정업무 위탁계약서를 작성하고 교부하여야 한다.\n2. 보험회사는 손해사정 위탁계약서상 계약사항을 이행하지 않거나 위탁계약서에 정한 업무 외의 업무를 강요할 수 없다.\n3. 보험회사는 위탁손해사정사 선정을 위한 입찰 전후로 “예정 가격”을 1개 사례에 대해서만 형식적으로 조사하거나, 시장 평균 대비 과도하게 낮추어 조사하는 등 예정 가격을 낮추도록 유도할 수 없다.\n4. 보험회사는 보험업감독규정 제9-21조에 따른 보정요청 등 정당한 사유 없이 손해사정서상 결정된 보험금 지급 금액을 임의 변경하여 지급할 수 없다. 다만, 배상책임보험의 사고 당사자 간 합의에 따른 조정 등은 제외한다.\n5. 보험회사의 자체 의료자문 결과를 손해사정서 작성 전에 위탁손해사정사에게 송부하거나, 보험금 합의 및 제한 요건/기준을 설정하는 등 손해사정 결과에 영향력을 행사 할 수 없다.\n⑥ 보험회사는 다음 각 호의 경우를 제외하고는 위탁계약에 따라 수수료를 지급하여야 한다.\n1. 조사 중단, 미결 등 손해사정사 또는 손해사정업자가 위탁계약서에서 정한 사항을 준수하지 못하는 경우\n2. 손해사정사 또는 손해사정업자가 보험업법 제189조, 보험업법시행령 제99조, 보험업감독규정 제9-14조 등을 위반하는 경우\n3. 손해사정사 또는 손해사정업자가 보험계약자와 분쟁을 야기하거나, 손해사정 미이행 및 불완전 이행을 고의 또는 중과실로 초래한 경우\n⑦ 보험회사, 보험협회, 손해사정사 또는 손해사정업자 단체는 위탁실무의 공정성과 관련된 사안을 논의하기 위하여 손해사정 협의체를 구성 및 운영할 수 있다.", "status": "quote_ok"}], "note": "자율규제(손해사정 업무위탁 모범규준)는 손해사정 위탁에 한해 업무범위 계약서 반영 의무를 부과 — 일반 위탁의 참고 근거"}, {"id": "CORE-02", "module": "M-CORE", "check": "위탁 업무가 인가받은 금융업 또는 다른 금융업의 본질적 요소를 포함하지 않는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조", " 만, 손해사정 위탁 이력이 없어 평가 대상 정보가 없는 경우에는 최초 1회에 한하여 선정을 위한 별도의 기준을 마련할 수 있다.\n1. 평가항목별 평가산정 세부지침이 모범규준의 평가기준과 일관성이 있도록 합리적으로 설정하여야 한다.\n2. 객관적인 자료로 입증이 가능한 평가여야 한다.\n3. 평가항목별 배점은 특정항목에 편중되지 않아야 한다.\n4.정성평가 배점을 늘려 정량평가 항목의 배점을 초과하거나, 형식적으로 절대평가를 수행하거나, 동일한 평가유형/지표를 특별한 이유없이 손해사정사 또는 손해사정업자별로 다르게 적용하여서는 아니된다.\n③ 제1항의 평가기준에는 손해사정사 또는 손해사정업자별 보험금액‧손해율 등을 평가하거나, 손해사정업자별 손해율 총량한도 등을 고정적으로 제한하여 손해사정사 또는 손해사정업자에게 담보별로 보험금의 부지급, 인위적인 삭감을 유도하는 등 손해사정의 객관성 및 공정성을 훼손하거나 소비자에게 불리한 내용을 포함할 수 없다.\n④ 보험회사는 내부감사 또는 준법감시인의 확인을 거쳐 마련한 제1항의 위탁 평가 기준을 홈페이지에 공시하고, 평가기준의 중대한 변경이 있는 경우 이를 위탁 당사자에게 알려야 한다. 또한, 평가기준에 따라 위탁손해사정사를 선정한 경우 당사자 등 이해관계자의 요청이 있으면 불가피한 사유가 없는 한, 세부지표 등 평가기준 등을 제공하여야 한다.", "status": "quote_ok"}]}, {"id": "CORE-06", "module": "M-CORE", "check": "위탁업무 처리가 금융실명법 등 관련 법령에 저촉되지 않도록 하는 법령 준수 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제3조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["금융실명", "관련 법령", "법령 준수", "컴플라이언스"]}, "absence_check": true, "sources": [{"law": "금융기관의 업무위탁 등에 관한 규정", "article": "제3조(업무위탁 등)", "clause": "제3항 제5호", "quote": "「금융실명거래 및 비밀보장에 관한 법률」 등 관련 법령에의 저촉 여부", "verified": false, "text": "제3조(업무위탁 등) ① 금융기관은 인가등을 받은 업무를 영위함에 있어 제3자에게 업무를 위탁하거나 제3자의 업무를 수탁할 수 있다. 다만, 다음 각 호의 어느 하나에 해당하는 사항은 그러하지 아니하다.<개정 2017. 11. 14.> 1. 인가 등을 받은 금융업 또는 다른 금융업의 본질적 요소를 포함하는 업무를 위탁하는 경우. 다만, 다음 각 목의 어느 하나에 해당하는 업무의 경우에는 위탁할 수 있다. 가. 위탁하고자 하는 업무가 해당 금융업의 본질적 요소가 아니라 다른 금융업의 본질적 요소인 경우로서 법령에서 해당 업무수행을 허용하고 있는 자에 대하여 위탁하는 경우 나. 인가등을 받은 업무를 효율적으로 수행하는 데 필요한 경우로서 해당 업무를 위탁하더라도 금융기관의 건전성 또는 신인도를 저해하거나 금융질서의 문란 또는 금융이용자 피해를 발생시킬 우려가 낮은 것으로 금융위원회가 인정하는 경우 2. 관련 법령에서 금융기관이 수행하도록 의무를 부여하고 있는 경우 3. 업무의 위탁 또는 수탁으로 인하여 당해 금융기관의 건전성 또는 신인도를 크게 저해하거나 금융질서의 문란 또는 금융이용자의 피해 발생이 심히 우려되는 경우 ② 제1항 제1호의 본질적 요소에 해당하는 사항은 <별표 2>과 같다.<개정 2017. 11. 14.> 1. <본호 삭제 2005. 7. 27> 2. <본호 삭제 2005. 7. 27> 3. <본호 삭제 2005. 7. 27> 4. <본호 삭제 2005. 7. 27> ③ 금융기관이 제1항의 규정에 따라 제3자에게 업무를 위탁하거나 제3자로부터 업무를 수탁하는 경우에는 다음 각 호의 사항을 고려하여 동 업무가 적정하게 처리될 수 있도록 ": "의료자문 표준내부통제기준", "article": "제4조", "clause": "제2항", "quote": "보험회사는 제1항에 따른 수탁자를 관리하기 위하여 업무위탁 규정 제3조의2에 따른 업무위수탁운영기준을 마련하고 이를 준수하여야 한다", "verified": false, "source_type": "self_regulation", "text": "제4조(업무 수탁자에 대한 관리책임) ① 보험회사는 「금융기관의 업무위탁 등에 관한 규정」(이하 ‘업무위탁 규정’이라 한다.)에 따라 의료자문 관련 업무를 손해사정업자 등 제3자에게 위탁(수탁자가 재위탁하는 경우를 포함한다)하는 경우 수탁자가 이 기준에 따라 보험회사가 마련한 의료자문 관련 내부통제기준을 준수할 수 있도록 관리하여야 한다.\n② 보험회사는 제1항에 따른 수탁자를 관리하기 위하여 업무위탁 규정 제3조의2에 따른 업무위수탁운영기준을 마련하고 이를 준수하여야 한다.\n③ 보험회사가 제2항에 따라 마련한 업무위수탁운영기준에는 다음 각 호의 사항이 포함되어야 하며, 수탁자가 이를 위반한 경우 보험회사는 위수탁계약 해지 등 적절한 조치를 취하여야 한다.\n1. 위탁자의 내부통제기준에 대한 수탁자의 준수 의무\n2. 위탁자의 제1호에 따른 의무 위반 여부에 대한 점검 및 관리\n3. 수탁자의 수탁업무 이행 현황 보고 의무\n4. 수탁자의 의무 위반시 위탁자의 조치사항\n④ 보험회사가 제1항에 따라 업무를 위탁하는 경우 보험회사는 수탁자가 제2항에 따른 업무위수탁기준에서 정하는 의무를 위반하여 발생하는 손해에 대해서 업무위탁 규정 제3조 제5항에 따라 배상책임을 진다.", "status": "quote_ok"}], "note": "별표 3 업무위수탁기준 세부 문언은 DB 미수록 — 원문 미확인. 자율규제(의료자문 표준내부통제기준 제4조)는 수탁자 준수 점검·관리·보고·조치를 업무위수탁운영기준에 포함하도록 요구"}, {"id": "CORE-11", "module": "M-CORE", "check": "감독원장 사전보고(수탁자의 업무 개시 7영업일 이전) 일정·자료 협조가 계약 발효와 연동되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융기관의 업무위탁 등에 관한 규정 제4조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["보고", "금융감독원", "감독원장", "7영업일"]}, "absence_check": true, "sources": [{"law": "금융기관의 업무위탁 등에 관한 규정", "article": "제4조(보고)", "clause": "제1항", "quote": "그 사실을 업무를 위탁받은 자가 그 위탁받은 업무를 실제로 수행하려는 날의 7영업일 이전에 <별지 제1호 서식>에 따라 다음 각호의 서류를 첨부하여 감독원장에게 보고하여야 한다", "verified": false, "text": "제4조(보고) ① 금융기관이 제3조제1항의 규정에 따라 제3자와 업무위탁 계약을 체결하거나 제3자(금융기관 및「자본시장과 금융투자업에 관한 법률」에 따른 금융투자업자, 종합금융회사는 제외한다)와 업무수탁계약을 체결하고자 하는 경우에는 그 사실을 업무를 위탁받은 자가 그 위탁받은 업무를 실제로 수행하려는 날의 7영업일 이전에 <별지 제1호 서식>에 따라 다음 각호의 서류를 첨부하여 감독원장에게 보고하여야 한다.<개정 2017. 11. 14.> 1. 위탁 또는 수탁 관련 계약서(안) 사본 2. 업무위수탁계약이 제3조제3항 각 호의 고려사항에 저촉되지 아니하고 제3조의2에 따른 자체 업무위수탁 운영기준에 위배되지 아니하다는 준법감시인(준법감시인이 없는 경우에는 감사 등 이에 준하는 자를 말한다)의 검토의견 및 관련 자료 사본<개정 2017. 11. 14.> 3. 위탁 또는 수탁의 필요성 및 기대효과 4. 위탁 또는 수탁에 따른 업무처리절차의 주요변경내용 ② 금융기관은 제1항의 규정에 불구하고 다음 각호의 1에 해당하는 경우에는 제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다.<개정 2017. 11. 14.> 1. 당해 금융기관 또는 동일한 금융업을 영위하는 다른 금융기관이 감독원장에게 보고한 내용과 동일한 경우<개정 2017. 11. 14.> 2. 금융기관이 약관 등을 보고하면서 당해 약관 등의 내용과 관련된 위탁 또는 수탁예정업무를 보고한 경우(제1항에 의한 첨부서류를 제출한 경우에 한한다) 3. 해당 금융기관이 이미 보고한 내용을 일부 변경하는 경우로서 변경되는 내용이 경미한 경우<개정 2017. 11. 14.> 4. 동일한 수탁자에게 반복, 지속적으로 업무위탁이 이루어지는 경우로서 최초 업무위탁시에 사전보고가 이루어진 경우. 단, 이 경우 금융회사는 사전보고시에 향후 발생 가능한 추가적인 업무위탁의 대략적인 내용을 작성하여 금감원장에게 제출하여야 한다.<신설 2017. 11. 14.> 5. 금융기관이 제3자로부터 업무를 수탁하는 경우 ③ 감독원장은 제1항 및 제2항의 규정에 의하여 금융기관이 보고한 업무위탁 또는 수탁현황을 매반기 금융위에 보고하여야 한다.", "status": "quote_ok"}]}, {"id": "CORE-12", "module": "M-CORE", "check": "본 위탁이 사전보고 생략(반기별 사후보고) 사유에 해당하는지 확인되는가", "severity": "권장", "severity_basis": "근거 조문이 임의규정임 — 금융기관의 업무위탁 등에 관한 규정 제4조", "norm_type": "임의", "basis": "statute", "triggers": {"keywords": ["사후보고", "반기", "업무보고서"]}, "absence_check": false, "sources": [{"law": "금융기관의 업무위탁 등에 관한 규정", "article": "제4조(보고)", "clause": "제2항", "quote": "제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다", "verified": false, "text": "제4조(보고) ① 금융기관이 제3조제1항의 규정에 따라 제3자와 업무위탁 계약을 체결하거나 제3자(금융기관 및「자본시장과 금융투자업에 관한 법률」에 따른 금융투자업자, 종합금융회사는 제외한다)와 업무수탁계약을 체결하고자 하는 경우에는 그 사실을 업무를 위탁받은 자가 그 위탁받은 업무를 실제로 수행하려는 날의 7영업일 이전에 <별지 제1호 서식>에 따라 다음 각호의 서류를 첨부하여 감독원장에게 보고하여야 한다.<개정 2017. 11. 14.> 1. 위탁 또는 수탁 관련 계약서(안) 사본 2. 업무위수탁계약이 제3조제3항 각 호의 고려사항에 저촉되지 아니하고 제3조의2에 따른 자체 업무위수탁 운영기준에 위배되지 아니하다는 준법감시인(준법감시인이 없는 경우에는 감사 등 이에 준하는 자를 말한다)의 검토의견 및 관련 자료 사본<개정 2017. 11. 14.> 3. 위탁 또는 수탁의 필요성 및 기대효과 4. 위탁 또는 수탁에 따른 업무처리절차의 주요변경내용 ② 금융기관은 제1항의 규정에 불구하고 다음 각호의 1에 해당하는 경우에는 제1항에 의한 사전보고를 생략하고, <별지 제2호 서식>에 따라 업무위수탁현황을 그 금융기관의 설립근거가 되는 법률 등에 따른 업무보고서에 포함하여 감독원장에게 반기별로 사후보고할 수 있다.<개정 2017. 11. 14.> 1. 당해 금융기관 또는 동일한 금융업을 영위하는 다른 금융기관이 감독원장에게 보고한 내용과 동일한 경우<개정 2017. 11. 14.> 2. 금융기관이 약관 등을 보고하면서 당해 약관 등의 내용과 관련된 위탁 또는 수탁예정업무를 보고한 경우(제1항에 의한 첨부서류를 제출한 경우에 한한다) 3. 해당 금융기관이 이미 보고한 내용을 일부 변경하는 경우로서 everity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["개인정보", "처리위탁", "개인정보 처리", "특약"]}, "absence_check": true, "sources": [{"law": "개인정보 보호법", "article": "제26조", "clause": "제1항", "quote": "개인정보처리자가 제3자에게 개인정보의 처리 업무를 위탁하는 경우에는 다음 각 호의 내용이 포함된 문서로 하여야 한다", "verified": false, "text": "제26조(업무위탁에 따른 개인정보의 처리 제한) 제26조(업무위탁에 따른 개인정보의 처리 제한) ① 개인정보처리자가 제3자에게 개인정보의 처리 업무를 위탁하는 경우에는 다음 각 호의 내용이 포함된 문서로 하여야 한다. <개정 2023.3.14> 1. 위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항 2. 개인정보의 기술적ㆍ관리적 보호조치에 관한 사항 3. 그 밖에 개인정보의 안전한 관리를 위하여 대통령령으로 정한 사항 ② 제1항에 따라 개인정보의 처리 업무를 위탁하는 개인정보처리자(이하 \"위탁자\"라 한다)는 위탁하는 업무의 내용과 개인정보 처리 업무를 위탁받아 처리하는 자(개인정보 처리 업무를 위탁받아 처리하는 자로부터 위탁받은 업무를 다시 위탁받은 제3자를 포함하며, 이하 \"수탁자\"라 한다)를 정보주체가 언제든지 쉽게 확인할 수 있도록 대통령령으로 정하는 방법에 따라 공개하여야 한다. <개정 2023.3.14> ③ 위탁자가 재화 또는 서비스를 홍보하거나 판매를 권유하는 업무를 위탁하는 경우에는 대통령령으로 정하는 방법에 따라 위탁하는 업무의 내용과 수탁자를 정보주체에게 알려야 한다. 위탁하는 업무의 내용이나 수탁자가 변경된 경우에도 또한 같다. ④ 위탁자는 업무 위탁으로 인하여 정보주체의 개인정보가 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손되지 아니하도록 수탁자를 교육하고, 처리 현황 점검 등 대통령령으로 정하는 바에 따라 수탁자가 개인정보를 안전하게 처리하는지를 감독하여야 한다. <개정 2015.7.24> ⑤ 수탁자는 개인정보처리자로부터 위탁받은 해당 업무 범위를 초과하여 개인정보를 이용하거나 제3자에게 제공하여서는 아니 된다. ⑥ 수탁자는 위탁받은 개인정보의 처리 업무를 제3자에게 다시 위탁하려는 경우에는 위탁자의 동의를 받아야 한다. <신설 2023.3.14> ⑦ 수탁자가 위탁받은 업무와 관련하여 개인정보를 처리하는 과정에서 이 법을 위반하여 발생한 손해배상책임에 대하여는 수탁자를 개인정보처리자의 소속 직원으로 본다. <개정 2023.3.14> ⑧ 수탁자에 관하여는 제15조부터 제18조까지, 제21조, 제22조, 제22조의2, 제23조, 제24조, 제24조의2, 제25조, 제25조의2, 제27조, 제28조, 제28조의2부터 제28조의5까지, 제28조의7부터 제28조의11까지, 제29조, 제30조, 제30조의2, 제31조, 제33조, 제34조, 제34조의2, 제35조, 제35조의2, 제36조, 제37조, 제37조의2, 제38조, 제59조, 제63조, 제63조의2 및 제64조의2를 준용한다. 이 경우 \"개인정보처리자\"는 \"수탁자\"로 본다. <개정 2023.3.14>", "status": "quote_ok"}]}, {"id": "PRIV-02", "module": "M-PRIV", "check": "위탁 문서에 위탁업무 수행 목적 외 개인정보의 처리 금지에 관한 사항이 포함되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 개인정보 보호법 제26조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["목적 외", "목적외", "처리 금지"]}, "absence_check": true, "sources": [{"law": "개 행", "basis": "statute", "triggers": {"keywords": ["분리", "업무장소", "전산설비", "개발 장소"]}, "absence_check": true, "sources": [{"law": "전자금융감독규정", "article": "제60조", "clause": "제1항 제1호", "quote": "외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영", "verified": false, "text": "제60조(외부주문등에 대한 기준) ① 금융회사 또는 전자금융업자는 전자금융거래를 위한 외부주문등의 경우에는 다음 각 호의 사항을 준수하여야 한다.<개정 2013. 12. 3.> 1. 외부주문등에 의한 정보처리시스템의 개발업무에 사용되는 업무장소 및 전산설비는 내부 업무용과 분리하여 설치ㆍ운영<개정 2015. 2. 3.> 2. 금융회사와 이용자 간 암호화정보 해독 및 원장 등 중요 데이터 변경 금지<개정 2013. 12. 3.> 3. 계좌번호, 비밀번호 등 이용자 금융정보 무단보관 및 유출 금지 4. 접근매체 위ㆍ변조, 해킹, 개인정보유출 등에 대비한 보안대책 수립 5. 금융회사와 전자금융보조업자 간의 접속은 전용회선(전용회선과 동등한 보안수준을 갖춘 가상의 전용회선을 포함한다)을 사용<개정 2013. 12. 3., 2016. 10. 5.> 6. 정보처리시스템 장애 등 서비스 중단에 대비한 비상대책 수립 7. 외부주문등의 입찰ㆍ계약ㆍ수행ㆍ완료 등 각 단계별로 금융감독원장이 정하는 보안관리방안을 따를 것<개정 2015. 2. 3.> 8. 업무지속성을 위한 중요 전산자료의 백업(backup)자료 보존 및 백업설비 확보 등 백업대책 수립 9. 정보관리의 취약점을 최소화하고 보안유지를 위한 내부통제방안을 수립ㆍ운용하고, 통제는 제8조제1항제2호의 조직에서 수행<개정 2015. 2. 3.> 10. 전자금융보조업자에 대한 재무건전성을 연1회 이상 평가하여 재무상태 악화에 따른 도산에 대비하고 전자금융보조업자의 주요 경영활동에 대해 상시 모니터링을 실시 11. 전자금융보조업자가 제공하는 서비스의 품질수준을 연1회 이상 평가할 것 12. 전자금융보조업자가 사전 동의 없이 다시 외부주문등 계약을 체결하거나 계약업체를 변경하지 못하도록 하고, 사전 동의시 해당 계약서에 제7호의 사항을 기재하도록 통제<개정 2016. 6. 30.> 13. 업무수행인력에 대하여 사전 신원조회 실시(이 경우 신원보증보험 증권 징구로 갈음할 수 있다) 또는 대표자의 신원보증서 징구, 인력변경시 인수인계에 관한 사항 등을 포함한 업무수행인력 관리방안 수립<개정 2018. 12. 21.> 14. 외부주문등은 자체 보안성검토 및 정기(금융감독원장이 정하는 중요 점검사항에 대해서는 매일) 보안점검 실시<개정 2015. 2. 3.> ② 금융회사 또는 전자금융업자는 제1항제10호 및 제11호의 평가결과를 금융감독원장에게 보고하여야 한다.<개정 2013. 12. 3.> ③ 금융감독원장은 제2항의 규정에 따른 평가결과 보고를 접수하고, 그 평가실시 여부를 제58조제2항의 규정에 따른 정보기술부문 실태평가에 반영할 수 있다. ④ 법 제40조제6항 단서에서 \"금융위원회가 인정하는 경우\"란 전자금융거래정보의 보호와 관련된 전산장비ㆍ소프트웨어에 대한 개발ㆍ운영 및 유지관리 업무를 재위탁하는 경우로서 다음 각 호의 사항을 준수하는 경우를 말한다. 1. 재수탁업자가 재위탁된 업무를 처리함에 있어 금융거래 정보의 변경이 필요한 경우에는 위탁회사 또는 원수탁업자의 개별적 지시에 따라야 하며, 위탁회사 또는 원수탁업자는 변경된 정보가 지시 내용에 부합하는지 여부를 확인하여야 함 2. 위탁업무와 관련된 이용자의 금융거래정보는 위탁회사의 전산실 내에 두어야 함. 다만, 재수탁업자가 이용자의 이용자 정보를 어떠한 경우에도 알지 못하도록 위탁회사 또는 원수탁업자가 금융거래정보를 처리하여 제공한 경우에는 위탁회사의 관리ㆍ통제 하에 재수탁회사 등 제3의 장소로 이전 가능함 ⑤ 금융회사 또는 전자금융업자  따른 국외 사이버몰을 위한 전자지급결제대행업자는 제외한다)가 고유식별정보 또는 개인신용정보를 클라우드컴퓨팅서비스를 통하여 처리하는 경우에는 제11조제2호를 적용하고, 해당 정보처리시스템을 국내에 설치하여야 한다. <단서신설 2018. 12. 21><개정 2022. 11. 23., 2025. 2. 5.> ⑧ 그 밖에 금융회사 또는 전자금융업자의 클라우드컴퓨팅서비스 이용에 대해서는 「금융회사의 정보처리 업무 위탁에 관한 규정」에 따른다.<종전의 제9항에서 이동, 2025. 2. 5.><신설 2018. 12. 21.> #### 제5절 정보보호부문<신설 2025. 2. 5.>", "status": "quote_ok"}]}, {"id": "SOL-01", "module": "M-SOLICIT", "check": "위탁 상대방이 보험설계사·보험대리점·보험중개사 등 모집 자격자로서 유효하게 등록되어 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 보험업법 제83조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["모집", "보험설계사", "보험대리점", "보험중개사"]}, "absence_check": true, "sources": [{"law": "보험업법", "article": "제83조", "clause": "제1항", "quote": "모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다", "verified": false, "source_type": "law", "text": "제83조(모집할 수 있는 자) 제83조(모집할 수 있는 자) ① 모집을 할 수 있는 자는 다음 각 호의 어느 하나에 해당하는 자이어야 한다. 1. 보험설계사 2. 보험대리점 3. 보험중개사 4. 보험회사의 임원(대표이사ㆍ사외이사ㆍ감사 및 감사위원은 제외한다. 이하 이 장에서 같다) 또는 직원 ② 제91조에 따른 금융기관보험대리점등은 대통령령으로 정하는 바에 따라 그 금융기관 소속 임직원이 아닌 자로 하여금 모집을 하게 하거나, 보험계약 체결과 관련한 상담 또는 소개를 하게 하고 상담 또는 소개의 대가를 지급하여서는 아니 된다.", "status": "quote_ok"}, {"law": "보험권 표준내부통제기준", "article": "제37조", "clause": "제3항", "quote": "회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다", "verified": false, "source_type": "self_regulation", "text": "제37조(모집업무 위탁관리 관련 내부통제체계) ① 회사는 모집업무(보험계약의 체결을 중개하거나 대리하는 것을 말한다. 이하 같다)와 관련하여 법령을 준수하고, 경영을 건전하게 하며, 거래질서를 해치는 일이 없도록 관리하기 위하여 회사의 임직원과 모집종사자가 직무를 수행할 때 준수해야 할 기준 및 절차를 별도로 정할 수 있다.\n② 회사는 모집업무 위탁관리업무를 효율적으로 수행할 수 있도록 내부통제 체계를 구축·운영하여야 한다.\n③ 회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다.\n④ 회사는 모집종사자와 위탁계약 체결 전에 모집종사자에게 적용되는 법령 및 규정을 모집종사자에게 설명하여야 한다.\n⑤ 회사는 모집종사자에 의한 금융사고(수수료등 환수 불이행 등)에 대비하여 영업보증금 제출 또는 그에 준하는 이행을 담보하기 위한 조치를 취하여야 한다.\n⑥ 회사는 모집종사자의 모집업무 위탁계약에 명시된 업무 수행에 대한 수수료 지급기준과 환수기준을 마련하고 이를 위탁계약의 내용에 포함하여야 한다.\n⑦ 회사는 모집종사자의 위탁업무 수행에 관한 평가기준을 수립·운영하고 평가결과가 미흡한 모집종사자에게는 필요한 조치를 취하여야 한다.\n⑧ 회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다.\n⑨ 회사는 모집종사자와 위탁계약을 해지하는 경우 해당 모집종사자가 모집한 계약의 담당을 다른 모집종사자에게 즉시 이관하여 관리하여야 한다.\n⑩ 회사는 임직원 및 모집종사자 모집과 관련한 법령 및 내부통제기준 등의 내규를 위반할 경우 이를 제재하기 위한 기준 및 절차를 마련해야 한다.", "status": "quote_ok"}]}, {"id": "SOL-02", "module": "M-SOLICIT", "check": "모집 자격·등록의 유지 의무와 등록 취소·말소 시 통지·해지 조항이 있는가", "severity": "참고", "severity_basis": "실무 관행 항목(법령 강제 아님)", "norm_type": "실무", "basis": "practice", "triggers": {"keywords": ["등록", "말소", "취소", "자격"]}, "absence_check": true, "sources": [{"law": "보험권 표준내부통제기준", "article": "제37조", "clause": "제8항", "quote": "회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다", "verified": false, "source_type": "self_regulation", "text": "제37조(모집업무 위탁관리 관련 내부통제체계) ① 회사는 모집업무(보험계약의 체결을 중개하거나 대리하는 것을 말한다. 이하 같다)와 관련하여 법령을 준수하고, 경영을 건전하게 하며, 거래질서를 해치는 일이 없도록 관리하기 위하여 회사의 임직원과 모집종사자가 직무를 수행할 때 준수해야 할 기준 및 절차를 별도로 정할 수 있다.\n② 회사는 모집업무 위탁관리업무를 효율적으로 수행할 수 있도록 내부통제 체계를 구축·운영하여야 한다.\n③ 회사는 모집종사자와의 위탁계약 체결 전에 모집종사자의 보험업법 상 등록요건 및 재무상태 등을 심사‧평가하여 위탁계약 체결 여부 등에 반영하는 절차를 마련하여야 한다.\n④ 회사는 모집종사자와 위탁계약 체결 전에 모집종사자에게 적용되는 법령 및 규정을 모집종사자에게 설명하여야 한다.\n⑤ 회사는 모집종사자에 의한 금융사고(수수료등 환수 불이행 등)에 대비하여 영업보증금 제출 또는 그에 준하는 이행을 담보하기 위한 조치를 취하여야 한다.\n⑥ 회사는 모집종사자의 모집업무 위탁계약에 명시된 업무 수행에 대한 수수료 지급기준과 환수기준을 마련하고 이를 위탁계약의 내용에 포함하여야 한다.\n⑦ 회사는 모집종사자의 위탁업무 수행에 관한 평가기준을 수립·운영하고 평가결과가 미흡한 모집종사자에게는 필요한 조치를 취하여야 한다.\n⑧ 회사는 보험업법 등에 따른 위탁계약 해지 절차를 마련해야 하며, 그 해지 절차와 사유를 위탁계약서에 반영하고 모집종사자에게 설명하여야 한다.\n⑨ 회사는 모집종사자와 위탁계약을 해지하는 경우 해당 모집종사자가 모집한 계약의 담당을 다른 모집종사자에게 즉시 이관하여 관리하여야 한다.\n⑩ 회사는 임직원 및 모집종사자 모집과 관련한 법령 및 내부통제기준 등의 내규를 위반할 경우 이를 제재하기 위한 기준 및 절차를 마련해야 한다.", "status": "quote_ok"}], "note": "자율규제(보험권 표준내부통제기준 제37조)는 위탁계약 해지 절차·사유의 계약서 반영을 요구"}, {"id": "SOL-03", "module": "M-SOLICIT", "check": "수탁자의 금융소비자보호법 위반으로 발생한 손해에 대한 책임 분담 조항이 있는가", "severity": "필수", "severity_basis": "근거 조문이 강행규정(의무)임 — 금융소비자 보호에 관한 법률 제44조", "norm_type": "강행", "basis": "statute", "triggers": {"keywords": ["손해배상", "금 // ── 표제 보너스 ──────────────────────────────────────────────────
// clause 표제 용어와 check 핵심어(대표 텍스트 키워드) 겹침 → 소폭 가산(상한 TITLE_BONUS_MAX).
function titleBonus(clause, checkTextStr) {
  var title = ClauseRole.parseTitle(clause.heading || "");
  if (!title) return 0;
  var tkw = Sim.keywords(title);
  var ckw = Sim.keywords(checkTextStr);
  var overlap = 0;
  for (var k in tkw) if (ckw[k]) overlap++;
  if (!overlap) return 0;
  return Math.min(overlap * 2, MatcherConfig.TITLE_BONUS_MAX);
}

// ── 조항×체크 점수 ───────────────────────────────────────────────
function scoreClauseCheck(clause, checkEntry, model) {
  var cq = clauseQuery(clause);
  var tfidf = Sim.cosine(Sim.tfidfVec(cq, model.idf), Sim.tfidfVec(checkEntry.text, model.idf)) * 100;
  var jaccard = Sim.jaccard(cq, checkEntry.text) * 100;
  var isShort = String(clause.body || "").length < MatcherConfig.SHORT_LEN;
  var tw = isShort ? MatcherConfig.TW_SHORT : MatcherConfig.TW;
  var jw = isShort ? MatcherConfig.JW_SHORT : MatcherConfig.JW;
  var clauseNorm = ClauseRole.normType(clause.body);
  var nMatch = normMatches(clauseNorm, checkEntry.cp.norm_type);
  var nBonus = nMatch ? MatcherConfig.NORM_BONUS : 0;
  var tBonus = titleBonus(clause, checkEntry.text);
  var citation = citationHit(String(clause.heading || "") + " " + String(clause.body || ""), checkEntry.cp);
  var raw = tw * tfidf + jw * jaccard + nBonus + tBonus;
  var score = Math.max(0, Math.min(100, raw));
  var signals = (tfidf > 0 ? 1 : 0) + (jaccard > 0 ? 1 : 0);
  return {
    score: score, tfidf: tfidf, jaccard: jaccard,
    normMatch: nMatch, titleBonus: tBonus, citation: citation, signals: signals
  };
}

// ── tier 판정 (검토 보조 화법: 단일후보/단일신호 강등 없음) ──────────
// rankedForCheck: 그 check에 대해 REVIEW_FLOOR 이상인 후보 조항 {clause, s} 내림차순.
// 계약서 도메인에선 "체크가 조항 하나에 매칭"이 정상 — 단일 매칭도 근거가 강하면 짚음(confirmed).
//   짚음 도달: (명시 인용) · (충분한 절대점수 단독) · (뚜렷한 최상위=margin).
//   weak 역할(목적·정의·전문·계약기간·완전합의) + 인용 없음 → 자동확정 불가(최대 review) — 도메인 유효.
function decideTier(ranked, check) {
  if (!ranked.length) return "none";
  var best = ranked[0];
  if (best.s.score < MatcherConfig.REVIEW_FLOOR) return "none";
  var role = ClauseRole.clauseRole(best.clause.heading, best.clause.body);
  var citation = best.s.citation === true;
  if (role.weak === true && !citation) return "review"; // weak-role 게이트 유지
  if (citation) return "confirmed";                      // 명시 인용 일치
  if (best.s.score >= MatcherConfig.ABS_SCORE) return "confirmed"; // 충분한 절대점수 — 단일 매칭도 짚음
  if (ranked.length >= 2 &&
    (best.s.score - ranked[1].s.score) >= MatcherConfig.MARGIN_HIGH &&
    best.s.score >= MatcherConfig.REVIEW_FLOOR) return "confirmed"; // 뚜렷한 최상위
  return "review"; // 관련 조항은 있으나(≥REVIEW_FLOOR) 확정 근거 부족 → 확인 권장
}

// ── coverage 상태 (검토 관점 표시값) ─────────────────────────────
//   addressed=짚음 / verify=확인 권장 / consider=검토 제안(알람) / quiet=조용한 기타.
// 알람 게이트: 확실 부재(absence_check && none)이고 severity가 필수·권장일 때만 consider.
//   저위험(참고) 부재는 조용(quiet) — 저위험 알람 억제(스펙 B).
function alarmGate(check) {
  return MatcherConfig.ALARM_SEVERITIES.indexOf(check && check.severity) !== -1;
}
function coverageOf(tier, check) {
  if (tier === "confirmed") return "addressed";
  if (tier === "review") return "verify";
  // tier === "none"
  if (check && check.absence_check && alarmGate(check)) return "consider";
  return "quiet";
}

// ── tier 근거 문자열 (정보형 — 판정 어휘 금지) ───────────────────
function _articleShort(article) {
  var m = String(article || "").match(/제\s*\d+\s*조(?:의\s*\d+)?/);
  return m ? m[0].replace(/\s+/g, "") : "";
}
// clause 표제·본문과 check 대표텍스트가 공유하는 2글자+ 한글 핵심어 몇 개.
function _overlapKeywords(clause, check, limit) {
  var ck = Sim.keywords(checkText(check));
  var cl = Sim.keywords(String(clause.heading || "") + " " + String(clause.body || ""));
  var out = [];
  for (var k in cl) {
    if (ck[k]) { out.push(k); if (out.length >= (limit || 3)) break; }
  }
  return out;
}
function _reasons(tier, ranked, check) {
  if (!ranked.length || tier === "none") return [];
  var best = ranked[0], s = best.s;
  if (s.citation) {
    var src = citationMatch(String(best.clause.heading || "") + " " + String(best.clause.body || ""), check);
    var tag = src ? " (" + [src.law, _articleShort(src.article)].filter(Boolean).join(" ") + ")" : "";
    return ["명시 인용 일치" + tag];
  }
  var role = ClauseRole.clauseRole(best.clause.heading, best.clause.body);
  if (tier === "confirmed") {
    if (s.normMatch) return ["본문 문구·규범 일치"];
    var kws = _overlapKeywords(best.clause, check);
    return ["본문 문구 일치" + (kws.length ? " (핵심어: " + kws.join(", ") + ")" : "")];
  }
  // review
  if (role.weak) return ["관련 조항 있음 — 목적·정의 조항이라 문구 확인 권장"];
  return ["관련 조항 있음 — 충분한지 확인 권장"];
}

// ── 메인 ─────────────────────────────────────────────────────────
function analyze(clauses, docs, activeModules) {
  var model = buildModel(docs, activeModules);
  var results = [];
  var matches = [];
  var missing = [];

  model.checks.forEach(function (entry) {
    var cp = entry.cp;
    var scored = clauses.map(function (cl) {
      return { clause: cl, s: scoreClauseCheck(cl, entry, model) };
    }).sort(function (a, b) { return b.s.score - a.s.score; });

    var candidates = scored.filter(function (r) { return r.s.score >= MatcherConfig.REVIEW_FLOOR; });
    var tier = decideTier(candidates, cp);
    var coverage = coverageOf(tier, cp);
    var top = scored[0] || null;
    var reasons = _reasons(tier, candidates.length ? candidates : scored, cp);
    var rankedTop = scored.slice(0, 3).map(function (r) {
      return { clauseIndex: r.clause.index, score: r.s.score };
    });

    results.push({
      cpId: cp.id,
      tier: tier,
      coverage: coverage,
      best: top ? { clauseIndex: top.clause.index, score: top.s.score, reasons: reasons } : null,
      ranked: rankedTop
    });

    if (tier !== "none" && top) {
      matches.push({
        cpId: cp.id,
        clauseIndex: top.clause.index,
        hits: {
          tier: tier, coverage: coverage, score: top.s.score, tfidf: top.s.tfidf, jaccard: top.s.jaccard,
          citation: top.s.citation, normMatch: top.s.normMatch, reasons: reasons
        }
      });
    }
    if (coverage === "consider") missing.push(cp);
  });

  return {
    checkpoints: model.checks.map(function (e) { return e.cp; }),
    results: results,
    matches: matches,   // 하위호환: tier!=="none" 인 best (app.js 소비)
    missing: missing    // 하위호환(재정의): coverage==="consider" — 알람 게이트 통과분만
  };
}

  };

"use strict";
/* .docx ArrayBuffer → 평문 텍스트. JSZip 전역 사용 (빌드 시 인라인) */

function extractDocxText(arrayBuffer) {
  return JSZip.loadAsync(arrayBuffer).then(function (zip) {
    var entry = zip.file("word/document.xml");
    if (!entry) throw new Error("word/document.xml 없음 — 올바른 .docx가 아님");
    return entry.async("string");
  }).then(function (xml) {
    return xml
      .replace(/<w:tab[^>]*\/>/g, "\t")
      .replace(/<\/w:p>/g, "\n")
      .replace(/<[^>]+>/g, "")
      .replace(/&lt;/g, "<").replace(/&gt;/g, ">")
      .replace(/&quot;/g, '"').replace(/&apos;/g, "'").replace(/&amp;/g, "&")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  });
}

"use strict";
/* UI 오케스트레이션. segmenter.js·matcher.js·docx.js가 먼저 인라인되어 전역 함수 사용 가능 */

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function typeDoc(typeId) {
  for (var i = 0; i < CR.types.length; i++)
    if (CR.types[i].meta.type_id === typeId) return CR.types[i];
  return null;
}
function allChecksForType(typeId) {
  var doc = typeDoc(typeId);
  return CR.common.checks.concat(doc ? doc.checks : []);
}
function findCheck(id) {
  var all = allChecksForType(state.typeId);
  for (var i = 0; i < all.length; i++) if (all[i].id === id) return all[i];
  return null;
}
function primarySource(cp) {
  return (cp.sources && cp.sources[0]) || null;
}

/* ---------- 증적 배지 ---------- */
function sourceBadgeInfo(src) {
  /* rank: 낮을수록 심각 — 행 배지는 전 source 중 최악을 표시 */
  switch (src.status) {
    case "quote_mismatch":
      return { cls: "mismatch", label: "문언 불일치", rank: 0 };
    case "missing":
      return { cls: "missing", label: "원문 미확인", rank: 0 };
    case "no_quote":
      return { cls: "ref", label: "참조", rank: 1 };
    case "quote_ok":
      return src.verified
        ? { cls: "verified", label: "원문확인", rank: 3 }
        : { cls: "unverified", label: "원문 미대조", rank: 2 };
    default:
      return { cls: "practice", label: "실무", rank: 4 };
  }
}
function evidenceBadgeInfo(cp) {
  var sources = cp.sources || [];
  if (!sources.length) return { cls: "practice", label: "실무" };
  var worst = null;
  sources.forEach(function (src) {
    var b = sourceBadgeInfo(src);
    if (!worst || b.rank < worst.rank) worst = b;
  });
  return worst;
}
function sourceBadgeHtml(src) {
  var b = sourceBadgeInfo(src);
  return '<span class="badge ' + b.cls + '">' + b.label + "</span>";
}
function evidenceCell(cp) {
  var src = primarySource(cp);
  var badge = evidenceBadgeInfo(cp);
  var lawText = src
    ? esc(src.law) + " " + esc(src.article) + (src.clause ? " " + esc(src.clause) : "")
    : "";
  return (lawText ? lawText + " " : "") + '<span class="badge ' + badge.cls + '">' + badge.label + "</span>" +
    (src ? sourceTypeBadgeHtml(src) : "");
}

/* ---------- coverage 배지 (계약 반영 축 — 증적 배지와 별개) ----------
   검토 보조 화법: 판정형("확정/미검출") 폐기. 짚음/확인권장/검토제안/기타. */
var COVERAGE_LABEL = {
  addressed: "✓ 반영",
  verify: "◑ 확인 권장",
  consider: "! 검토 제안",
  quiet: "·"
};
var COVERAGE_CLS = {
  addressed: "cov-addressed",
  verify: "cov-verify",
  consider: "cov-consider",
  quiet: "cov-quiet"
};
function coverageBadgeHtml(coverage) {
  if (!COVERAGE_LABEL[coverage] || coverage === "quiet") return "";
  return '<span class="badge ' + COVERAGE_CLS[coverage] + '">' + COVERAGE_LABEL[coverage] + "</span>";
}
/* source_type 배지 (법령 vs 자율규제 톤 구분) */
function sourceTypeBadgeHtml(src) {
  if (src && src.source_type === "self_regulation")
    return ' <span class="badge self-reg">자율규제</span>';

}

function renderChecklist() {
  var typeId = document.getElementById("checklist-type").value;
  state.typeId = typeId;
  var doc = typeDoc(typeId);
  var allModules = (CR.common.meta.modules || []).concat(doc ? doc.meta.modules : []);
  renderModuleGuideBar(allModules);
  renderModuleFilterOptions(allModules);

  var base = allChecksForType(typeId);

  var modF = document.getElementById("filter-module").value;
  var sevF = document.getElementById("filter-severity").value;
  var matchF = document.getElementById("filter-match").value;
  var q = document.getElementById("filter-search").value.trim();

  function passFilter(cp, st) {
    if (modF) {
      if (modF === "__none__") { if (cp.module) return false; }
      else if (cp.module !== modF) return false;
    }
    if (sevF && cp.severity !== sevF) return false;
    // matchF: unmatched="검토 제안만"(consider) / matched="반영·확인만"(addressed·verify)
    if (matchF === "unmatched" && st.coverage !== "consider") return false;
    if (matchF === "matched" && st.coverage !== "addressed" && st.coverage !== "verify") return false;
    if (q) {
      var src = primarySource(cp);
      var hay = cp.check + " " + (src ? src.law + " " + src.article : "");
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  }

  // coverage 우선(consider→verify→addressed→quiet→미분석), 그 안에서 score 내림차순
  var rows = base.map(function (cp) { return { cp: cp, st: checkStatus(cp) }; });
  if (state.result) {
    rows.sort(function (a, b) {
      var ra = COVERAGE_RANK[a.st.coverage]; if (ra === undefined) ra = 4;
      var rb = COVERAGE_RANK[b.st.coverage]; if (rb === undefined) rb = 4;
      if (ra !== rb) return ra - rb;
      var la = resultFor(a.cp), lb = resultFor(b.cp);
      var sa = la && la.best ? la.best.score : -1;
      var sb = lb && lb.best ? lb.best.score : -1;
      return sb - sa;
    });
  }
  rows = rows.filter(function (r) { return passFilter(r.cp, r.st); });

  document.getElementById("checklist-body").innerHTML =
    rows.map(function (r) { return renderChecklistRow(r.cp, r.st); }).join("") ||
    '<tr><td colspan="6" class="empty">조건에 맞는 항목 없음</td></tr>';

  bindRowClicks();
}

function initChecklistType() {
  var sel = document.getElementById("checklist-type");
  sel.innerHTML = CR.types.map(function (t) {
    return '<option value="' + esc(t.meta.type_id) + '">' + esc(t.meta.type_name) + "</option>";
  }).join("");
  sel.addEventListener("change", function () {
    state.typeId = sel.value;
    if (!document.getElementById("analyze-setup").hidden) renderScreening();
    renderChecklist();
  });
  state.typeId = sel.value;
}

["filter-module", "filter-severity", "filter-match"].forEach(function (id) {
  document.getElementById(id).addEventListener("change", renderChecklist);
});
document.getElementById("filter-search").addEventListener("input", renderChecklist);

/* ---------- 분석 모드: 입력 ---------- */
document.getElementById("docx-file").addEventListener("change", function (e) {
  var f = e.target.files[0];
  if (!f) return;
  f.arrayBuffer().then(extractDocxText).then(function (text) {
    document.getElementById("contract-text").value = text;
    document.getElementById("input-error").hidden = true;
  }).catch(function (err) {
    var el = document.getElementById("input-error");
    el.textContent = ".docx 파싱 실패(" + err.message + ") — Word에서 텍스트로 복사해 붙여넣으세요.";
    el.hidden = false;
  });
});

document.getElementById("btn-analyze").addEventListener("click", function () {
  state.text = document.getElementById("contract-text").value;
  if (!state.text.trim()) return;
  state.clauses = segmentContract(state.text);
  var ranked = detectType(state.text, CR.types);
  var sel = document.getElementById("checklist-type");
  if (ranked[0] && ranked[0].score > 0) sel.value = ranked[0].typeId;
  state.typeId = sel.value;
  renderScreening();
  renderChecklist();
  document.getElementById("analyze-setup").hidden = false;
});

/* ---------- 분석 모드: 모듈 스크리닝 ---------- */
function renderScreening() {
  var doc = typeDoc(document.getElementById("checklist-type").value);
  if (!doc) {
    document.getElementById("screening").innerHTML = "";
    state.activeModules = [];
    return;
  }
  var suggested = suggestModules(state.text, doc.meta.modules);
  state.activeModules = doc.meta.modules
    .filter(function (m) { return m.always_on || suggested.indexOf(m.id) !== -1; })
    .map(function (m) { return m.id; });
  document.getElementById("screening").innerHTML = doc.meta.modules.map(function (m) {
    if (m.always_on)
      return '<span class="module-chip on">' + esc(m.name) + " (기본)</span>";
    var on = state.activeModules.indexOf(m.id) !== -1;
    var sug = suggested.indexOf(m.id) !== -1;
    return '<label class="module-chip' + (on ? " on" : "") + (sug ? " suggested" : "") +
      '" data-mid="' + esc(m.id) + '" title="' + esc(m.screening_question || "") + '">' +
      esc(m.name) + (sug ? " ⚡본문 검출" : "") + "</label>";
  }).join("");
  document.querySelectorAll("#screening .module-chip[data-mid]").forEach(function (chip) {
    chip.addEventListener("click", function () {
      var mid = chip.dataset.mid;
      var i = state.activeModules.indexOf(mid);
      if (i === -1) state.activeModules.push(mid); else state.activeModules.splice(i, 1);
      chip.classList.toggle("on");
    });
  });
}

/* ---------- 분석 실행 ---------- */
document.getElementById("btn-run").addEventListener("click", function () {
  state.typeId = document.getElementById("checklist-type").value;
  var doc = typeDoc(state.typeId);
  var docs = [
    { checkpoints: CR.common.checks },
    { checkpoints: doc ? doc.checks : [] },
  ];
  state.result = analyze(state.clauses, docs, state.activeModules);
  renderClauses();
  renderChecklist();
  renderReport();
  document.getElementById("analyze-result").hidden = false;
  document.getElementById("clauses-empty").hidden = true;
  document.getElementById("report-tab").disabled = false;
  document.getElementById("input-panel").open = false;
  document.querySelector('.tab[data-tab="checklist"]').click();
});

/* ---------- 조항별 보기 (보조 탭) — 좌우대비 ---------- */
// 조항 하나에 대해: 좌 "반영된 검토항목"(그 조항이 best인 addressed) / 우 "추가 확인 제안"(verify).
// results를 best.clauseIndex로 역인덱싱하여 coverage별로 모음.
function _cpById(id) {
  var cps = state.result.checkpoints;
  for (var i = 0; i < cps.length; i++) if (cps[i].id === id) return cps[i];
  return null;
}
// 검토항목 1건 요약: 심각도(+근거 툴팁) · 질문 · reason · 근거.
function renderCompareItem(r) {
  var cp = _cpById(r.cpId);
  if (!cp) return "";
  var reasons = (r.best && r.best.reasons) || [];
  return '<div class="compare-item">' +
    '<div class="ci-head"><span class="sev sev-' + cp.severity + '" title="' + esc(cp.severity_basis || "") + '">' +
    esc(cp.severity) + "</span><span class=\"ci-id\">" + esc(cp.id) + "</span></div>" +
    '<p class="ci-q">' + esc(cp.check) + "</p>" +
    (reasons.length ? '<p class="ci-reason">' + esc(reasons.join("; ")) + "</p>" : "") +
    (cp.severity_basis ? '<p class="ci-basis">' + esc(cp.severity_basis) + "</p>" : "") +
    '<p class="ci-src">' + evidenceCell(cp) + "</p>" +
    "</div>";
}
function renderClauses() {
  // ci -> { addressed:[r...], verify:[r...] }
  var byClause = {};
  state.result.results.forEach(function (r) {
    if (!r.best || r.coverage === "quiet" || r.coverage === "consider") return;
    var ci = r.best.clauseIndex;
    var g = byClause[ci] || (byClause[ci] = { addressed: [], verify: [] });
    if (r.coverage === "addressed") g.addressed.push(r);
    else if (r.coverage === "verify") g.verify.push(r);
  });
  document.getElementById("clause-list").innerHTML = state.clauses.map(function (c) {
    var g = byClause[c.index] || { addressed: [], verify: [] };
    var parts = [];
    if (g.addressed.length) parts.push("반영 " + g.addressed.length);
    if (g.verify.length) parts.push("확인 " + g.verify.length);
    return '<div class="clause" data-ci="' + c.index + '"><strong>' + esc(c.heading) +
      '</strong><span class="cnt">' + esc(parts.join(" · ")) + "</span><pre>" +
      esc(c.body) + "</pre></div>";
  }).join("");
  document.querySelectorAll(".clause").forEach(function (el) {
    el.addEventListener("click", function () {
      document.querySelectorAll(".clause").forEach(function (x) { x.classList.remove("sel"); });
      el.classList.add("sel");
      var ci = Number(el.dataset.ci);
      var g = byClause[ci] || { addressed: [], verify: [] };
      var left = g.addressed.map(renderCompareItem).join("") ||
        '<p class="compare-empty">이 조항에서 반영으로 짚인 항목 없음</p>';
      var right = g.verify.map(renderCompareItem).join("") ||
        '<p class="compare-empty">추가 확인 제안 없음</p>';
      document.getElementById("mapping-detail").innerHTML =
        '<div class="clause-compare">' +
        '<div class="compare-col addressed-col"><h3><span class="badge cov-addressed">✓ 반영</span> 이 조항에서 반영된 검토항목</h3>' + left + "</div>" +
        '<div class="compare-col verify-col"><h3><span class="badge cov-verify">◑ 확인 권장</span> 추가 확인 제안</h3>' + right + "</div>" +
        "</div>";
    });
  });
}

/* ---------- 종합 리포트 (긍정-먼저 검토 워크시트) ----------
   실패 목록이 아니라 검토 진행 현황: 반영된 항목을 먼저·크게, 확인·검토 제안을 뒤에.
   판정형 어휘 금지 — 짚어진/반영/확인 권장/검토 제안 화법. */
function hashText(s) {
  var h = 5381;
  for (var i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return "cr-" + (h >>> 0).toString(36);
}
var SEV_RANK = { "필수": 0, "권장": 1, "참고": 2 };
function _sevSort(a, b) {
  var ra = SEV_RANK[a.severity]; if (ra === undefined) ra = 3;
  var rb = SEV_RANK[b.severity]; if (rb === undefined) rb = 3;
  return ra - rb;
}
function _clauseHeading(idx) {
  var c = state.clauses[idx];
  return c ? c.heading : ("조항#" + idx);
}
function _signoff(cp, saved) {
  var ck = saved[cp.id] ? " checked" : "";
  return '<label class="signoff"><input type="checkbox" data-cp="' + esc(cp.id) + '"' + ck +
    "> 검토 완료 표시</label>";
}
function _reportTile(cov, n, label, sub) {
  return '<div class="tile tile-' + cov + '"><span class="tile-n">' + n + "</span>" +
    '<span class="tile-label">' + esc(label) + "</span>" +
    '<span class="tile-sub">' + esc(sub) + "</span></div>";
}
// 검토 제안(consider): 왜 봐야 하는지(severity_basis) + check 질문 + 근거 + sign-off.
function _considerItem(it, saved) {
  var cp = it.cp;
  return '<div class="report-item consider-item">' +
    '<div class="ri-head"><span class="sev sev-' + cp.severity + '" title="' +
    esc(cp.severity_basis || "") + '">' + esc(cp.severity) + "</span>" +
    '<span class="ri-q">' + esc(cp.check) + "</span></div>" +
    (cp.severity_basis ? '<p class="ri-why">왜 봐야 하는지: ' + esc(cp.severity_basis) + "</p>" : "") +
    '<p class="ri-src">근거 ' + evidenceCell(cp) + "</p>" +
    _signoff(cp, saved) + "</div>";
}
// 확인 권장(verify): 관련 조항·이유 + sign-off.
function _verifyItem(it, saved) {
  var cp = it.cp, res = it.res;
  var loc = res.best ? _clauseHeading(res.best.clauseIndex) : "";
  var reasons = (res.best && res.best.reasons) || [];
  return '<div class="report-item verify-item">' +
    '<div class="ri-head"><span class="sev sev-' + cp.severity + '" title="' +
    esc(cp.severity_basis || "") + '">' + esc(cp.severity) + "</span>" +
    '<span class="ri-q">' + esc(cp.check) + "</span></div>" +
    (loc ? '<p class="ri-loc">관련 조항: ' + esc(loc) + "</p>" : "") +
    (reasons.length ? '<p class="ri-reason">' + esc(reasons.join("; ")) + "</p>" : "") +
    _signoff(cp, saved) + "</div>";
}
// 짚어진 항목(addressed): 어느 조항에서 반영됐는지 — 긍정 정보 노출.
function _addressedItem(it) {
  var cp = it.cp, res = it.res;
  var loc = res.best ? _clauseHeading(res.best.clauseIndex) : "";
  var reasons = (res.best && res.best.reasons) || [];
  return '<div class="report-item addressed-item">' +
    '<div class="ri-head"><span class="badge cov-addressed">✓ 반영</span>' +
    '<span class="ri-q">' + esc(cp.check) + "</span></div>" +
    (loc ? '<p class="ri-loc">' + esc(loc) + "에서 반영</p>" : "") +
    (reasons.length ? '<p class="ri-reason">' + esc(reasons.join("; ")) + "</p>" : "") +
    "</div>";
}
// 조항별 검토 현황(선택): 반영/확인 건수 요약.
function _clauseSummarySection(addressed, verify) {
  var byClause = {};
  addressed.concat(verify).forEach(function (it) {
    if (!it.res.best) return;
    var ci = it.res.best.clauseIndex;
    var g = byClause[ci] || (byClause[ci] = { a: 0, v: 0 });
    if (it.res.coverage === "addressed") g.a++; else g.v++;
  });
  var rows = state.clauses.map(function (c) {
    var g = byClause[c.index];
    if (!g) return "";
    var parts = [];
    if (g.a) parts.push("반영 " + g.a);
    if (g.v) parts.push("확인 " + g.v);
    return '<li><strong>' + esc(c.heading) + '</strong> <span class="cs-cnt">' +
      esc(parts.join(" · ")) + "</span></li>";
  }).filter(Boolean);
  if (!rows.length) return "";
  return '<details class="report-sec"><summary>조항별 검토 현황</summary>' +
    '<ul class="clause-summary">' + rows.join("") + "</ul></details>";
}
function renderReport() {
  var key = hashText(state.text);
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem(key) || "{}"); } catch (e) {}
  var r = state.result;

  var addressed = [], verify = [], consider = [];
  r.results.forEach(function (res) {
    var cp = _cpById(res.cpId);
    if (!cp) return;
    var it = { cp: cp, res: res, severity: cp.severity };
    if (res.coverage === "addressed") addressed.push(it);
    else if (res.coverage === "verify") verify.push(it);
    else if (res.coverage === "consider") consider.push(it);
  });
  addressed.sort(_sevSort); verify.sort(_sevSort); consider.sort(_sevSort);

  var h = "<h2>검토 워크시트</h2>";
  h += '<p class="report-intro">이 계약서에서 아래와 같이 검토됨. 반영된 항목을 먼저 두고, 확인·검토 제안을 정리함. 각 항목은 검토 후 “검토 완료 표시”로 남길 수 있음.</p>';

  // 1) 긍정 먼저 요약 타일
  h += '<div class="report-tiles">' +
    _reportTile("addressed", addressed.length, "짚어진 항목", "계약서가 반영함") +
    _reportTile("verify", verify.length, "확인 권장", "관련 조항 있음 · 문구 확인") +
    _reportTile("consider", consider.length, "검토 제안", "필요한 계약인지 검토") +
    "</div>";

  // 2) 검토 제안 — 심각도순 · 접힘(필수 표면, 권장 접힘)
  h += '<section class="report-sec-block">';
  h += "<h3>검토 제안 (" + consider.length + ")</h3>";
  if (!consider.length) {
    h += '<p class="report-none">검토 제안 항목 없음 — 필수·권장 항목이 모두 관련 조항에 닿았음.</p>';
  } else {
    h += '<p class="sec-hint">이 항목이 계약서에서 보이지 않음 — 빠졌다는 뜻이 아니라, 필요한 계약인지 검토 제안.</p>';
    var must = consider.filter(function (it) { return it.severity === "필수"; });
    var rec = consider.filter(function (it) { return it.severity !== "필수"; });
    h += must.map(function (it) { return _considerItem(it, saved); }).join("");
    if (rec.length) {
      h += '<details class="report-more"><summary>권장 검토 제안 ' + rec.length + "건 펼치기</summary>" +
        rec.map(function (it) { return _considerItem(it, saved); }).join("") + "</details>";
    }
  }
  h += "</section>";

  // 3) 확인 권장
  h += '<details class="report-sec" open><summary>확인 권장 ' + verify.length +
    " — 관련 조항 있음, 문구 확인 권함</summary>";
  h += verify.map(function (it) { return _verifyItem(it, saved); }).join("") ||
    '<p class="report-none">확인 권장 항목 없음.</p>';
  h += "</details>";

  // 4) 짚어진 항목
  h += '<details class="report-sec"><summary>짚어진 항목 ' + addressed.length +
    " — 계약서가 반영한 항목</summary>";
  h += addressed.map(_addressedItem).join("") ||
    '<p class="report-none">아직 반영으로 짚인 항목 없음.</p>';
  h += "</details>";

  // 5) 조항별 검토 현황(선택)
  h += _clauseSummarySection(addressed, verify);

  var body = document.getElementById("report-body");
  body.innerHTML = h;
  body.querySelectorAll("input[type=checkbox]").forEach(function (cb) {
    cb.addEventListener("change", function () {
      saved[cb.dataset.cp] = cb.checked;
      localStorage.setItem(key, JSON.stringify(saved));
    });
  });
}
// 인쇄 시 접힌 섹션도 펼쳐 요약 타일·검토 제안·확인 권장이 모두 나오게.
window.addEventListener("beforeprint", function () {
  document.querySelectorAll("#report-body details").forEach(function (d) {
    if (!d.open) { d.dataset.wasClosed = "1"; d.open = true; }
  });
});
window.addEventListener("afterprint", function () {
  document.querySelectorAll("#report-body details[data-was-closed]").forEach(function (d) {
    d.open = false; d.removeAttribute("data-was-closed");
  });
});

initChecklistType();
renderChecklist();
</script>
</body>
</html>
