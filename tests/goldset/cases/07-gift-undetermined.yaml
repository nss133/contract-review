id: gift-undetermined
desc: 증여계약(지원 외 유형) — 유형 미확정 처리
detect_expected: null
text: |
  증여계약서

  제1조(목적) 증여자 갑은 수증자 을에게 별지 목록 기재 미술품을 무상으로 증여하고 을은 이를 승낙한다.
  제2조(소유권 이전) 갑은 계약 체결일에 목적물을 을에게 인도하고 소유권을 이전한다.
  제3조(하자) 갑은 목적물의 하자에 대하여 책임을 지지 아니한다. 다만 알면서 고지하지 아니한 하자는 그러하지 아니하다.
  제4조(해제) 서면에 의하지 아니한 증여의 의사표시는 각 당사자가 해제할 수 있다.
